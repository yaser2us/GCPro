$kind: http-request
name: 3.1 Create Medical Case
description: Creates a medical case for tracking ongoing treatment
url: "{{base_url}}/api/v1/medical-case/create"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "accountId": "1",
      "personId": "2",
      "policyId": "1",
      "providerId": "100",
      "admissionType": "emergency",
      "diagnosisCode": "K35.80",
      "diagnosisText": "Unspecified acute appendicitis",
      "admittedAt": "2024-03-15T08:00:00Z"
    }
scripts:
  - type: afterResponse
    code: >-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          if (response.medical_case_id) {
              pm.collectionVariables.set('medical_case_id', response.medical_case_id);
              console.log('✅ Medical Case Created:', response.medical_case_id);
          }
      }


      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 1000
