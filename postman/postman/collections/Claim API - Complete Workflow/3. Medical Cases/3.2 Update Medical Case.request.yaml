$kind: http-request
description: Updates medical case status and discharge information
url: "{{base_url}}/api/v1/medical-case/{{medical_case_id}}/update"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "status": "discharged",
      "dischargedAt": "2024-03-18T14:00:00Z"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          console.log('✅ Medical Case Updated');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 2000
