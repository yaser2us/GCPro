$kind: http-request
description: Cancels an active guarantee letter
url: "{{base_url}}/api/v1/guarantee-letter/{{gl_id}}/cancel"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: "{}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          console.log('✅ Guarantee Letter Cancelled');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 2000
