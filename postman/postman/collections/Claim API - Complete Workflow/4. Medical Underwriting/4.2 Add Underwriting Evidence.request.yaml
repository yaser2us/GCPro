$kind: http-request
description: Adds supporting evidence to underwriting case
url: "{{base_url}}/api/v1/underwriting/1/add-evidence"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "evidenceType": "survey",
      "surveyResponseId": "789",
      "note": "Medical history questionnaire completed with full disclosure",
      "metaJson": {
        "survey_version": "v2.1",
        "completion_date": "2024-03-10"
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });

      if (pm.response.code === 201) {
          console.log('✅ Underwriting Evidence Added');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 2000
