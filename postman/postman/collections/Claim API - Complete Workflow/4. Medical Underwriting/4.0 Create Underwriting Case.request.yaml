$kind: http-request
description: Creates a new underwriting case for medical evaluation
url: "{{base_url}}/api/v1/underwriting/create"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "subjectRefId": 1,
      "contextRefId": null,
      "channel": "web",
      "priority": "normal",
      "assignedToUserId": 1,
      "metaJson": {
        "source": "new_member_application",
        "applicant_name": "John Doe"
      }
    }
scripts:
  - type: afterResponse
    code: >-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          if (response.case_id) {
              pm.collectionVariables.set('underwriting_case_id', response.case_id);
              console.log('✅ Underwriting Case Created:', response.case_id, response.case_no);
          }
      }


      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 1000
