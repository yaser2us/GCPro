$kind: http-request
description: Updates medical provider details (admin only)
url: "{{base_url}}/api/v1/admin/medical-provider/{{provider_id}}"
method: PUT
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "name": "Test General Hospital Updated",
      "contactPhone": "+60321234568",
      "metaJson": {
        "specialties": ["General Surgery", "Emergency", "Cardiology"],
        "beds": 350,
        "emergency_24h": true
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          console.log('✅ Provider Updated');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 2000
