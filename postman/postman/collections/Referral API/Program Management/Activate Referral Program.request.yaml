$kind: http-request
description: |-
  Activate a paused referral program

  Spec: specs/referral/referral.pillar.yml lines 991-1024
  Permissions: referral:admin
url: "{{base_url}}/v1/referral/programs/{{program_id}}/activate"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$randomUUID}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
body:
  type: text
  content: "{}"
examples: ./.resources/Activate Referral Program.resources/examples
order: 3000
