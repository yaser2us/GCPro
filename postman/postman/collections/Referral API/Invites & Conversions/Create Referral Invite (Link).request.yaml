$kind: http-request
description: |-
  Create a referral invite for a shareable link

  No channel_value needed for link type
url: "{{base_url}}/v1/referral/invites"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$randomUUID}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: USER
body:
  type: text
  content: |-
    {
      "program_id": {{program_id}},
      "referral_code_id": {{code_id}},
      "channel_type": "link"
    }
order: 2000
