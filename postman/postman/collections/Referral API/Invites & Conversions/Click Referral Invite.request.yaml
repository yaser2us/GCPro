$kind: http-request
description: |-
  Record a click on a referral invite link

  Spec: specs/referral/referral.pillar.yml lines 1125-1168

  This is typically called when a user clicks on a referral link
url: "{{base_url}}/v1/referral/invites/click"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$randomUUID}}"
  X-User-Id: visitor-anonymous
  X-User-Role: ANONYMOUS
body:
  type: text
  content: |-
    {
      "invite_token": "{{invite_token}}"
    }
examples: ./.resources/Click Referral Invite.resources/examples
order: 3000
