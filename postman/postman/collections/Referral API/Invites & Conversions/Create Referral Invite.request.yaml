$kind: http-request
description: |-
  Create a referral invite

  Spec: specs/referral/referral.pillar.yml lines 1068-1123

  Channel types: link, email, sms, whatsapp
url: "{{base_url}}/v1/referral/invites"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$randomUUID}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: USER
body:
  type: text
  content: |-
    {
      "program_id": {{program_id}},
      "referral_code_id": {{code_id}},
      "channel_type": "email",
      "channel_value": "friend@example.com"
    }
scripts:
  - type: afterResponse
    code: |-
      // Save invite_token to collection variable
      var jsonData = pm.response.json();
      if (jsonData.invite_token) {
          pm.collectionVariables.set("invite_token", jsonData.invite_token);
      }
    language: text/javascript
examples: ./.resources/Create Referral Invite.resources/examples
order: 1000
