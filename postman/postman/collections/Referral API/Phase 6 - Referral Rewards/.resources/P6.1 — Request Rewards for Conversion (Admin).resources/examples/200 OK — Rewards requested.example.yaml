$kind: http-example
request:
  url: "{{base_url}}/v1/referral/rewards/request"
  method: POST
  headers:
    Content-Type: application/json
    Authorization: Bearer {{auth_token}}
    X-Actor-User-Id: "{{actor_user_id}}"
    Idempotency-Key: "{{$randomUUID}}"
  body:
    type: text
    content: |-
      {
        "conversion_id": 1
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
        "grants_requested": 2
      }
order: 1000
