$kind: http-request
description: Record clean scan result from provider
url: "{{base_url}}/v1/files/{{file_id}}/scan-results"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "scan_type": "antivirus",
      "status": "clean",
      "provider": "ClamAV",
      "summary": "No threats detected"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("scan_id", jsonData.scan_id);
    language: text/javascript
order: 2000
