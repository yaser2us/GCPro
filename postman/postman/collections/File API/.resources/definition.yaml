$kind: collection
description: |-
  File Management - Upload, Versioning, Access Control, and Scanning

  Source: specs/file/file.pillar.v2.yml
variables:
  base_url: http://localhost:3000
  user_id: "1"
  file_id: "1"
  version_id: "1"
  access_token: ""
  link_id: "1"
  scan_id: "1"
  tag_id: "1"
scripts:
  - type: http:beforeRequest
    code: |-
      // Add X-User-Id header
      pm.request.headers.add({
        key: 'X-User-Id',
        value: pm.collectionVariables.get('user_id') || '1'
      });

      // Add Idempotency-Key for POST/PUT requests
      if (pm.request.method === 'POST' || pm.request.method === 'PUT') {
        const existingKey = pm.request.headers.get('Idempotency-Key');
        if (!existingKey) {
          pm.request.headers.add({
            key: 'Idempotency-Key',
            value: pm.variables.replaceIn('{{$guid}}')
          });
        }
      }
    language: text/javascript
