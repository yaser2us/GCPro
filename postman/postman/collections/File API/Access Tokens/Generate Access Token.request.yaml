$kind: http-request
description: |-
  Generate temporary access token

  Expires in 1 hour, max 3 uses
url: "{{base_url}}/v1/files/{{file_id}}/tokens"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "token_type": "download",
      "expires_in_seconds": 3600,
      "max_uses": 3
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("access_token", jsonData.token);
    language: text/javascript
order: 1000
