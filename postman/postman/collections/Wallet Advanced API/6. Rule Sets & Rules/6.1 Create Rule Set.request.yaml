$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/rule-sets"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "wallet_id": {{target_wallet_id}},
      "version": "v1",
      "effective_from": "2026-01-01T00:00:00.000Z"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
        pm.collectionVariables.set('rule_set_id', json.id);
        console.log('rule_set_id set to', json.id);
      }
    language: text/javascript
order: 1000
