$kind: http-request
name: "Phase5: Simulate CLAIM_SETTLED → wallet deposit intent"
description: "Phase 5: CLAIM_SETTLED automatically triggers
  wallet_deposit_intent creation for the claimant's GC_WALLET. Emits
  CLAIM_PAYOUT_INITIATED. This folder documents the flow — trigger via
  claim-api.postman_collection settle endpoint."
url: "{{base_url}}/api/v1/wallet/claim-payout/test"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: >-
    {
      "_note": "This is triggered automatically by CLAIM_SETTLED event. No direct HTTP endpoint \u2014 use claim API to settle a claim.",
      "flow": "CLAIM_SETTLED event \u2192 ClaimSettledPayoutConsumer \u2192 ClaimSettledPayoutHandler \u2192 wallet_deposit_intent \u2192 CLAIM_PAYOUT_INITIATED"
    }
order: 1000
