$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/batches/{{batch_id}}/items"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "wallet_id": {{target_wallet_id}},
      "account_id": {{target_account_id}},
      "item_type": "credit",
      "amount": "20.00",
      "currency": "MYR"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 3000
