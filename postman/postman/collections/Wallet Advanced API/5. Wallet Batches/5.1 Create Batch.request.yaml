$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/batches"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "batch_type": "commission_payout",
      "ref_type": "commission_cycle",
      "ref_id": "cycle_2026_03"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
        pm.collectionVariables.set('batch_id', json.id);
        console.log('batch_id set to', json.id);
      }
    language: text/javascript
order: 1000
