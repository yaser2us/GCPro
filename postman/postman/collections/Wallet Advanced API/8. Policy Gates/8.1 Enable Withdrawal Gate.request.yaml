$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/policy-gates"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "wallet_id": {{target_wallet_id}},
      "gate_code": "withdrawal_enabled",
      "status": "on"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('Status is on', () => pm.expect(json.status).to.eql('on'));
    language: text/javascript
order: 1000
