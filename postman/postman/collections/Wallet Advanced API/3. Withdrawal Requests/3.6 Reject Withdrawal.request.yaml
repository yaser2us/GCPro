$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/withdrawal-requests/{{withdrawal_reje\
  ct_id}}/reject"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "reject_reason_code": "INSUFFICIENT_DOCS"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      const json = pm.response.json();

      pm.test('Status is rejected', () =>
      pm.expect(json.status).to.eql('rejected'));
    language: text/javascript
order: 6000
