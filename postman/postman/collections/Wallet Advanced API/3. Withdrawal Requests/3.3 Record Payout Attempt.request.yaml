$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/withdrawal-requests/{{withdrawal_requ\
  est_id}}/payout-attempts"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "provider": "fpx",
      "provider_ref": "FPX_TXN_001",
      "status": "succeeded"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      pm.test('Has id', () => pm.expect(json.id).to.exist);
    language: text/javascript
order: 3000
