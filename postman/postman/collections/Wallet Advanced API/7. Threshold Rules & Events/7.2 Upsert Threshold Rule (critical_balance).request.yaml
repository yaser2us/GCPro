$kind: http-request
url: "{{base_url}}/api/v1/wallet-advanced/threshold-rules"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "wallet_id": {{target_wallet_id}},
      "threshold_code": "critical_balance",
      "threshold_amount": "10.00",
      "currency": "MYR"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 2000
