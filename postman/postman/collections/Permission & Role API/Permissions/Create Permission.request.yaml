$kind: http-request
description: |-
  Create a new permission

  Idempotency: Via UNIQUE(code)
url: "{{base_url}}/v1/permissions"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "code": "user.read",
      "name": "Read Users",
      "description": "Allows reading user data",
      "scope": "api"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("permission_id", jsonData.permission_id);
    language: text/javascript
order: 1000
