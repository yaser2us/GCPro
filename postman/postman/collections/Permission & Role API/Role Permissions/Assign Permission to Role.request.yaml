$kind: http-request
description: |-
  Assign permission to role

  Idempotency: Via UNIQUE(role_id, permission_id)
url: "{{base_url}}/v1/roles/{{role_id}}/permissions"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "permission_id": "{{permission_id}}"
    }
order: 1000
