$kind: http-request
description: |-
  Admin command. Requires identity:admin permission.

  Path param:
  - deviceTokenId: number

  Guards:
  - DEVICE_TOKEN_NOT_FOUND
  - DEVICE_TOKEN_ALREADY_REVOKED
url: "{{base_url}}/v1/identity/device-tokens/{{device_token_id}}/revoke"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: ""
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      const json = pm.response.json();

      if (json) {
        pm.test('Device token is revoked', () => pm.expect(json.status).to.equal('revoked'));
      }
    language: text/javascript
order: 3000
