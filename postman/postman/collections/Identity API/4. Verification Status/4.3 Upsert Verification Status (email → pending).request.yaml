$kind: http-request
url: "{{base_url}}/v1/identity/verification-status"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "account_id": {{target_account_id}},
      "type": "email",
      "status": "pending"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
