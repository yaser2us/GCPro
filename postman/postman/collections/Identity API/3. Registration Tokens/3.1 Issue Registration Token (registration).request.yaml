$kind: http-request
description: >-
  Fields (from RegistrationTokenIssueDto):

  - purpose: 'registration' | 'phone_verify' | 'email_verify' | 'password_reset'
  | 'login' (optional, defaults to 'registration')

  - channel_type: 'email' | 'sms' | 'whatsapp' (required)

  - channel_value: email address or phone number (required)

  - invite_code: REQUIRED when purpose='registration' — must match an active
  referral_code with code_type='invite' (seed: GCPRO-INVITE-2026)

  - token: magic-link token (optional)

  - otp_hash: bcrypt hash of OTP digits (optional)

  - expires_at: ISO 8601 datetime (required)

  - meta_json: arbitrary metadata object (optional)


  Guards (purpose='registration' only):

  - INVITE_CODE_REQUIRED — invite_code missing

  - INVITE_CODE_INVALID  — invite_code not found or inactive (C2)

  - TERMS_NOT_ACCEPTED   — user exists but hasn't accepted gc:terms (M7)

  - REGISTRATION_TOKEN_COOLDOWN_ACTIVE — pending token issued within last 60s
  (L6)
url: "{{base_url}}/v1/identity/registration-tokens"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "purpose": "registration",
      "channel_type": "sms",
      "channel_value": "{{target_phone}}",
      "invite_code": "GCPRO-INVITE-2026",
      "otp_hash": "$2b$10$exampleBcryptHashOfOTP123456",
      "expires_at": "2099-12-31T23:59:59.000Z",
      "meta_json": { "ip": "127.0.0.1" }
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
        pm.collectionVariables.set('registration_token_id', json.id);
        console.log('registration_token_id set to', json.id);
      }
    language: text/javascript
order: 1000
