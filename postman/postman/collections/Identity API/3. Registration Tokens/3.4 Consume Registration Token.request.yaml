$kind: http-request
description: |-
  No body. Path param: registrationTokenId.

  Token must be in 'verified' status.

  Guards:
  - REGISTRATION_TOKEN_NOT_FOUND
  - REGISTRATION_TOKEN_NOT_VERIFIED
url: "{{base_url}}/v1/identity/registration-tokens/{{registration_token_id}}/co\
  nsume"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: ""
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      const json = pm.response.json();

      if (json) {
        pm.test('Token is consumed', () => pm.expect(json.status).to.equal('consumed'));
      }
    language: text/javascript
order: 4000
