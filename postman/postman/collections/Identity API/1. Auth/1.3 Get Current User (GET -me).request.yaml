$kind: http-request
name: 1.3 Get Current User (GET /me)
description: >-
  Authenticated (identity:user). Returns the current user's record from the user
  table.


  No request body. Actor is resolved from x-user-id header.


  Response fields (from User entity):

  - id

  - phone_number

  - email

  - email_verified_at

  - status

  - created_at

  - updated_at
url: "{{base_url}}/v1/identity/me"
method: GET
headers:
  x-user-id: "{{user_user_id}}"
  x-user-role: "{{user_user_role}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Has user id', () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property('id');
      });
    language: text/javascript
order: 3000
