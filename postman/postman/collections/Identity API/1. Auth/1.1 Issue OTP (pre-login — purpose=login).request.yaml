$kind: http-request
description: >-
  Step 1 of login flow: issue an OTP registration token for the user's phone.


  Fields (from RegistrationTokenIssueDto):

  - purpose: 'login' (required for Login command to find this token)

  - channel_type: 'sms' | 'email' | 'whatsapp'

  - channel_value: phone number or email

  - otp_hash: bcrypt hash of the OTP digits (generated server-side in
  production)

  - expires_at: ISO 8601 expiry time


  Note: 60-second cooldown is enforced per channel_value.

  Note: In production the otp_hash is generated by the server, not the client.
url: "{{base_url}}/v1/identity/registration-tokens"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "purpose": "login",
      "channel_type": "sms",
      "channel_value": "{{target_phone}}",
      "otp_hash": "$2b$10$exampleBcryptHashOfOTP123456",
      "expires_at": "2099-12-31T23:59:59.000Z"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
        pm.collectionVariables.set('registration_token_id', json.id);
        console.log('registration_token_id set to', json.id);
      }
    language: text/javascript
order: 1000
