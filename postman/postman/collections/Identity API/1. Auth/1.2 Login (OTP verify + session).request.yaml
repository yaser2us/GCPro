$kind: http-request
description: |-
  Unauthenticated. No x-user-id header required.

  Fields (from LoginDto):
  - channel_type: must match the OTP channel used in step 1.1
  - channel_value: phone number or email (must match a user record)
  - otp_plain: plain OTP digits to verify against stored otp_hash
  - platform: 'fcm' | 'apns' | 'web'
  - device_token: raw push token for this device

  Response: { user, device_token }
  Use device_token.id for subsequent Logout call.
url: "{{base_url}}/v1/identity/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "channel_type": "sms",
      "channel_value": "{{target_phone}}",
      "otp_plain": "123456",
      "platform": "fcm",
      "device_token": "eXaMpLeDeViCeToKeN_FcM_Login_001"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      if (json && json.device_token && json.device_token.id) {
        pm.collectionVariables.set('device_token_id', json.device_token.id);
        console.log('device_token_id set to', json.device_token.id);
      }
      if (json && json.user && json.user.id) {
        pm.collectionVariables.set('user_user_id', json.user.id);
        console.log('user_user_id set to', json.user.id);
      }
    language: text/javascript
order: 2000
