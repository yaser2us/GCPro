$kind: http-request
description: "Archive a benefit catalog. Catalog status: active → archived."
url: "{{base_url}}/api/v1/foundation/benefit-catalogs/{{catalog_id}}/archive"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: "{}"
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 6000
