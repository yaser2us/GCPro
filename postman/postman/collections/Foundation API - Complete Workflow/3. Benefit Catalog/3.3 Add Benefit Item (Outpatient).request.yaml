$kind: http-request
description: Add outpatient benefit with 52 visits/year limit.
url: "{{base_url}}/api/v1/foundation/benefit-catalogs/{{catalog_id}}/items"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "item_code": "GP_VISIT",
      "name": "General Practitioner Visit",
      "category": "outpatient",
      "limit_type": "per_year",
      "limit_amount": "5000.00",
      "limit_count": 52,
      "calculation_mode": "reimburse"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 3000
