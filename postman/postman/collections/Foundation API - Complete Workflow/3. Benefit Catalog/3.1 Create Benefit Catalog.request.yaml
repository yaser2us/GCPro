$kind: http-request
description: Create a versioned benefit catalog. Unique by (code, version).
url: "{{base_url}}/api/v1/foundation/benefit-catalogs"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "code": "HEALTH_2026",
      "name": "Health Insurance Benefit Catalog 2026",
      "version": "v1",
      "effective_from": "2026-01-01T00:00:00Z",
      "effective_to": "2026-12-31T23:59:59Z",
      "meta_json": { "year": 2026, "product": "health" }
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
          pm.collectionVariables.set('catalog_id', json.id);
          console.log('catalog_id set to', json.id);
      }
    language: text/javascript
order: 1000
