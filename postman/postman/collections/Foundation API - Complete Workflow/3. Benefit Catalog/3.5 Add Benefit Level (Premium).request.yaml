$kind: http-request
description: Add Premium coverage level.
url: "{{base_url}}/api/v1/foundation/benefit-catalogs/{{catalog_id}}/levels"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "level_code": "PREMIUM",
      "level_name": "Premium Coverage",
      "sort_order": 2
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 5000
