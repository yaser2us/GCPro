$kind: http-request
description: "Mark KYC as rejected. Use instead of verify when documents are
  invalid. Emits KYC_REJECTED. KYC status: pending → rejected."
url: "{{base_url}}/api/v1/foundation/kyc/{{kyc_id}}/reject"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: "{}"
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
