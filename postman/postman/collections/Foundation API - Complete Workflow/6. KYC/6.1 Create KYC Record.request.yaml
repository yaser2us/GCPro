$kind: http-request
description: Create a KYC record for a person. Status starts as 'pending'.
url: "{{base_url}}/api/v1/foundation/kyc"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "subject_type": "person",
      "subject_id": 101,
      "provider": "myinfo",
      "status": "pending",
      "meta_json": { "request_ref": "MYINFO-2026-001" }
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 201', () => pm.response.to.have.status(201));
      const json = pm.response.json();
      if (json && json.id) {
          pm.collectionVariables.set('kyc_id', json.id);
          console.log('kyc_id set to', json.id);
      }
    language: text/javascript
order: 1000
