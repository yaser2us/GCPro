$kind: http-request
description: Seed smoker profile — 25% loading applied.
url: "{{base_url}}/api/v1/foundation/smoker-profiles"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "code": "SMOKER",
      "smoker_factor": "1.500",
      "loading_pct": "25.000"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 4000
