$kind: http-request
description: Create or update an age band by code. Idempotent — safe to re-run for seeding.
url: "{{base_url}}/api/v1/foundation/age-bands"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "code": "25-30",
      "min_age": 25,
      "max_age": 30,
      "age_factor": "1.000"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 1000
