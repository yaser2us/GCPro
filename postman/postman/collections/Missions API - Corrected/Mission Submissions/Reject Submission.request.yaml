$kind: http-request
description: Reject a submission (allows user to resubmit). Requires
  missions:admin or missions:review permission.
url: "{{baseUrl}}/v1/missions/submissions/{{submission_id}}/reject"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
body:
  type: text
  content: >-
    {
      "feedback": "Please provide more evidence for policy applications 3 and 4."
    }
order: 4000
