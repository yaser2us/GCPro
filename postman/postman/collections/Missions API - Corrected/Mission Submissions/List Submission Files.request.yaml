$kind: http-request
description: List all files attached to a submission. Requires missions:read,
  missions:admin, or missions:review permission.
url: "{{baseUrl}}/v1/missions/submissions/{{submission_id}}/files"
method: GET
headers:
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
order: 5000
