$kind: http-request
description: Publish/activate a mission definition. Changes status from paused
  to active. Requires missions:admin or missions:manage permission.
url: "{{baseUrl}}/v1/missions/definitions/{{mission_definition_id}}/publish"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
body:
  type: text
  content: "{}"
order: 4000
