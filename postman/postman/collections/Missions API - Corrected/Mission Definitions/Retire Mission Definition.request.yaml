$kind: http-request
description: Retire a mission permanently (final state). Requires missions:admin
  or missions:manage permission.
url: "{{baseUrl}}/v1/missions/definitions/{{mission_definition_id}}/retire"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
body:
  type: text
  content: |-
    {
      "reason": "Mission campaign has ended"
    }
order: 6000
