$kind: http-request
description: Pause an active mission (stops new assignments). Requires
  missions:admin or missions:manage permission.
url: "{{baseUrl}}/v1/missions/definitions/{{mission_definition_id}}/pause"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
  X-User-Id: "{{actor_user_id}}"
  X-User-Role: ADMIN
body:
  type: text
  content: |-
    {
      "reason": "Temporarily pausing mission for review"
    }
order: 5000
