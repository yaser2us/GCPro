$kind: http-request
description: Record progress metrics for a mission assignment. Requires
  missions:enroll or missions:admin permission.
url: "{{baseUrl}}/v1/missions/assignments/{{assignment_id}}/progress"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
  X-User-Id: "{{user_id}}"
  X-User-Role: USER
body:
  type: text
  content: |-
    {
      "metric_code": "policies_completed",
      "current_value": 3,
      "target_value": 5,
      "unit": "count",
      "ref_type": "policy_application",
      "ref_id": "app_789"
    }
order: 1000
