$kind: http-request
url: "{{base_url}}/v1/survey-responses"
method: POST
headers:
  Idempotency-Key: workflow-create-response-{{$timestamp}}
  X-User-Id: "{{user_id}}"
  X-User-Role: USER
body:
  type: json
  content: |-
    {
      "survey_version_id": "{{survey_version_id}}",
      "actor_ref_id": "1",
      "subject_ref_id": "1"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          pm.environment.set('response_id', response.survey_response_id);
          console.log('✓ Response created: ' + response.survey_response_id);
      }
    language: text/javascript
order: 5000
