$kind: http-request
url: "{{base_url}}/v1/surveys"
method: POST
headers:
  Idempotency-Key: workflow-create-survey-{{$timestamp}}
  X-User-Id: "{{user_id}}"
  X-User-Role: ADMIN
body:
  type: json
  content: |-
    {
      "code": "satisfaction-{{$timestamp}}",
      "name": "Customer Satisfaction Survey",
      "description": "Quarterly customer satisfaction measurement"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          pm.environment.set('survey_id', response.survey_id);
          console.log('✓ Survey created: ' + response.survey_id);
      }
    language: text/javascript
order: 1000
