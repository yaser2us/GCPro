$kind: http-request
url: "{{base_url}}/v1/survey-responses/{{response_id}}/submit"
method: POST
headers:
  Idempotency-Key: workflow-submit-{{$timestamp}}
  X-User-Id: "{{user_id}}"
  X-User-Role: USER
body:
  type: json
  content: |-
    {
      "answers": [
        {
          "question_id": 1,
          "value_num": 5
        },
        {
          "question_id": 2,
          "value_text": "Everything was great!"
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
          console.log('✓ Response submitted');
          console.log('');
          console.log('=== Workflow Complete ===');
      }
    language: text/javascript
order: 6000
