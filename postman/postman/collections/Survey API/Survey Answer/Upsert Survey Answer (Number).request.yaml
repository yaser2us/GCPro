$kind: http-request
url: "{{base_url}}/v1/survey-answers"
method: POST
headers:
  Idempotency-Key: save-answer-num-{{$randomUUID}}
  X-User-Id: "{{user_id}}"
  X-User-Role: USER
body:
  type: json
  content: |-
    {
      "response_id": "{{response_id}}",
      "question_id": "{{question_id}}",
      "value_num": 4.5
    }
order: 2000
