$kind: http-request
url: "{{base_url}}/v1/survey-answers"
method: POST
headers:
  Idempotency-Key: save-answer-json-{{$randomUUID}}
  X-User-Id: "{{user_id}}"
  X-User-Role: USER
body:
  type: json
  content: |-
    {
      "response_id": "{{response_id}}",
      "question_id": "{{question_id}}",
      "value_json": {
        "rating": 5,
        "categories": ["quality", "service", "price"],
        "comments": "Excellent overall"
      }
    }
order: 5000
