$kind: http-request
url: "{{base_url}}/v1/surveys/{{survey_id}}/versions"
method: POST
headers:
  Idempotency-Key: create-version-{{$randomUUID}}
  X-User-Id: "{{user_id}}"
  X-User-Role: ADMIN
body:
  type: json
  content: |-
    {
      "version": "1.0",
      "schema_json": {
        "title": "NPS Survey",
        "type": "nps"
      },
      "logic_json": {
        "branching": false
      },
      "meta_json": {
        "author": "Survey Team"
      }
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
          const response = pm.response.json();
          pm.environment.set('survey_version_id', response.survey_version_id);
          pm.test('Survey version created successfully', function() {
              pm.expect(response.status).to.eql('draft');
          });
      }
    language: text/javascript
order: 1000
