$kind: http-request
url: "{{base_url}}/v1/notifications/{{message_id}}/attempts"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "provider": "sendgrid",
      "status": "sent",
      "provider_ref": "SG-{{$timestamp}}"
    }
order: 4000
