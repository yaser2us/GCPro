$kind: http-request
name: "8C.4 Verify: Notification Queued After PAYMENT_FAILED"
description: After PAYMENT_FAILED fires, verify a push notification was queued
  via template 'payment_failed'.
url: "{{base_url}}/api/v1/notifications/messages?trigger_event_id={{intent_id}}\
  &trigger_event_type=PAYMENT_FAILED"
method: GET
headers:
  Authorization: Bearer {{token}}
queryParams:
  trigger_event_id: "{{intent_id}}"
  trigger_event_type: PAYMENT_FAILED
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 4000
