$kind: http-request
description: Update template - creates new version, archives old
url: "{{base_url}}/v1/notification-templates/{{template_id}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "code": "order_shipped",
      "name": "Order Shipped Notification (Updated)",
      "channel": "email",
      "locale": "en",
      "subject_tpl": "🚚 Your order #{{order_id}} is on the way!",
      "body_tpl": "Hello {{first_name}},\n\nExciting news! Your order #{{order_id}} has shipped.\n\nEstimated delivery: {{delivery_date}}\nTrack your package: {{tracking_url}}\n\nThank you for choosing us!",
      "variables_schema_json": {
        "first_name": { "type": "string", "required": true },
        "order_id": { "type": "string", "required": true },
        "tracking_url": { "type": "string", "required": true },
        "delivery_date": { "type": "string", "required": false }
      }
    }
order: 3000
