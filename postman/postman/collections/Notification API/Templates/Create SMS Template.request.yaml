$kind: http-request
description: Create SMS template (no subject)
url: "{{base_url}}/v1/notification-templates"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "code": "order_shipped",
      "name": "Order Shipped SMS",
      "channel": "sms",
      "locale": "en",
      "body_tpl": "Hi {{first_name}}, your order #{{order_id}} has shipped! Track: {{tracking_url}}",
      "variables_schema_json": {
        "first_name": { "type": "string", "required": true },
        "order_id": { "type": "string", "required": true },
        "tracking_url": { "type": "string", "required": true }
      },
      "version": "v1"
    }
order: 2000
