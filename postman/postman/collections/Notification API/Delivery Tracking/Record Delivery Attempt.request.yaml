$kind: http-request
description: |-
  Record delivery attempt result (success or failure)

  Idempotency: Via Idempotency-Key header
url: "{{base_url}}/v1/notifications/{{message_id}}/attempts"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "provider": "sendgrid",
      "status": "sent",
      "provider_ref": "SG-MESSAGE-ID-12345",
      "provider_payload": {
        "message_id": "SG-MESSAGE-ID-12345",
        "timestamp": "2026-03-16T10:30:00Z"
      }
    }
order: 1000
