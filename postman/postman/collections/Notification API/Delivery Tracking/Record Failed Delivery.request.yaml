$kind: http-request
description: Record failed delivery attempt with error details
url: "{{base_url}}/v1/notifications/{{message_id}}/attempts"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "provider": "sendgrid",
      "status": "failed",
      "error_code": "SMTP_ERROR",
      "error_message": "Recipient mailbox is full",
      "provider_payload": {
        "error_details": "550 Mailbox full"
      }
    }
order: 2000
