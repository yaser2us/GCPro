$kind: http-request
description: |-
  Schedule notification for specific future time

  Idempotency: Via Idempotency-Key header
url: "{{base_url}}/v1/notifications/{{message_id}}/schedules"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "schedule_type": "one_time",
      "fire_at": "2026-03-17T10:00:00Z",
      "meta": {
        "description": "Send tomorrow at 10am"
      }
    }
order: 1000
