$kind: http-request
description: Create multi-step reminder workflow schedule
url: "{{base_url}}/v1/notifications/{{message_id}}/schedules"
method: POST
headers:
  Content-Type: application/json
  Idempotency-Key: "{{$guid}}"
body:
  type: text
  content: |-
    {
      "schedule_type": "reminder_workflow",
      "step_no": 1,
      "delay_minutes": 1440,
      "fire_at": "2026-03-17T10:00:00Z",
      "meta": {
        "workflow": "payment_reminder",
        "step_description": "First reminder - 24 hours before due"
      }
    }
order: 2000
