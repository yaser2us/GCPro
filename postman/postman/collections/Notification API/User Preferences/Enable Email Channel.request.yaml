$kind: http-request
description: Enable and configure email notifications
url: "{{base_url}}/v1/notification-preferences/{{preference_id}}/channels/email"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "channel": "email",
      "enabled": true,
      "destination": "user@example.com",
      "priority": 1,
      "meta": {
        "verified": true,
        "verified_at": "2026-03-16T10:00:00Z"
      }
    }
order: 4000
