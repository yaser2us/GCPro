$kind: collection
description: |-
  Person Management - Identity and Relationship Tracking

  Source: specs/person/person.pillar.v2.yml (v2.1.0)

  v2.1.0 additions:
  - L3: Update Person now accepts income_level + media_channel
  - L9: Add NRIC auto-populates person.dob + person.gender
variables:
  base_url: http://localhost:3000
  user_id: "1"
  person_id: "1"
  identity_id: "1"
  relationship_id: "1"
scripts:
  - type: http:beforeRequest
    code: |-
      // Add X-User-Id header
      pm.request.headers.add({
        key: 'X-User-Id',
        value: pm.collectionVariables.get('user_id') || '1'
      });

      // Add Idempotency-Key for POST/PUT requests
      if (pm.request.method === 'POST' || pm.request.method === 'PUT') {
        const existingKey = pm.request.headers.get('Idempotency-Key');
        if (!existingKey) {
          pm.request.headers.add({
            key: 'Idempotency-Key',
            value: pm.variables.replaceIn('{{$guid}}')
          });
        }
      }
    language: text/javascript
