$kind: http-request
description: |-
  Add identity document to person

  Idempotency: Via UNIQUE(person_id, identity_type, identity_number)
url: "{{base_url}}/v1/persons/{{person_id}}/identities"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id_type": "passport",
      "id_no": "X12345678",
      "country": "US"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("identity_id", jsonData.identity_id);
    language: text/javascript
order: 1000
