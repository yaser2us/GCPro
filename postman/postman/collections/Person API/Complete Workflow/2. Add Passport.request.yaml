$kind: http-request
url: "{{base_url}}/v1/persons/{{person_id}}/identities"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id_type": "passport",
      "id_no": "AB9876543",
      "country": "US"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("passport_id", jsonData.identity_id);
    language: text/javascript
order: 2000
