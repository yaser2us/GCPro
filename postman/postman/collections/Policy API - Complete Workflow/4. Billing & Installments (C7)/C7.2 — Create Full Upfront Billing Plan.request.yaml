$kind: http-request
description: C7 — Full upfront payment. Creates 1 installment for full amount due now.
url: "{{base_url}}/api/v1/policy/{{policy_id}}/billing-plan/create"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "billing_type": "full",
      "total_amount": 9600.00,
      "idempotency_key": "billing-full-{{$guid}}"
    }
order: 2000
