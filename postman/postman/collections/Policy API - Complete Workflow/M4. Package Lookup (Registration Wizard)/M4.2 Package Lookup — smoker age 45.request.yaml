$kind: http-request
description: |-
  M4 — Auto-select package for a 45-year-old smoker.

  Expected: smoker_status = smoker, different annual_fee_amount than non-smoker.
url: "{{base_url}}/api/v1/policy/package-lookup?dob=1981-01-01&smoker=true"
method: GET
headers:
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
queryParams:
  - key: dob
    value: 1981-01-01
    description: Applicant DOB → age 45
  - key: smoker
    value: "true"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });

      pm.test('smoker_status is smoker', function () {
      pm.expect(pm.response.json().smoker_status).to.equal('smoker'); });
    language: text/javascript
order: 2000
