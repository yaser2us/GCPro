$kind: http-request
description: Evaluates deposit requirement status
url: "{{base_url}}/api/v1/policy/{{policy_id}}/deposit/evaluate"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "current_balance": 8000.00,
      "idempotency_key": "deposit-{{$guid}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          console.log('✅ Deposit Requirement Evaluated');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 1000
