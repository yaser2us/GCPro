$kind: http-request
description: Adds a dependent member to the policy
url: "{{base_url}}/api/v1/policy/{{policy_id}}/members/add"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "person_id": "1001",
      "role": "dependent"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });

      if (pm.response.code === 201) {
          console.log('✅ Member Added');
      }
    language: text/javascript
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
order: 1000
