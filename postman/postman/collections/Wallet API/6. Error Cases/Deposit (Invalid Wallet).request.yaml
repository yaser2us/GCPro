$kind: http-request
description: "Tests guard: wallet must exist for deposit."
url: "{{base_url}}/v1/wallets/999999/deposit"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: ADMIN
  Idempotency-Key: error-deposit-{{$timestamp}}
body:
  type: text
  content: |-
    {
      "wallet_id": "999999",
      "amount": 100,
      "currency": "COIN",
      "type": "manual_deposit"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 404 (Not Found)", function () {
          pm.response.to.have.status(404);
      });

      pm.test("Error code is WALLET_NOT_FOUND", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.error.code).to.eql('WALLET_NOT_FOUND');
      });
    language: text/javascript
order: 3000
