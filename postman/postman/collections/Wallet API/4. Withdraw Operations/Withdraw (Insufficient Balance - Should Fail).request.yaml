$kind: http-request
description: |-
  Attempts to withdraw more than available balance.

  This should fail with INSUFFICIENT_BALANCE error.
url: "{{base_url}}/v1/wallets/{{wallet_id}}/withdraw"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: ADMIN
  Idempotency-Key: withdraw-insufficient-{{$timestamp}}
body:
  type: text
  content: |-
    {
      "wallet_id": "{{wallet_id}}",
      "amount": 999999,
      "currency": "COIN",
      "type": "manual_withdrawal"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 409 (Conflict)", function () {
          pm.response.to.have.status(409);
      });

      pm.test("Error code is INSUFFICIENT_BALANCE", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.error.code).to.eql('INSUFFICIENT_BALANCE');
      });
    language: text/javascript
order: 2000
