$kind: http-request
description: Creates a merchant account for business operations.
url: "{{base_url}}/v1/accounts"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: ADMIN
  Idempotency-Key: create-account-merchant-{{$timestamp}}
body:
  type: text
  content: |-
    {
      "type": "merchant"
    }
order: 2000
