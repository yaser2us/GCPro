$kind: http-request
description: Large deposit for testing balance calculations.
url: "{{base_url}}/v1/wallets/{{wallet_id}}/deposit"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: ADMIN
  Idempotency-Key: deposit-large-{{$timestamp}}
body:
  type: text
  content: |-
    {
      "wallet_id": "{{wallet_id}}",
      "amount": 1000,
      "currency": "COIN",
      "type": "promotional_bonus",
      "meta_json": {
        "campaign": "new_user_bonus",
        "promotion_id": "PROMO2024"
      }
    }
order: 3000
