$kind: http-request
description: Verify password credential (bcrypt comparison)
url: "{{base_url}}/v1/users/{{user_id}}/credentials/verify"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "password",
      "secret": "SecureP@ssw0rd123"
    }
order: 3000
