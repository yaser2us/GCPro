$kind: http-request
description: |-
  Create password credential (hashed with bcrypt)

  Idempotency: Via UNIQUE(user_id, type)
url: "{{base_url}}/v1/users/{{user_id}}/credentials"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "password",
      "secret": "SecureP@ssw0rd123"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("credential_id", jsonData.credential_id);
    language: text/javascript
order: 1000
