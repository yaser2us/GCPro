$kind: http-request
url: "{{base_url}}/v1/users/{{new_user_id}}/credentials"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "type": "password",
      "secret": "Welcome123!"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      pm.environment.set("new_credential_id", jsonData.credential_id);
    language: text/javascript
order: 2000
