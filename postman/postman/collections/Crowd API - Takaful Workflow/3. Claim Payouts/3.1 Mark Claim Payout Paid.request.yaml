$kind: http-request
description: "Record that a claim payout has been successfully disbursed. Emits
  CROWD_CLAIM_PAYOUT_PAID event (triggers Wallet pillar). Payout status: pending
  → paid."
url: "{{base_url}}/api/v1/crowd/claim-payouts/{{payout_id}}/mark-paid"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "payoutRef": "PAYOUT-2026-001",
      "ledgerTxnId": 5001
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 1000
