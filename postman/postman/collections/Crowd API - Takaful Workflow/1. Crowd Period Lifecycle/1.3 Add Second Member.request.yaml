$kind: http-request
description: Add a second insurant to demonstrate equal-share cost distribution.
url: "{{base_url}}/api/v1/crowd/periods/{{period_id}}/members"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "insurantId": 102,
      "packageId": 5,
      "reasonCode": "new_enrollment",
      "packageCodeSnapshot": "BASIC",
      "ageYearsSnapshot": 45,
      "smokerSnapshot": true,
      "meta": {}
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 3000
