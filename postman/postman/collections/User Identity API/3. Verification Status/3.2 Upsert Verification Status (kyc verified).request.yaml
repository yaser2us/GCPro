$kind: http-request
url: "{{base_url}}/api/v1/user-identity/verification-status"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "account_id": {{target_account_id}},
      "type": "kyc",
      "status": "verified",
      "meta_json": {
        "provider": "ekyc_provider",
        "reference": "KYC-2026-0001"
      }
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test('Type is kyc', () => pm.expect(json.type).to.eql('kyc'));
    language: text/javascript
order: 2000
