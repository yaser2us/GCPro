$kind: http-request
url: "{{base_url}}/api/v1/user-identity/registration-tokens"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "purpose": "registration",
      "channel_type": "email",
      "channel_value": "newuser@example.com",
      "token": "magic-link-token-abc123",
      "invite_code": "INVITE2026",
      "expires_at": "2026-12-31T23:59:59Z"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: pm.test('Status is 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 2000
