$kind: http-request
url: "{{base_url}}/api/v1/user-identity/registration-tokens/{{registration_toke\
  n_id}}/verify"
method: POST
headers:
  Content-Type: application/json
  x-user-id: "{{admin_user_id}}"
  x-user-role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "otp_plain": "123456"
    }
scripts:
  - type: beforeRequest
    code: "pm.request.headers.add({ key: 'Idempotency-Key', value:
      pm.variables.replaceIn('{{$guid}}') });"
    language: text/javascript
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      const json = pm.response.json();

      pm.test('Status is verified', () =>
      pm.expect(json.status).to.eql('verified'));
    language: text/javascript
order: 3000
