$kind: http-request
description: Admin-only. Voids an issued receipt. Requires payment:admin permission.
url: "{{base_url}}/api/v1/receipt/{{receipt_id}}/void"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: "{{admin_user_role}}"
body:
  type: text
  content: "{}"
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          const response = pm.response.json();
          console.log('✅ Receipt Voided:', response.receiptId);
          console.log('   Voided At:', response.voidedAt);
      }
    language: text/javascript
order: 2000
