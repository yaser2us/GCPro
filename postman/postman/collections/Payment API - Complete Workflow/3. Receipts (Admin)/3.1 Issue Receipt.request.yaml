$kind: http-request
description: Admin-only. Issues a receipt for a succeeded payment intent. Saves
  receipt_id to collection variables.
url: "{{base_url}}/api/v1/receipt"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{admin_user_id}}"
  X-User-Role: "{{admin_user_role}}"
body:
  type: text
  content: |-
    {
      "intentId": {{intent_id}}
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 201', function () {
          pm.response.to.have.status(201);
      });

      if (pm.response.code === 201) {
          const response = pm.response.json();
          if (response.receiptId) {
              pm.collectionVariables.set('receipt_id', response.receiptId);
              console.log('✅ Receipt Issued:', response.receiptId);
              console.log('   Receipt No:', response.receiptNo);
          }
      }
    language: text/javascript
order: 1000
