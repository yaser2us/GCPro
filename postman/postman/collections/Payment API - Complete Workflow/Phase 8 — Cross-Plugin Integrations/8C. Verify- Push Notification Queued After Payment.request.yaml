$kind: http-request
name: "8C. Verify: Push Notification Queued After Payment"
description: "Phase 8C: After PAYMENT_SUCCEEDED, PaymentNotificationConsumer
  queues a push notification via template 'payment_succeeded'. Idempotency key:
  payment_succeeded_intent_{intent_id}."
url: "{{base_url}}/api/v1/notifications/messages?trigger_event_id={{intent_id}}\
  &trigger_event_type=PAYMENT_SUCCEEDED"
method: GET
headers:
  Authorization: Bearer {{token}}
queryParams:
  trigger_event_id: "{{intent_id}}"
  trigger_event_type: PAYMENT_SUCCEEDED
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
