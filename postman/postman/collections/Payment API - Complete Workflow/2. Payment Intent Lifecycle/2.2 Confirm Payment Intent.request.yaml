$kind: http-request
description: "Confirms a payment intent with the provider. Status transitions:
  created → processing. Creates a payment attempt."
url: "{{base_url}}/api/v1/payment-intent/{{intent_id}}/confirm"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: |-
    {
      "provider": "stripe",
      "paymentMethodId": {{payment_method_id}},
      "returnUrl": "https://app.example.com/payment/return"
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          const response = pm.response.json();
          console.log('✅ Intent Confirmed - Status:', response.status);
          if (response.redirectUrl) {
              console.log('   Redirect URL:', response.redirectUrl);
          }
      }
    language: text/javascript
order: 2000
