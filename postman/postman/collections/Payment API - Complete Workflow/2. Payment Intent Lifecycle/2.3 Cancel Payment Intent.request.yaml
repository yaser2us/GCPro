$kind: http-request
description: Cancels a payment intent. Valid from 'created' or 'processing' status.
url: "{{base_url}}/api/v1/payment-intent/{{intent_id}}/cancel"
method: POST
headers:
  Content-Type: application/json
  X-User-Id: "{{user_id}}"
  X-User-Role: "{{user_role}}"
body:
  type: text
  content: "{}"
scripts:
  - type: beforeRequest
    code: |-
      pm.request.headers.add({
          key: 'Idempotency-Key',
          value: pm.variables.replaceIn('{{$guid}}'),
      });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      if (pm.response.code === 200) {
          const response = pm.response.json();
          console.log('✅ Intent Cancelled - Status:', response.status);
      }
    language: text/javascript
order: 3000
