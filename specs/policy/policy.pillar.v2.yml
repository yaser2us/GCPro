version: "2.0.0"
spec_id: "policy.pillar.v2"
domain: "policy"
plugin: "policy"

# ──────────────────────────────────────────────────────────────────────────────
# OWNERSHIP
# ──────────────────────────────────────────────────────────────────────────────

ownership:
  owner_plugin: "policy"
  owns_tables:
    - "policy"
    - "policy_package"
    - "policy_benefit_entitlement"
    - "policy_benefit_usage"
    - "policy_benefit_usage_event"
    - "policy_billing_plan"
    - "policy_deposit_requirement"
    - "policy_discount_applied"
    - "policy_installment"
    - "policy_member"
    - "policy_package_rate"
    - "policy_remediation_case"
    - "policy_status_event"
  cross_plugin_writes: false
  cross_plugin_integration:
    allowed_via:
      - "command_api"
      - "outbox_events"

# ──────────────────────────────────────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────────────────────────────────────

dependencies:
  corekit:
    transaction_wrapper: "withTxn"
    outbox_service: "OutboxService.emit"
    guard_helper: "guard"
    domain_error: "DomainError"

  core_tables_readonly:
    - table_name: "account"
      usage: "policy.account_id references account.id"
      access: "readonly_fk"
    - table_name: "person"
      usage: "policy.holder_person_id and policy_member.person_id reference person.id"
      access: "readonly_fk"
    - table_name: "wallet"
      usage: "policy_deposit_requirement.deposit_wallet_id references wallet.id"
      access: "readonly_fk"
    - table_name: "discount_program"
      usage: "policy_discount_applied.discount_program_id references discount_program.id"
      access: "readonly_fk"
    - table_name: "age_band"
      usage: "policy_package_rate.age_band_id references age_band.id"
      access: "readonly_fk"
    - table_name: "smoker_profile"
      usage: "policy_package_rate.smoker_profile_id references smoker_profile.id"
      access: "readonly_fk"
    - table_name: "benefit_catalog"
      usage: "Policy benefit entitlements reference benefit catalog"
      access: "readonly"

# ──────────────────────────────────────────────────────────────────────────────
# CONVENTIONS
# ──────────────────────────────────────────────────────────────────────────────

conventions:
  workflow_discipline:
    - "guard"
    - "write"
    - "emit"
    - "commit"

  status_mutation_policy: "Status fields may only be mutated through commands."

  outbox:
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"

  idempotency:
    required_header: "Idempotency-Key"
    default_scope: "actor_user_id + command_name"
    db_strategy:
      - "UNIQUE(idempotency_key) where applicable"
      - "MySQL ON DUPLICATE KEY UPDATE id = LAST_INSERT_ID(id)"
      - "policy: UNIQUE(policy_number) prevents duplicate policies"
      - "policy_package: UNIQUE(code) prevents duplicate packages"
      - "policy_benefit_entitlement: UNIQUE(policy_id, status) ensures single active entitlement per policy"
      - "policy_benefit_usage: UNIQUE(policy_id, period_key, item_code) prevents duplicate usage tracking"
      - "policy_benefit_usage_event: UNIQUE(idempotency_key) prevents duplicate usage events"
      - "policy_deposit_requirement: UNIQUE(policy_id) ensures single requirement record per policy"
      - "policy_installment: UNIQUE(idempotency_key) and UNIQUE(billing_plan_id, installment_no) prevent duplicate installments"
      - "policy_member: UNIQUE(policy_id, person_id) prevents duplicate policy members"
      - "policy_package_rate: UNIQUE(package_id, age_band_id, smoker_profile_id, rate_version, effective_from) prevents duplicate rates"

# ──────────────────────────────────────────────────────────────────────────────
# SCHEMA
# ──────────────────────────────────────────────────────────────────────────────

schema:
  tables:
    policy:
      description: "Core policy entity representing insurance policies with lifecycle management"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_number:
          type: "varchar"
          length: 40
          nullable: false
          description: "Unique policy number for external identification"
        account_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to account"
        holder_person_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to person (policy holder)"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "pending"
          description: "Policy lifecycle status"
        start_at:
          type: "datetime"
          nullable: true
          description: "Policy effective start date"
        end_at:
          type: "datetime"
          nullable: true
          description: "Policy expiration/end date"
        auto_renew:
          type: "tinyint"
          length: 1
          nullable: false
          default: "0"
          description: "Auto-renewal flag (0=no, 1=yes)"
        package_code_snapshot:
          type: "varchar"
          length: 32
          nullable: true
          description: "Snapshot of package code at policy creation"
        rule_version:
          type: "varchar"
          length: 40
          nullable: true
          description: "Rule version applied to this policy"
        annual_fee_grace_days:
          type: "int"
          nullable: false
          default: "7"
          description: "Grace period days for annual fee payment"
        annual_fee_retry_limit:
          type: "int"
          nullable: false
          default: "3"
          description: "Maximum retry attempts for annual fee payment"
        deposit_topup_grace_days:
          type: "int"
          nullable: false
          default: "14"
          description: "Grace period days for deposit top-up"
        meta:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_policy_number"
            columns: ["policy_number"]
        indexes:
          - name: "idx_policy_account"
            columns: ["account_id"]
          - name: "idx_policy_status"
            columns: ["status"]
          - name: "idx_policy_period"
            columns: ["start_at", "end_at"]

    policy_package:
      description: "Policy package catalog defining coverage tiers and parameters"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        code:
          type: "varchar"
          length: 32
          nullable: false
          description: "Unique package code"
        name:
          type: "varchar"
          length: 120
          nullable: false
          description: "Package display name"
        monthly_max_cap_default:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Default monthly maximum cap amount"
        deposit_capacity_multiplier:
          type: "decimal"
          precision: [8, 3]
          nullable: false
          default: "2.000"
          description: "Multiplier for deposit capacity calculation"
        min_deposit_pct:
          type: "decimal"
          precision: [8, 3]
          nullable: false
          default: "0.500"
          description: "Minimum deposit percentage (50%)"
        warning_pct:
          type: "decimal"
          precision: [8, 3]
          nullable: false
          default: "0.600"
          description: "Warning threshold percentage (60%)"
        urgent_pct:
          type: "decimal"
          precision: [8, 3]
          nullable: false
          default: "0.500"
          description: "Urgent threshold percentage (50%)"
        meta:
          type: "json"
          nullable: true
          description: "Additional package metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_policy_package_code"
            columns: ["code"]
        indexes:
          - name: "idx_policy_package_name"
            columns: ["name"]

    policy_benefit_entitlement:
      description: "Policy benefit entitlements linked to benefit catalog"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        catalog_code_snapshot:
          type: "varchar"
          length: 64
          nullable: false
          description: "Snapshot of benefit catalog code"
        catalog_version_snapshot:
          type: "varchar"
          length: 40
          nullable: false
          description: "Snapshot of benefit catalog version"
        level_code_snapshot:
          type: "varchar"
          length: 32
          nullable: false
          description: "Snapshot of benefit level code"
        status:
          type: "varchar"
          length: 16
          nullable: false
          default: "active"
          description: "Entitlement status (active, expired, superseded)"
        start_at:
          type: "datetime"
          nullable: true
          description: "Entitlement start date"
        end_at:
          type: "datetime"
          nullable: true
          description: "Entitlement end date"
        entitlement_json:
          type: "json"
          nullable: false
          description: "Entitlement details and rules"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_policy_entitlement_active"
            columns: ["policy_id", "status"]
        indexes:
          - name: "idx_policy_entitlement_policy"
            columns: ["policy_id"]
        foreign_keys:
          - name: "fk_entitlement_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_benefit_usage:
      description: "Tracks benefit usage and reservations per policy and period"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        period_key:
          type: "varchar"
          length: 32
          nullable: false
          description: "Period identifier (e.g., '2024-01', '2024-Q1')"
        item_code:
          type: "varchar"
          length: 64
          nullable: false
          description: "Benefit item code"
        used_amount:
          type: "decimal"
          precision: [18, 2]
          nullable: false
          default: "0.00"
          description: "Total amount used"
        used_count:
          type: "int"
          unsigned: true
          nullable: false
          default: "0"
          description: "Total count used"
        reserved_amount:
          type: "decimal"
          precision: [18, 2]
          nullable: false
          default: "0.00"
          description: "Amount reserved but not yet confirmed"
        reserved_count:
          type: "int"
          unsigned: true
          nullable: false
          default: "0"
          description: "Count reserved but not yet confirmed"
        status:
          type: "varchar"
          length: 16
          nullable: false
          default: "open"
          description: "Usage status (open, closed, archived)"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last update timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_policy_usage"
            columns: ["policy_id", "period_key", "item_code"]
        indexes:
          - name: "idx_policy_usage_policy_period"
            columns: ["policy_id", "period_key"]
          - name: "idx_policy_usage_status"
            columns: ["status"]
        foreign_keys:
          - name: "fk_usage_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_benefit_usage_event:
      description: "Immutable event log of benefit usage changes"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        usage_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to policy_benefit_usage"
        event_type:
          type: "varchar"
          length: 16
          nullable: false
          description: "Event type (reserve, confirm, release, adjust)"
        ref_type:
          type: "varchar"
          length: 32
          nullable: true
          description: "Reference entity type (e.g., 'claim')"
        ref_id:
          type: "varchar"
          length: 128
          nullable: true
          description: "Reference entity ID"
        amount:
          type: "decimal"
          precision: [18, 2]
          nullable: false
          default: "0.00"
          description: "Amount affected by this event"
        count:
          type: "int"
          unsigned: true
          nullable: false
          default: "0"
          description: "Count affected by this event"
        idempotency_key:
          type: "varchar"
          length: 128
          nullable: false
          description: "Idempotency key for event deduplication"
        payload_json:
          type: "json"
          nullable: true
          description: "Additional event payload"
        occurred_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Event occurrence timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_usage_event_idem"
            columns: ["idempotency_key"]
        indexes:
          - name: "idx_usage_event_usage_time"
            columns: ["usage_id", "occurred_at"]
          - name: "idx_usage_event_ref"
            columns: ["ref_type", "ref_id"]
        foreign_keys:
          - name: "fk_usage_event_usage"
            columns: ["usage_id"]
            references:
              table: "policy_benefit_usage"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"

    policy_billing_plan:
      description: "Policy billing plans defining payment schedules"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        billing_type:
          type: "varchar"
          length: 20
          nullable: false
          description: "Billing type (annual, monthly, quarterly)"
        total_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Total billing amount"
        installment_count:
          type: "int"
          nullable: false
          default: "1"
          description: "Number of installments"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "pending"
          description: "Billing plan status (pending, active, completed, cancelled)"
        activated_at:
          type: "datetime"
          nullable: true
          description: "Plan activation timestamp"
        completed_at:
          type: "datetime"
          nullable: true
          description: "Plan completion timestamp"
        meta:
          type: "json"
          nullable: true
          description: "Additional billing metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_billing_plan_policy"
            columns: ["policy_id"]
          - name: "idx_billing_plan_status"
            columns: ["status"]
        foreign_keys:
          - name: "fk_billing_plan_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_deposit_requirement:
      description: "Policy deposit requirement tracking and thresholds"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        monthly_max_cap:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Monthly maximum cap for this policy"
        deposit_capacity_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Total deposit capacity (monthly_max_cap * multiplier)"
        min_required_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Minimum required deposit amount"
        warning_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Warning threshold amount"
        urgent_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Urgent threshold amount"
        deposit_wallet_id:
          type: "bigint"
          nullable: true
          description: "Foreign key to wallet for deposit"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "ok"
          description: "Deposit status (ok, warning, urgent, critical)"
        last_evaluated_at:
          type: "datetime"
          nullable: true
          description: "Last evaluation timestamp"
        meta:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_deposit_req_policy"
            columns: ["policy_id"]
        indexes:
          - name: "idx_deposit_req_status"
            columns: ["status"]
        foreign_keys:
          - name: "fk_deposit_req_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_discount_applied:
      description: "Records of discounts applied to policies"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        discount_program_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to discount_program"
        amount_applied:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Discount amount applied"
        applied_to:
          type: "varchar"
          length: 40
          nullable: false
          default: "annual_fee"
          description: "Target of discount (annual_fee, deposit, etc.)"
        applied_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Discount application timestamp"
        meta:
          type: "json"
          nullable: true
          description: "Additional discount metadata"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_policy_discount_policy"
            columns: ["policy_id"]
          - name: "idx_policy_discount_program"
            columns: ["discount_program_id"]
        foreign_keys:
          - name: "fk_policy_discount_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"
          - name: "fk_policy_discount_program"
            columns: ["discount_program_id"]
            references:
              table: "discount_program"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_installment:
      description: "Individual installment records for billing plans"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        billing_plan_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy_billing_plan"
        installment_no:
          type: "int"
          nullable: false
          description: "Installment sequence number"
        amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Installment amount"
        due_at:
          type: "datetime"
          nullable: false
          description: "Due date for this installment"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "pending"
          description: "Installment status (pending, paid, overdue, waived)"
        paid_at:
          type: "datetime"
          nullable: true
          description: "Payment timestamp"
        payment_method:
          type: "varchar"
          length: 20
          nullable: true
          description: "Payment method used"
        payment_ref:
          type: "varchar"
          length: 64
          nullable: true
          description: "Payment reference ID"
        idempotency_key:
          type: "varchar"
          length: 64
          nullable: false
          description: "Idempotency key for payment processing"
        attempts:
          type: "int"
          nullable: false
          default: "0"
          description: "Payment attempt counter"
        last_attempt_at:
          type: "datetime"
          nullable: true
          description: "Last payment attempt timestamp"
        failure_code:
          type: "varchar"
          length: 60
          nullable: true
          description: "Payment failure code"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_installment_idem"
            columns: ["idempotency_key"]
          - name: "uk_installment_no"
            columns: ["billing_plan_id", "installment_no"]
        indexes:
          - name: "idx_installment_plan_status"
            columns: ["billing_plan_id", "status"]
          - name: "idx_installment_due"
            columns: ["due_at"]
          - name: "idx_installment_payment_ref"
            columns: ["payment_ref"]
        foreign_keys:
          - name: "fk_installment_plan"
            columns: ["billing_plan_id"]
            references:
              table: "policy_billing_plan"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_member:
      description: "Policy members including holder and dependents"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        person_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to person"
        role:
          type: "varchar"
          length: 20
          nullable: false
          default: "dependent"
          description: "Member role (holder, dependent, beneficiary)"
        dob_snapshot:
          type: "date"
          nullable: true
          description: "Date of birth snapshot"
        age_years_snapshot:
          type: "int"
          nullable: true
          description: "Age in years snapshot"
        smoker_snapshot:
          type: "tinyint"
          length: 1
          nullable: true
          description: "Smoker status snapshot (0=no, 1=yes)"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "active"
          description: "Member status (active, removed, suspended)"
        added_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Member addition timestamp"
        removed_at:
          type: "datetime"
          nullable: true
          description: "Member removal timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_policy_person"
            columns: ["policy_id", "person_id"]
        indexes:
          - name: "idx_policy_member_policy"
            columns: ["policy_id"]
          - name: "idx_policy_member_status"
            columns: ["policy_id", "status"]
        foreign_keys:
          - name: "fk_policy_member_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_package_rate:
      description: "Rate table for policy packages by age, smoker status, and version"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        package_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy_package"
        age_band_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to age_band"
        smoker_profile_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to smoker_profile"
        annual_fee_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Annual fee amount for this rate"
        monthly_max_cap:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Monthly maximum cap for this rate"
        weightage_factor:
          type: "decimal"
          precision: [12, 4]
          nullable: true
          description: "Weightage factor for crowdfunding calculations"
        rate_version:
          type: "varchar"
          length: 40
          nullable: false
          description: "Rate version identifier"
        effective_from:
          type: "datetime"
          nullable: false
          description: "Rate effective from date"
        effective_to:
          type: "datetime"
          nullable: true
          description: "Rate effective until date"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_rate_unique"
            columns: ["package_id", "age_band_id", "smoker_profile_id", "rate_version", "effective_from"]
        indexes:
          - name: "idx_rate_lookup"
            columns: ["package_id", "age_band_id", "smoker_profile_id", "effective_from", "effective_to"]
          - name: "idx_rate_version"
            columns: ["rate_version"]
          - name: "fk_rate_age_band"
            columns: ["age_band_id"]
          - name: "fk_rate_smoker"
            columns: ["smoker_profile_id"]
        foreign_keys:
          - name: "fk_rate_age_band"
            columns: ["age_band_id"]
            references:
              table: "age_band"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"
          - name: "fk_rate_package"
            columns: ["package_id"]
            references:
              table: "policy_package"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"
          - name: "fk_rate_smoker"
            columns: ["smoker_profile_id"]
            references:
              table: "smoker_profile"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_remediation_case:
      description: "Remediation cases for policy compliance and issue resolution"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        reason_code:
          type: "varchar"
          length: 60
          nullable: false
          description: "Remediation reason code"
        status:
          type: "varchar"
          length: 20
          nullable: false
          default: "open"
          description: "Case status (open, in_progress, cleared, expired)"
        opened_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Case opening timestamp"
        grace_end_at:
          type: "datetime"
          nullable: true
          description: "Grace period end timestamp"
        cleared_at:
          type: "datetime"
          nullable: true
          description: "Case clearance timestamp"
        expired_at:
          type: "datetime"
          nullable: true
          description: "Case expiration timestamp"
        required_actions:
          type: "json"
          nullable: true
          description: "Required actions to resolve case"
        meta:
          type: "json"
          nullable: true
          description: "Additional case metadata"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_remediation_policy_status"
            columns: ["policy_id", "status"]
          - name: "idx_remediation_grace"
            columns: ["grace_end_at"]
        foreign_keys:
          - name: "fk_remediation_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    policy_status_event:
      description: "Immutable event log of policy status transitions and lifecycle events"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        policy_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to policy"
        event_type:
          type: "varchar"
          length: 60
          nullable: false
          description: "Event type identifier"
        from_status:
          type: "varchar"
          length: 20
          nullable: true
          description: "Previous status before transition"
        to_status:
          type: "varchar"
          length: 20
          nullable: true
          description: "New status after transition"
        trigger_code:
          type: "varchar"
          length: 60
          nullable: false
          description: "Event trigger code"
        actor_type:
          type: "varchar"
          length: 20
          nullable: false
          description: "Actor type (user, system, admin)"
        actor_id:
          type: "bigint"
          nullable: true
          description: "Actor ID if applicable"
        note:
          type: "text"
          nullable: true
          description: "Event notes"
        payload:
          type: "json"
          nullable: true
          description: "Event payload data"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Event timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_policy_event_policy"
            columns: ["policy_id", "created_at"]
          - name: "idx_policy_event_type"
            columns: ["event_type"]
        foreign_keys:
          - name: "fk_policy_event_policy"
            columns: ["policy_id"]
            references:
              table: "policy"
              columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

# ──────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ──────────────────────────────────────────────────────────────────────────────

resources:
  - name: "Policy"
    kind: "aggregate"
    table: "policy"
    primary_key: "id"
    statuses: ["pending", "active", "suspended", "expired", "cancelled"]
    api_surface:
      - "create"
      - "read"
      - "update"
      - "activate"
      - "suspend"
      - "cancel"
      - "renew"

  - name: "PolicyPackage"
    kind: "resource"
    table: "policy_package"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "update"
      - "list"

  - name: "PolicyBenefitEntitlement"
    kind: "resource"
    table: "policy_benefit_entitlement"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "update"

  - name: "PolicyBenefitUsage"
    kind: "resource"
    table: "policy_benefit_usage"
    primary_key: "id"
    api_surface:
      - "read"
      - "reserve"
      - "confirm"
      - "release"

  - name: "PolicyBenefitUsageEvent"
    kind: "resource"
    table: "policy_benefit_usage_event"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"

  - name: "PolicyBillingPlan"
    kind: "aggregate"
    table: "policy_billing_plan"
    primary_key: "id"
    statuses: ["pending", "active", "completed", "cancelled"]
    api_surface:
      - "create"
      - "read"
      - "activate"
      - "complete"
      - "cancel"

  - name: "PolicyDepositRequirement"
    kind: "resource"
    table: "policy_deposit_requirement"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "update"
      - "evaluate"

  - name: "PolicyDiscountApplied"
    kind: "resource"
    table: "policy_discount_applied"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"

  - name: "PolicyInstallment"
    kind: "resource"
    table: "policy_installment"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "pay"
      - "waive"

  - name: "PolicyMember"
    kind: "resource"
    table: "policy_member"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "update"
      - "remove"

  - name: "PolicyPackageRate"
    kind: "resource"
    table: "policy_package_rate"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "lookup"

  - name: "PolicyRemediationCase"
    kind: "aggregate"
    table: "policy_remediation_case"
    primary_key: "id"
    statuses: ["open", "in_progress", "cleared", "expired"]
    api_surface:
      - "create"
      - "read"
      - "update"
      - "clear"

  - name: "PolicyStatusEvent"
    kind: "resource"
    table: "policy_status_event"
    primary_key: "id"
    api_surface:
      - "create"
      - "read"
      - "list"

# ──────────────────────────────────────────────────────────────────────────────
# AGGREGATES
# ──────────────────────────────────────────────────────────────────────────────

aggregates:
  POLICY:
    root_table: "policy"
    primary_key: "id"
    statuses: ["pending", "active", "suspended", "expired", "cancelled"]
    lifecycle:
      - "pending → active (activation)"
      - "active → suspended (suspension)"
      - "suspended → active (reactivation)"
      - "active → expired (expiration)"
      - "* → cancelled (cancellation)"

  POLICY_BILLING_PLAN:
    root_table: "policy_billing_plan"
    primary_key: "id"
    statuses: ["pending", "active", "completed", "cancelled"]
    lifecycle:
      - "pending → active (activation)"
      - "active → completed (all installments paid)"
      - "* → cancelled (cancellation)"

  POLICY_REMEDIATION_CASE:
    root_table: "policy_remediation_case"
    primary_key: "id"
    statuses: ["open", "in_progress", "cleared", "expired"]
    lifecycle:
      - "open → in_progress (action taken)"
      - "in_progress → cleared (resolved)"
      - "open → expired (grace period exceeded)"

