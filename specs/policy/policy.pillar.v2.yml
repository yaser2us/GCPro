# ──────────────────────────────────────────────────────────────────────────────
# COVERAGE
# ──────────────────────────────────────────────────────────────────────────────

coverage:
  tables:
    policy:
      touched_by:
        - "Policy.Create"
        - "Policy.Activate"
        - "Policy.AddMember"
        - "BenefitUsage.Reserve"
        - "DepositRequirement.Evaluate"
        - "RemediationCase.Open"

    policy_package:
      touched_by:
        - "Policy.Create"

    policy_benefit_entitlement:
      touched_by:
        - "BenefitUsage.Reserve"

    policy_benefit_usage:
      touched_by:
        - "BenefitUsage.Reserve"
        - "BenefitUsage.Confirm"
        - "BenefitUsage.Release"

    policy_benefit_usage_event:
      touched_by:
        - "BenefitUsage.Reserve"
        - "BenefitUsage.Confirm"
        - "BenefitUsage.Release"

    policy_billing_plan:
      touched_by:
        - "BillingPlan.Create"
        - "Installment.Pay"

    policy_deposit_requirement:
      touched_by:
        - "DepositRequirement.Evaluate"

    policy_discount_applied:
      touched_by:
        - "Policy.Create"

    policy_installment:
      touched_by:
        - "BillingPlan.Create"
        - "Installment.Pay"

    policy_member:
      touched_by:
        - "Policy.Create"
        - "Policy.AddMember"

    policy_package_rate:
      touched_by:
        - "Policy.Create"

    policy_remediation_case:
      touched_by:
        - "RemediationCase.Open"
        - "RemediationCase.Clear"

    policy_status_event:
      touched_by:
        - "Policy.Create"
        - "Policy.Activate"

  events:
    POLICY_CREATED:
      emitted_by:
        - "Policy.Create"

    POLICY_ACTIVATED:
      emitted_by:
        - "Policy.Activate"

    POLICY_MEMBER_ADDED:
      emitted_by:
        - "Policy.AddMember"

    BENEFIT_USAGE_RESERVED:
      emitted_by:
        - "BenefitUsage.Reserve"

    BENEFIT_USAGE_CONFIRMED:
      emitted_by:
        - "BenefitUsage.Confirm"

    BENEFIT_USAGE_RELEASED:
      emitted_by:
        - "BenefitUsage.Release"

    BILLING_PLAN_CREATED:
      emitted_by:
        - "BillingPlan.Create"

    INSTALLMENT_PAID:
      emitted_by:
        - "Installment.Pay"

    DEPOSIT_REQUIREMENT_EVALUATED:
      emitted_by:
        - "DepositRequirement.Evaluate"

    REMEDIATION_CASE_OPENED:
      emitted_by:
        - "RemediationCase.Open"

    REMEDIATION_CASE_CLEARED:
      emitted_by:
        - "RemediationCase.Clear"

  aggregate_transitions:
    POLICY:
      - transition: "pending → active"
        command: "Policy.Activate"
        event: "POLICY_ACTIVATED"
      - transition: "active → suspended"
        command: "Policy.Suspend"
        event: "POLICY_SUSPENDED"
      - transition: "suspended → active"
        command: "Policy.Reactivate"
        event: "POLICY_REACTIVATED"
      - transition: "active → expired"
        command: "Policy.Expire"
        event: "POLICY_EXPIRED"
      - transition: "* → cancelled"
        command: "Policy.Cancel"
        event: "POLICY_CANCELLED"

    POLICY_BILLING_PLAN:
      - transition: "pending → active"
        command: "BillingPlan.Activate"
        event: "BILLING_PLAN_ACTIVATED"
      - transition: "active → completed"
        command: "Installment.Pay"
        event: "BILLING_PLAN_COMPLETED"

    POLICY_REMEDIATION_CASE:
      - transition: "open → in_progress"
        command: "RemediationCase.Update"
        event: "REMEDIATION_CASE_UPDATED"
      - transition: "in_progress → cleared"
        command: "RemediationCase.Clear"
        event: "REMEDIATION_CASE_CLEARED"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  consumes:
    - event: "PAYMENT_SUCCEEDED"
      source_plugin: "payment"
      aggregate_type: "PAYMENT_INTENT"
      consumer: "src/plugins/policy/consumers/policy-payment-succeeded.consumer.ts"
      handler: "src/plugins/policy/handlers/policy-payment-succeeded.handler.ts"
      condition: "purpose_code == 'premium' AND ref_type == 'policy'"
      action: "Activate policy (pending → active), emit POLICY_ACTIVATED"
      idempotency: "Skip if policy.status already == 'active'"
