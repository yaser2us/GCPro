# ──────────────────────────────────────────────────────────────────────────────
# COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

commands:
  - name: "Policy.Create"
    description: "Create a new insurance policy"
    path: "/api/v1/policy/create"
    method: "POST"
    idempotent: true
    permissions: []
    input: "CreatePolicyInput"
    steps:
      - kind: "guard"
        description: "Validate account exists and is active"
        expression: "account.status === 'active'"
      - kind: "guard"
        description: "Validate holder person exists"
        expression: "holder_person exists"
      - kind: "guard"
        description: "Validate package exists"
        expression: "policy_package.code === input.package_code"
      - kind: "read"
        table: "policy_package_rate"
        where: "package_id = package.id AND rate_version = 'current'"
        description: "Load applicable rates"
      - kind: "insert"
        table: "policy"
        fields:
          - "policy_number"
          - "account_id"
          - "holder_person_id"
          - "status"
          - "package_code_snapshot"
          - "auto_renew"
          - "start_at"
      - kind: "insert"
        table: "policy_member"
        fields:
          - "policy_id"
          - "person_id"
          - "role"
          - "status"
        description: "Add holder as primary member"
      - kind: "insert"
        table: "policy_status_event"
        fields:
          - "policy_id"
          - "event_type"
          - "to_status"
          - "trigger_code"
          - "actor_type"
          - "actor_id"
      - kind: "outbox_emit"
        event: "POLICY_CREATED"
        aggregate_type: "POLICY"
        aggregate_id: "policy.id"
    response:
      policy_id: "string"
      policy_number: "string"
      status: "string"

  - name: "Policy.Activate"
    description: "Activate a pending policy to start coverage"
    path: "/api/v1/policy/:policyId/activate"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ActivatePolicyInput"
    steps:
      - kind: "read"
        table: "policy"
        where: "id = input.policy_id"
      - kind: "guard"
        description: "Policy must be in pending status"
        expression: "policy.status === 'pending'"
      - kind: "guard"
        description: "Validate all required preconditions met"
        expression: "policy has valid members and billing plan"
      - kind: "update"
        table: "policy"
        where: "id = input.policy_id"
        fields:
          - "status"
          - "start_at"
      - kind: "insert"
        table: "policy_status_event"
        fields:
          - "policy_id"
          - "event_type"
          - "from_status"
          - "to_status"
          - "trigger_code"
          - "actor_type"
          - "actor_id"
      - kind: "outbox_emit"
        event: "POLICY_ACTIVATED"
        aggregate_type: "POLICY"
        aggregate_id: "policy.id"
    response:
      policy_id: "string"
      status: "string"

  - name: "Policy.AddMember"
    description: "Add a member (dependent) to an existing policy"
    path: "/api/v1/policy/:policyId/members/add"
    method: "POST"
    idempotent: true
    permissions: []
    input: "AddPolicyMemberInput"
    steps:
      - kind: "read"
        table: "policy"
        where: "id = input.policy_id"
      - kind: "guard"
        description: "Policy must be active"
        expression: "policy.status === 'active'"
      - kind: "guard"
        description: "Person must exist"
        expression: "person exists"
      - kind: "upsert"
        table: "policy_member"
        unique_by: ["policy_id", "person_id"]
        fields:
          - "policy_id"
          - "person_id"
          - "role"
          - "status"
          - "added_at"
      - kind: "outbox_emit"
        event: "POLICY_MEMBER_ADDED"
        aggregate_type: "POLICY"
        aggregate_id: "policy.id"
    response:
      policy_member_id: "string"
      status: "string"

  - name: "BenefitUsage.Reserve"
    description: "Reserve benefit usage amount for a pending claim or transaction"
    path: "/api/v1/policy/benefit-usage/reserve"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ReserveBenefitUsageInput"
    steps:
      - kind: "read"
        table: "policy"
        where: "id = input.policy_id"
      - kind: "guard"
        description: "Policy must be active"
        expression: "policy.status === 'active'"
      - kind: "read"
        table: "policy_benefit_entitlement"
        where: "policy_id = input.policy_id AND status = 'active'"
        description: "Load active entitlements"
      - kind: "guard"
        description: "Validate benefit limits not exceeded"
        expression: "entitlement allows requested amount"
      - kind: "upsert"
        table: "policy_benefit_usage"
        unique_by: ["policy_id", "period_key", "item_code"]
        fields:
          - "policy_id"
          - "period_key"
          - "item_code"
          - "reserved_amount"
          - "reserved_count"
      - kind: "insert"
        table: "policy_benefit_usage_event"
        fields:
          - "usage_id"
          - "event_type"
          - "ref_type"
          - "ref_id"
          - "amount"
          - "count"
          - "idempotency_key"
      - kind: "outbox_emit"
        event: "BENEFIT_USAGE_RESERVED"
        aggregate_type: "POLICY"
        aggregate_id: "policy.id"
    response:
      usage_id: "string"
      reserved_amount: "number"

  - name: "BenefitUsage.Confirm"
    description: "Confirm reserved benefit usage and convert to used"
    path: "/api/v1/policy/benefit-usage/confirm"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ConfirmBenefitUsageInput"
    steps:
      - kind: "read"
        table: "policy_benefit_usage"
        where: "policy_id = input.policy_id AND period_key = input.period_key AND item_code = input.item_code"
      - kind: "guard"
        description: "Validate sufficient reserved amount"
        expression: "usage.reserved_amount >= input.amount"
      - kind: "update"
        table: "policy_benefit_usage"
        where: "id = usage.id"
        fields:
          - "used_amount"
          - "used_count"
          - "reserved_amount"
          - "reserved_count"
      - kind: "insert"
        table: "policy_benefit_usage_event"
        fields:
          - "usage_id"
          - "event_type"
          - "ref_type"
          - "ref_id"
          - "amount"
          - "count"
          - "idempotency_key"
      - kind: "outbox_emit"
        event: "BENEFIT_USAGE_CONFIRMED"
        aggregate_type: "POLICY"
        aggregate_id: "input.policy_id"
    response:
      usage_id: "string"
      used_amount: "number"

  - name: "BenefitUsage.Release"
    description: "Release reserved benefit usage without confirmation"
    path: "/api/v1/policy/benefit-usage/release"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ReserveBenefitUsageInput"
    steps:
      - kind: "read"
        table: "policy_benefit_usage"
        where: "policy_id = input.policy_id AND period_key = input.period_key AND item_code = input.item_code"
      - kind: "guard"
        description: "Validate sufficient reserved amount"
        expression: "usage.reserved_amount >= input.amount"
      - kind: "update"
        table: "policy_benefit_usage"
        where: "id = usage.id"
        fields:
          - "reserved_amount"
          - "reserved_count"
      - kind: "insert"
        table: "policy_benefit_usage_event"
        fields:
          - "usage_id"
          - "event_type"
          - "ref_type"
          - "ref_id"
          - "amount"
          - "count"
          - "idempotency_key"
      - kind: "outbox_emit"
        event: "BENEFIT_USAGE_RELEASED"
        aggregate_type: "POLICY"
        aggregate_id: "input.policy_id"
    response:
      usage_id: "string"
      reserved_amount: "number"

  - name: "BillingPlan.Create"
    description: "Create billing plan with installments for a policy"
    path: "/api/v1/policy/:policyId/billing-plan/create"
    method: "POST"
    idempotent: true
    permissions: []
    input: "CreateBillingPlanInput"
    steps:
      - kind: "read"
        table: "policy"
        where: "id = input.policy_id"
      - kind: "guard"
        description: "Policy must exist"
        expression: "policy exists"
      - kind: "insert"
        table: "policy_billing_plan"
        fields:
          - "policy_id"
          - "billing_type"
          - "total_amount"
          - "installment_count"
          - "status"
      - kind: "hook"
        description: "Generate installment records based on plan"
      - kind: "outbox_emit"
        event: "BILLING_PLAN_CREATED"
        aggregate_type: "POLICY_BILLING_PLAN"
        aggregate_id: "billing_plan.id"
    response:
      billing_plan_id: "string"
      installment_count: "number"

  - name: "Installment.Pay"
    description: "Process installment payment"
    path: "/api/v1/policy/installment/:installmentId/pay"
    method: "POST"
    idempotent: true
    permissions: []
    input: "PayInstallmentInput"
    steps:
      - kind: "read"
        table: "policy_installment"
        where: "id = input.installment_id"
      - kind: "guard"
        description: "Installment must be pending or overdue"
        expression: "installment.status IN ('pending', 'overdue')"
      - kind: "update"
        table: "policy_installment"
        where: "id = input.installment_id"
        fields:
          - "status"
          - "paid_at"
          - "payment_method"
          - "payment_ref"
      - kind: "hook"
        description: "Check if all installments paid, update billing plan status"
      - kind: "outbox_emit"
        event: "INSTALLMENT_PAID"
        aggregate_type: "POLICY_BILLING_PLAN"
        aggregate_id: "installment.billing_plan_id"
    response:
      installment_id: "string"
      status: "string"

  - name: "DepositRequirement.Evaluate"
    description: "Evaluate deposit requirement and update status"
    path: "/api/v1/policy/:policyId/deposit/evaluate"
    method: "POST"
    idempotent: false
    permissions: []
    input: "EvaluateDepositRequirementInput"
    steps:
      - kind: "read"
        table: "policy_deposit_requirement"
        where: "policy_id = input.policy_id"
      - kind: "guard"
        description: "Deposit requirement must exist"
        expression: "deposit_requirement exists"
      - kind: "hook"
        description: "Calculate status based on balance thresholds"
      - kind: "update"
        table: "policy_deposit_requirement"
        where: "policy_id = input.policy_id"
        fields:
          - "status"
          - "last_evaluated_at"
      - kind: "when"
        condition: "status changed to warning or urgent"
        then:
          - kind: "outbox_emit"
            event: "DEPOSIT_REQUIREMENT_EVALUATED"
            aggregate_type: "POLICY"
            aggregate_id: "input.policy_id"
    response:
      status: "string"
      current_amount: "number"
      required_amount: "number"

  - name: "RemediationCase.Open"
    description: "Open a remediation case for policy compliance issues"
    path: "/api/v1/policy/:policyId/remediation/open"
    method: "POST"
    idempotent: true
    permissions: []
    input: "CreateRemediationCaseInput"
    steps:
      - kind: "read"
        table: "policy"
        where: "id = input.policy_id"
      - kind: "guard"
        description: "Policy must exist"
        expression: "policy exists"
      - kind: "insert"
        table: "policy_remediation_case"
        fields:
          - "policy_id"
          - "reason_code"
          - "status"
          - "opened_at"
          - "grace_end_at"
          - "required_actions"
      - kind: "outbox_emit"
        event: "REMEDIATION_CASE_OPENED"
        aggregate_type: "POLICY_REMEDIATION_CASE"
        aggregate_id: "remediation_case.id"
    response:
      remediation_case_id: "string"
      grace_end_at: "string"

  - name: "RemediationCase.Clear"
    description: "Clear a remediation case after resolution"
    path: "/api/v1/policy/remediation/:caseId/clear"
    method: "POST"
    idempotent: true
    permissions: []
    input: "Actor"
    steps:
      - kind: "read"
        table: "policy_remediation_case"
        where: "id = input.case_id"
      - kind: "guard"
        description: "Case must be open or in_progress"
        expression: "remediation_case.status IN ('open', 'in_progress')"
      - kind: "update"
        table: "policy_remediation_case"
        where: "id = input.case_id"
        fields:
          - "status"
          - "cleared_at"
      - kind: "outbox_emit"
        event: "REMEDIATION_CASE_CLEARED"
        aggregate_type: "POLICY_REMEDIATION_CASE"
        aggregate_id: "input.case_id"
    response:
      remediation_case_id: "string"
      status: "string"

# ──────────────────────────────────────────────────────────────────────────────
