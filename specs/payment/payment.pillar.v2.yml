  architecture_diagram: |
    ┌──────────────────────────────────────────────────────────────────┐
    │                      PAYMENT PILLAR                              │
    ├──────────────────────────────────────────────────────────────────┤
    │                                                                  │
    │  Commands:                         Events (via Outbox):         │
    │  • PaymentIntent.Create            • PAYMENT_INTENT_CREATED     │
    │  • PaymentIntent.Confirm           • PAYMENT_INTENT_CONFIRMED   │
    │  • PaymentIntent.MarkSucceeded     • PAYMENT_SUCCEEDED ⭐       │
    │  • PaymentIntent.MarkFailed        • PAYMENT_FAILED ⭐          │
    │  • Receipt.Issue                   • PAYMENT_RECEIPT_ISSUED     │
    │                                                                  │
    └──────────┬──────────────────────┬────────────────────────────────┘
               │                      │
               │ sync reads           │ events via outbox
               │ + command calls      │
               ↓                      ↓
    ┌──────────────────┐   ┌─────────────────┐   ┌─────────────────┐
    │  POLICY PILLAR   │   │  WALLET PILLAR  │   │ NOTIFICATION    │
    ├──────────────────┤   ├─────────────────┤   ├─────────────────┤
    │ Consumes:        │   │ Consumes:       │   │ Consumes:       │
    │ PAYMENT_SUCCEEDED│   │ PAYMENT_SUCCEEDED│   │ All payment     │
    │                  │   │                 │   │ events          │
    │ Actions:         │   │ Actions:        │   │                 │
    │ • Activate policy│   │ • Credit wallet │   │ Sends:          │
