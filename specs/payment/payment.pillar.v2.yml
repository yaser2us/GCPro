  testing_strategy:
    end_to_end_test: |
      1. Create payment intent via PaymentIntent.Create
      2. Verify PAYMENT_INTENT_CREATED event emitted
      3. Confirm payment via PaymentIntent.Confirm
      4. Verify PAYMENT_INTENT_CONFIRMED event emitted
      5. Simulate webhook from provider indicating success
      6. Process webhook via Webhook.Process
      7. Verify PaymentIntent.MarkSucceeded called
      8. Verify PAYMENT_SUCCEEDED event emitted
      9. Verify policy activated (if purpose_code=premium)
      10. Verify wallet credited (if purpose_code=topup)
      11. Verify receipt issued
      12. Verify notification sent

    idempotency_test: |
      1. Create same payment intent twice with same idempotency key
      2. Verify only one payment_intent record created
      3. Verify second call returns same intent_id
      4. Process same webhook twice (same provider_event_id)
      5. Verify only one webhook_inbox record created
      6. Verify payment_intent not updated twice

    error_test: |
      1. Create payment intent with invalid amount (0 or negative)
      2. Verify DomainError thrown with clear message
      3. Confirm payment with unsupported provider
      4. Verify DomainError thrown
      5. Simulate webhook failure (invalid signature)
      6. Verify webhook marked as failed
      7. Simulate policy consumer failure
      8. Verify event marked for retry
      9. Verify alert sent after retry limit exceeded
