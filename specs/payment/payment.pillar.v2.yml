# ──────────────────────────────────────────────────────────────────────────────
# COVERAGE
# ──────────────────────────────────────────────────────────────────────────────

coverage:
  tables:
    payment_method:
      touched_by:
        - "PaymentMethod.Create"
        - "PaymentMethod.Delete"

    payment_intent:
      touched_by:
        - "PaymentIntent.Create"
        - "PaymentIntent.Confirm"
        - "PaymentIntent.MarkSucceeded"
        - "PaymentIntent.MarkFailed"
        - "PaymentIntent.Cancel"
        - "Webhook.Process"

    payment_receipt:
      touched_by:
        - "Receipt.Issue"
        - "Receipt.Void"

    payment_attempt:
      touched_by:
        - "PaymentIntent.Confirm"
        - "PaymentIntent.MarkSucceeded"
        - "PaymentIntent.MarkFailed"
        - "Webhook.Process"

    payment_event:
      touched_by:
        - "PaymentIntent.Create"
        - "PaymentIntent.Confirm"
        - "PaymentIntent.MarkSucceeded"
        - "PaymentIntent.MarkFailed"
        - "PaymentIntent.Cancel"

    payment_webhook_inbox:
      touched_by:
        - "Webhook.Receive"
        - "Webhook.Process"

  events:
    PAYMENT_METHOD_CREATED:
      emitted_by:
        - "PaymentMethod.Create"

    PAYMENT_METHOD_DELETED:
      emitted_by:
        - "PaymentMethod.Delete"

    PAYMENT_INTENT_CREATED:
      emitted_by:
        - "PaymentIntent.Create"

    PAYMENT_INTENT_CONFIRMED:
      emitted_by:
        - "PaymentIntent.Confirm"

    PAYMENT_SUCCEEDED:
      emitted_by:
        - "PaymentIntent.MarkSucceeded"

    PAYMENT_FAILED:
      emitted_by:
        - "PaymentIntent.MarkFailed"

    PAYMENT_CANCELLED:
      emitted_by:
        - "PaymentIntent.Cancel"

    PAYMENT_RECEIPT_ISSUED:
      emitted_by:
        - "Receipt.Issue"

    PAYMENT_RECEIPT_VOIDED:
      emitted_by:
        - "Receipt.Void"

    WEBHOOK_RECEIVED:
      emitted_by:
        - "Webhook.Receive"

    WEBHOOK_PROCESSED:
      emitted_by:
        - "Webhook.Process"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: |
    Payment pillar integrates with Policy and Wallet pillars via event-driven architecture.
    Payment events trigger policy activation and wallet crediting.

  outbox_pattern:
    how_it_works:
      - "Payment commands emit events to outbox_event table within same transaction"
      - "OutboxProcessorService polls and publishes events to EventBusService"
      - "Consumer pillars subscribe to payment events and execute their workflows"
      - "All events include correlation_id for tracing cross-pillar flows"

    benefits:
      - "Transactional consistency - events only published if payment succeeds"
      - "Guaranteed delivery - events are retried until acknowledged"
      - "Audit trail - all events logged in outbox_event table"
      - "Decoupling - payment pillar doesn't know about consuming pillars"

  policy:
    description: "Policy pillar consumes payment events to activate policies and process renewals"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "PAYMENT_SUCCEEDED"
        consumer_name: "PolicyPaymentSucceededConsumer"
        location: "src/plugins/policy/consumers/policy-payment-succeeded.consumer.ts"
        responsibility: "Activate policy when premium payment succeeds"

        expected_behavior:
          - "Find policy by ref_type='policy' and ref_id=policy_id from payment intent"
          - "Validate payment amount matches policy premium"
          - "Update policy status from 'pending_payment' to 'active'"
          - "Set policy.activated_at timestamp"
          - "Emit POLICY_ACTIVATED event"

        event_payload_example:
          event_type: "PAYMENT_SUCCEEDED"
          aggregate_type: "PAYMENT_INTENT"
          aggregate_id: 123
          payload:
            intent_id: 123
            intent_key: "PIY-abc-123"
            amount: 500.00
            currency: "MYR"
            purpose_code: "premium"
            ref_type: "policy"
            ref_id: "456"
            payment_method_id: 789
            succeeded_at: "2026-03-22T10:30:00Z"

        idempotency_strategy:
          - "Check if policy is already 'active' before updating"
          - "Use payment_intent.id as dedupe key to prevent duplicate activations"

        error_handling:
          - "If policy not found, log error and mark event as failed"
          - "If payment amount mismatch, log error and create manual review case"
          - "Retry transient errors (DB deadlock) with exponential backoff"

  wallet:
    description: "Wallet pillar consumes payment events to credit user wallets for refunds and credits"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "PAYMENT_SUCCEEDED"
        consumer_name: "WalletPaymentSucceededConsumer"
        location: "src/plugins/wallet/consumers/wallet-payment-succeeded.consumer.ts"
        responsibility: "Credit wallet when payment is for wallet topup"

        expected_behavior:
          - "Check if purpose_code is 'topup' or 'deposit'"
          - "Credit wallet for account_id with payment amount"
          - "Create ledger entries for double-entry bookkeeping"
          - "Emit WALLET_CREDITED event"

        event_payload_example:
          event_type: "PAYMENT_SUCCEEDED"
          aggregate_type: "PAYMENT_INTENT"
          aggregate_id: 124
          payload:
            intent_id: 124
            intent_key: "PIY-def-456"
            amount: 1000.00
            currency: "MYR"
            purpose_code: "topup"
            account_id: 1
            succeeded_at: "2026-03-22T11:00:00Z"

        idempotency_strategy:
