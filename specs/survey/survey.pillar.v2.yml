coverage:
  tables:
    survey:
      touched_by:
        - "Survey.Create"
        - "Survey.Get"
        - "Survey.List"
        - "Survey.Deactivate"
        - "SurveyVersion.Create"
    survey_version:
      touched_by:
        - "SurveyVersion.Create"
        - "SurveyVersion.Get"
        - "SurveyVersion.ListBySurvey"
        - "SurveyVersion.Publish"
        - "SurveyQuestion.CreateBulk"
        - "SurveyResponse.Create"
    survey_question:
      touched_by:
        - "SurveyQuestion.CreateBulk"
        - "SurveyQuestion.Get"
        - "SurveyQuestion.ListByVersion"
        - "SurveyQuestionOption.CreateBulk"
    survey_question_option:
      touched_by:
        - "SurveyQuestionOption.CreateBulk"
        - "SurveyQuestionOption.ListByQuestion"
    survey_response:
      touched_by:
        - "SurveyResponse.Create"
        - "SurveyResponse.Get"
        - "SurveyResponse.List"
        - "SurveyResponse.Submit"
        - "SurveyAnswer.Upsert"
        - "SurveyResponseFile.Attach"
    survey_response_file:
      touched_by:
        - "SurveyResponseFile.Attach"
        - "SurveyResponseFile.ListByResponse"
    survey_answer:
      touched_by:
        - "SurveyAnswer.Upsert"
        - "SurveyAnswer.Get"
        - "SurveyAnswer.ListByResponse"
        - "SurveyResponse.Submit"

  events:
    SURVEY_CREATED:
      emitted_by:
        - "Survey.Create"
    SURVEY_DEACTIVATED:
      emitted_by:
        - "Survey.Deactivate"
    SURVEY_VERSION_CREATED:
      emitted_by:
        - "SurveyVersion.Create"
    SURVEY_VERSION_PUBLISHED:
      emitted_by:
        - "SurveyVersion.Publish"
    SURVEY_QUESTIONS_CREATED:
      emitted_by:
        - "SurveyQuestion.CreateBulk"
    SURVEY_QUESTION_OPTIONS_CREATED:
      emitted_by:
        - "SurveyQuestionOption.CreateBulk"
    SURVEY_RESPONSE_CREATED:
      emitted_by:
        - "SurveyResponse.Create"
    SURVEY_RESPONSE_SUBMITTED:
      emitted_by:
        - "SurveyResponse.Submit"
    SURVEY_ANSWER_SAVED:
      emitted_by:
        - "SurveyAnswer.Upsert"
    SURVEY_RESPONSE_FILE_ATTACHED:
      emitted_by:
        - "SurveyResponseFile.Attach"

  aggregate_transitions:
    SURVEY:
      active:
        - "Survey.Deactivate"
    SURVEY_VERSION:
      draft:
        - "SurveyVersion.Publish"
    SURVEY_RESPONSE:
      draft:
        - "SurveyResponse.Submit"
