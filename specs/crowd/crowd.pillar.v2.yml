coverage:
  tables:
    crowd_period:
      touched_by:
        - "Period.Create"
        - "Period.AddMember"
        - "Period.AddClaim"
        - "Period.Calculate"
        - "Period.Complete"
        - "Period.Cancel"
        - "MemberCharge.MarkCharged"
    crowd_package_bucket:
      touched_by:
        - "Period.Calculate"
    crowd_period_member:
      touched_by:
        - "Period.AddMember"
    crowd_period_claim:
      touched_by:
        - "Period.AddClaim"
        - "ClaimPayout.MarkPaid"
    crowd_member_charge:
      touched_by:
        - "Period.Calculate"
        - "MemberCharge.MarkCharged"
        - "MemberCharge.MarkFailed"
    crowd_claim_payout:
      touched_by:
        - "Period.Calculate"
        - "ClaimPayout.MarkPaid"
        - "ClaimPayout.MarkFailed"
    crowd_period_event:
      touched_by:
        - "Period.Create"
        - "Period.Calculate"
        - "Period.Complete"
        - "Period.Cancel"
    crowd_period_run:
      touched_by:
        - "Period.Calculate"
    crowd_period_run_lock:
      touched_by:
        - "Period.Calculate"

  events:
    CROWD_PERIOD_CREATED:
      emitted_by: ["Period.Create"]
    CROWD_MEMBER_ADDED:
      emitted_by: ["Period.AddMember"]
    CROWD_CLAIM_ADDED:
      emitted_by: ["Period.AddClaim"]
    CROWD_PERIOD_CALCULATION_STARTED:
      emitted_by: ["Period.Calculate"]
    CROWD_PERIOD_CALCULATED:
      emitted_by: ["Period.Calculate"]
    CROWD_PERIOD_COMPLETED:
      emitted_by: ["Period.Complete"]
    CROWD_PERIOD_CANCELLED:
      emitted_by: ["Period.Cancel"]
    CROWD_MEMBER_CHARGED:
      emitted_by: ["MemberCharge.MarkCharged"]
    CROWD_MEMBER_CHARGE_FAILED:
      emitted_by: ["MemberCharge.MarkFailed"]
    CROWD_CLAIM_PAYOUT_PAID:
      emitted_by: ["ClaimPayout.MarkPaid"]
    CROWD_CLAIM_PAYOUT_FAILED:
      emitted_by: ["ClaimPayout.MarkFailed"]

  aggregate_transitions:
    CROWD_PERIOD:
      - "created → calculating (Period.Calculate)"
      - "calculating → calculated (Period.Calculate)"
      - "created → cancelled (Period.Cancel)"
      - "calculated → cancelled (Period.Cancel)"
      - "calculated → completed (Period.Complete)"
    MEMBER_CHARGE:
      - "planned → charged (MemberCharge.MarkCharged)"
      - "planned → failed (MemberCharge.MarkFailed)"
      - "charging → charged (MemberCharge.MarkCharged)"
      - "charging → failed (MemberCharge.MarkFailed)"
    CLAIM_PAYOUT:
      - "planned → paid (ClaimPayout.MarkPaid)"
      - "planned → failed (ClaimPayout.MarkFailed)"
      - "processing → paid (ClaimPayout.MarkPaid)"
      - "processing → failed (ClaimPayout.MarkFailed)"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: >
    The Crowd pillar emits events consumed by the Wallet pillar for payout disbursement
    and by the Notification pillar for member charge alerts. It reads claim data from the
    Claim pillar and account data from the Wallet/Identity pillar.

  outbox_pattern:
    how_it_works:
      - "1. Command completes writes within a database transaction"
      - "2. OutboxService.emit writes the event to outbox_event table within the same transaction"
      - "3. OutboxProcessorService polls and publishes events to the event bus"
      - "4. Consumers receive events and process them idempotently"
    benefits:
      - "Guaranteed at-least-once delivery"
      - "No distributed transaction risk"
      - "Full audit trail in outbox_event table"
      - "Consumers can replay events on failure"

  wallet:
    description: "Wallet pillar listens to CROWD_CLAIM_PAYOUT_PAID to create ledger entries and credit claimant accounts"
    pattern: "event_driven_via_outbox"
    consumers:
      - event: "CROWD_CLAIM_PAYOUT_PAID"
        consumer_name: "WalletCrowdClaimPayoutConsumer"
        location: "src/plugins/wallet/consumers/wallet-crowd-claim-payout.consumer.ts"
        responsibility: "Create a ledger transaction crediting the claimant's wallet after a crowd payout is marked paid"
        expected_behavior:
          - "Read the crowd_claim_payout record to get amount and ledger_txn_id"
          - "If ledger_txn_id is already set, the ledger entry may already exist — check idempotency"
          - "Credit the claimant's wallet via ledger transaction"
          - "Emit WALLET_CREDITED event"
        event_payload_example:
          event_type: "CROWD_CLAIM_PAYOUT_PAID"
          aggregate_type: "CLAIM_PAYOUT"
          aggregate_id: 42
          payload:
            payoutId: 42
            periodId: 7
            claimId: 15
            amount: "5000.00"
            method: "wallet"
            payoutRef: "PAYOUT-2024-01-042"
        idempotency_strategy:
          - "Check if ledger_txn_id is already set on crowd_claim_payout before creating new ledger entry"
          - "Use crowd_claim_payout.idempotency_key as ledger transaction reference"
        error_handling:
          - "On failure, log error and retry via outbox retry mechanism"
          - "Do not double-credit — guard on existing ledger_txn_id"

  notification:
    description: "Notification pillar listens to CROWD_MEMBER_CHARGED and CROWD_MEMBER_CHARGE_FAILED to notify members"
    pattern: "event_driven_via_outbox"
    consumers:
      - event: "CROWD_MEMBER_CHARGED"
        consumer_name: "NotificationCrowdChargeConsumer"
        location: "src/plugins/notification/consumers/notification-crowd-charge.consumer.ts"
        responsibility: "Send payment confirmation notification to member after successful charge collection"
        expected_behavior:
          - "Read charge details from crowd_member_charge"
          - "Send push/email notification to the insurant confirming their contribution"
        event_payload_example:
          event_type: "CROWD_MEMBER_CHARGED"
          aggregate_type: "MEMBER_CHARGE"
          aggregate_id: 101
          payload:
            chargeId: 101
            periodId: 7
            insurantId: 50
            paidAmount: "120.00"
        idempotency_strategy:
          - "Use chargeId as notification deduplication key"
        error_handling:
          - "Non-critical — notification failure should not block charge processing"
          - "Log and skip on delivery failure"

  architecture_diagram: |
    ┌─────────────────┐       CROWD_CLAIM_PAYOUT_PAID       ┌─────────────────┐
    │  Crowd Pillar   │ ─────────────────────────────────> │  Wallet Pillar  │
    │                 │                                     │  (credit payout)│
    │  Period.Calc    │       CROWD_MEMBER_CHARGED          └─────────────────┘
    │  MemberCharge   │ ─────────────────────────────────> ┌─────────────────┐
    │  ClaimPayout    │                                     │ Notification    │
    └─────────────────┘                                     │ (charge alert)  │
             ▲                                              └─────────────────┘
             │  (readonly)
    ┌─────────────────┐
    │  Claim Pillar   │
    │  (claim_case)   │
    └─────────────────┘

  implementation_checklist:
    wallet:
      - "[x] Create WalletCrowdClaimPayoutConsumer"
      - "[x] Subscribe to CROWD_CLAIM_PAYOUT_PAID event"
      - "[x] Implement ledger credit for claim payout (wallet_deposit_intent)"
      - "[x] Add idempotency guard on ledger_txn_id"
      - "[ ] Test end-to-end payout disbursement flow"

    notification:
      - "[x] Create NotificationCrowdChargeConsumer"
      - "[x] Subscribe to CROWD_MEMBER_CHARGED event"
      - "[x] Implement charge confirmation notification template (crowd_member_charged)"

    crowd:
      - "[x] Spec generated (this document)"
      - "[ ] Implement all 10 commands"
      - "[ ] Implement distributed lock in Period.Calculate"
      - "[ ] Register CrowdModule in app.module.ts"
      - "[ ] Build Postman collection"

  testing_strategy:
    end_to_end_test: |
      1. Create period (POST /api/v1/crowd/periods) → get periodId
      2. Add 3 members with different packages (POST .../members x3)
      3. Add 2 approved claims (POST .../claims x2)
      4. Trigger calculation (POST .../calculate) → verify status='calculated'
      5. Verify crowd_package_bucket has 1 row per package
      6. Verify crowd_member_charge has 3 rows (one per member)
      7. Verify crowd_claim_payout has 2 rows (one per claim)
      8. Mark all charges as charged (POST .../mark-charged x3)
      9. Mark all payouts as paid (POST .../mark-paid x2)
      10. Complete the period (POST .../complete) → verify status='completed'
      11. Verify CROWD_PERIOD_COMPLETED event in outbox

    idempotency_test: |
      1. Create period with same period_key twice → second call should fail with duplicate key
      2. Add same member twice to same period → second call should fail (uk_period_member)
      3. Add same claim twice to same period → second call should fail (uk_period_claim)
      4. Trigger calculate twice concurrently → distributed lock ensures only one succeeds
      5. Mark charge as charged twice with same input → second call should be idempotent

    error_test: |
      1. Attempt to add member to period with status='calculated' → guard rejects
      2. Attempt to calculate period with 0 members → guard rejects
      3. Attempt to complete period with status='created' → guard rejects
      4. Attempt to mark payout as paid when status='failed' → guard rejects
      5. Simulate concurrent calculation by two workers → lock prevents double-calculation
