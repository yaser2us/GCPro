# gcpro.corekit.v1.yml
version: "1.0"
spec_id: "gcpro.corekit.v1"
domain: "corekit"
owner:
  plugin: "corekit"
  owns_tables:
    # Infra / ACL / outbox baseline
    - "outbox_event"
    - "outbox_event_consume"
    - "audit_log"
    - "resource_ref"
    - "permission"
    - "role"
    - "role_permission"
    - "user_role"
    - "user_permission"
  cross_plugin_writes_allowed: false

conventions:
  workflow_steps: ["guard", "validate", "write", "emit", "commit"]
  status_mutation_policy: "No status may be mutated via CRUD. Only command workflows."
  transaction:
    api: "COREKIT.Transaction.run"
    requirement: "All commands that write state MUST use transaction wrapper."
  outbox:
    table: "outbox_event"
    consume_table: "outbox_event_consume"
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"
    publishing_rule: "Never call external systems inside the main transaction."
  idempotency:
    header: "Idempotency-Key"
    behavior:
      on_replay_completed: "return_same_response"
      on_replay_inflight: "409_conflict"
    enforcement_rule: "Prefer DB constraints (unique keys). Optional replay table later."
  errors:
    base_error_class: "DomainError"
    error_shape:
      - "code"
      - "message"
      - "details"

services:
  - name: "COREKIT.Transaction"
    purpose: "DB transaction wrapper + consistent error mapping"
    methods:
      - { name: "run", signature: "run(fn, {correlation_id, causation_id, actor})" }

  - name: "COREKIT.Outbox"
    purpose: "append outbox_event rows in same txn"
    methods:
      - { name: "emit", signature: "emit(eventEnvelope, {dedupe_key?})" }

  - name: "COREKIT.Audit"
    purpose: "write audit_log rows (optional per command)"
    methods:
      - { name: "record", signature: "record({actor, resource, action, before?, after?})" }

codegen:
  language: "typescript"
  framework: "nestjs"
  outputs_hint:
    - "src/corekit/transaction/transaction.service.ts"
    - "src/corekit/outbox/outbox.service.ts"
    - "src/corekit/errors/domain-error.ts"
    - "src/corekit/audit/audit.service.ts"
    - "src/corekit/types/event-envelope.ts"