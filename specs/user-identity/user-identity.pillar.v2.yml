version: "2.0.0"
spec_id: "user-identity.pillar.v2"
domain: "user-identity"
plugin: "user-identity"

# ──────────────────────────────────────────────────────────────────────────────
# OWNERSHIP
# ──────────────────────────────────────────────────────────────────────────────

ownership:
  owner_plugin: "user-identity"
  owns_tables:
    - "device_token"
    - "registration_token"
    - "verification_status"
    - "onboarding_progress"
  cross_plugin_writes: false
  cross_plugin_integration:
    allowed_via:
      - "command_api"
      - "outbox_events"

# ──────────────────────────────────────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────────────────────────────────────

dependencies:
  corekit:
    transaction_wrapper: "withTxn"
    outbox_service: "OutboxService.emit"
    guard_helper: "guard"
    domain_error: "DomainError"

  core_tables_readonly:
    - table_name: "user"
      usage: "device_token.user_id and onboarding_progress.user_id FK → user.id"
      access: "readonly_fk"

    - table_name: "account"
      usage: "verification_status.account_id FK → account.id"
      access: "readonly_fk"

# ──────────────────────────────────────────────────────────────────────────────
# CONVENTIONS
# ──────────────────────────────────────────────────────────────────────────────

conventions:
  workflow_discipline:
    - "guard"
    - "write"
    - "emit"
    - "commit"

  status_mutation_policy: "Status fields may only be mutated through commands."

  outbox:
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"

  idempotency:
    required_header: "Idempotency-Key"
    default_scope: "actor_user_id + command_name"
    db_strategy:
      - "UNIQUE(idempotency_key) where applicable"
      - "MySQL ON DUPLICATE KEY UPDATE id = LAST_INSERT_ID(id)"
      - "device_token: upsert via UNIQUE(platform, token)"
      - "verification_status: upsert via UNIQUE(account_id, type)"
      - "onboarding_progress: upsert via UNIQUE(user_id, step_code)"

# ──────────────────────────────────────────────────────────────────────────────
# SCHEMA
# ──────────────────────────────────────────────────────────────────────────────

schema:
  tables:

    device_token:
      description: >
        Push notification device tokens per user.
        Tracks which devices a user has registered across platforms (fcm, apns, etc.).
        Revocation removes a token from the active set without hard-delete.
      columns:
        id:
          type: bigint
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Surrogate primary key"
        user_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "Owning user; FK → user.id CASCADE"
        platform:
          type: varchar
          length: 16
          nullable: false
          description: "Push platform: fcm | apns | web"
        token:
          type: varchar
          length: 512
          nullable: false
          description: "Raw device push token issued by the platform"
        status:
          type: varchar
          length: 32
          nullable: false
          default: "active"
          description: "Lifecycle: active | inactive | revoked"
        last_seen_at:
          type: datetime
          nullable: true
          description: "Last time this device token was used / refreshed"
        created_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Row creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last update timestamp"
      constraints:
        primary_key: ["id"]
        unique_keys:
          uk_device_token:
            columns: ["platform", "token"]
        indexes:
          idx_device_user:
            columns: ["user_id"]
          idx_device_status:
            columns: ["status"]
        foreign_keys:
          fk_device_token_user:
            columns: ["user_id"]
            references: "user(id)"
            on_delete: "CASCADE"
            on_update: "CASCADE"

    registration_token:
      description: >
        Email / phone verification tokens and OTPs issued during registration and
        channel-change flows. No FK — tokens exist before the user record does.
      columns:
        id:
          type: bigint
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Surrogate primary key"
        purpose:
          type: varchar
          length: 32
          nullable: false
          default: "registration"
          description: "Intent: registration | phone_verify | email_verify | password_reset"
        channel_type:
          type: varchar
          length: 16
          nullable: false
          description: "Delivery channel: email | sms | whatsapp"
        channel_value:
          type: varchar
          length: 255
          nullable: false
          description: "Email address or phone number the token was sent to"
        invite_code:
          type: varchar
          length: 64
          nullable: true
          description: "Optional referral or invite code attached to this registration"
        token:
          type: varchar
          length: 128
          nullable: true
          description: "Opaque token string (used for magic-link flows)"
        otp_hash:
          type: varchar
          length: 255
          nullable: true
          description: "Bcrypt / HMAC hash of the OTP sent to the channel"
        status:
          type: varchar
          length: 32
          nullable: false
          default: "pending"
          description: "Lifecycle: pending | verified | consumed | expired"
        meta_json:
          type: json
          nullable: true
          description: "Arbitrary metadata (e.g. IP, user-agent, locale)"
        expires_at:
          type: datetime
          nullable: false
          description: "Hard expiry; token unusable after this timestamp"
        created_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Row creation timestamp"
      constraints:
        primary_key: ["id"]
        unique_keys: {}
        indexes:
          idx_regtok_channel:
            columns: ["channel_type", "channel_value"]
          idx_regtok_invite:
            columns: ["invite_code"]
          idx_regtok_token:
            columns: ["token"]
          idx_regtok_status_expires:
            columns: ["status", "expires_at"]
        foreign_keys: {}

    verification_status:
      description: >
        Per-account verification state for each verification type (email, phone, kyc, etc.).
        One row per (account_id, type) — upserted on each status change.
        Consumed by Foundation KYC_VERIFIED event and channel-verify commands.
      columns:
        id:
          type: bigint
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Surrogate primary key"
        account_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "Owning account; FK → account.id CASCADE"
        type:
          type: varchar
          length: 32
          nullable: false
          description: "Verification dimension: email | phone | kyc | id_document"
        status:
          type: varchar
          length: 32
          nullable: false
          description: "Verification result: unverified | pending | verified | failed | expired"
        meta_json:
          type: json
          nullable: true
          description: "Provider response, reference IDs, audit notes"
        updated_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last status change timestamp"
        created_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Row creation timestamp"
      constraints:
        primary_key: ["id"]
        unique_keys:
          uk_verification_account_type:
            columns: ["account_id", "type"]
        indexes:
          idx_verification_status:
            columns: ["type", "status"]
        foreign_keys:
          fk_verification_account:
            columns: ["account_id"]
            references: "account(id)"
            on_delete: "CASCADE"
            on_update: "CASCADE"

    onboarding_progress:
      description: >
        Step-by-step onboarding tracker per user. One row per (user_id, step_code).
        Upserted as each step is completed, skipped, or requires action.
        Consumed by Foundation GUIDELINE_ACCEPTED event and other pillar events.
      columns:
        id:
          type: bigint
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Surrogate primary key"
        user_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "Owning user; FK → user.id CASCADE"
        step_code:
          type: varchar
          length: 64
          nullable: false
          description: "Onboarding step identifier: profile_complete | kyc_verified | guideline_accepted | device_registered | etc."
        state:
          type: varchar
          length: 16
          nullable: false
          description: "Step state: pending | completed | skipped | failed"
        meta_json:
          type: json
          nullable: true
          description: "Step-specific metadata (e.g. completed_at, source event)"
        updated_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last state change timestamp"
        created_at:
          type: datetime
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Row creation timestamp"
      constraints:
        primary_key: ["id"]
        unique_keys:
          uk_onboarding_user_step:
            columns: ["user_id", "step_code"]
        indexes:
          idx_onboarding_user_state:
            columns: ["user_id", "state"]
        foreign_keys:
          fk_onboarding_user:
            columns: ["user_id"]
            references: "user(id)"
            on_delete: "CASCADE"
            on_update: "CASCADE"

# ──────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ──────────────────────────────────────────────────────────────────────────────

resources:
  - name: DeviceToken
    kind: aggregate
    table: device_token
    primary_key: id
    statuses:
      - active
      - inactive
      - revoked
    api_surface:
      - "POST /api/v1/user-identity/device-tokens"
      - "POST /api/v1/user-identity/device-tokens/:deviceTokenId/revoke"

  - name: RegistrationToken
    kind: aggregate
    table: registration_token
    primary_key: id
    statuses:
      - pending
      - verified
      - consumed
      - expired
    api_surface:
      - "POST /api/v1/user-identity/registration-tokens"
      - "POST /api/v1/user-identity/registration-tokens/:registrationTokenId/verify"
      - "POST /api/v1/user-identity/registration-tokens/:registrationTokenId/consume"
      - "POST /api/v1/user-identity/registration-tokens/:registrationTokenId/expire"

  - name: VerificationStatus
    kind: aggregate
    table: verification_status
    primary_key: id
    statuses:
      - unverified
      - pending
      - verified
      - failed
      - expired
    api_surface:
      - "POST /api/v1/user-identity/verification-status"

  - name: OnboardingProgress
    kind: aggregate
    table: onboarding_progress
    primary_key: id
    statuses:
      - pending
      - completed
      - skipped
      - failed
    api_surface:
      - "POST /api/v1/user-identity/onboarding-progress"

# ──────────────────────────────────────────────────────────────────────────────
# AGGREGATES
# ──────────────────────────────────────────────────────────────────────────────

aggregates:
  DEVICE_TOKEN:
    root_table: "device_token"
    primary_key: "id"
    statuses:
      - active
      - inactive
      - revoked

  REGISTRATION_TOKEN:
    root_table: "registration_token"
    primary_key: "id"
    statuses:
      - pending
      - verified
      - consumed
      - expired

  VERIFICATION_STATUS:
    root_table: "verification_status"
    primary_key: "id"
    statuses:
      - unverified
      - pending
      - verified
      - failed
      - expired

  ONBOARDING_PROGRESS:
    root_table: "onboarding_progress"
    primary_key: "id"
    statuses:
      - pending
      - completed
      - skipped
      - failed

# ──────────────────────────────────────────────────────────────────────────────
# TYPES
# ──────────────────────────────────────────────────────────────────────────────

types:
  Actor:
    fields:
      actor_user_id: string
      actor_role: string
      correlation_id: "string | undefined"
      causation_id: "string | undefined"

  DeviceTokenSummary:
    fields:
      id: number
      user_id: number
      platform: string
      status: string
      last_seen_at: "Date | null"
      created_at: Date

  RegistrationTokenSummary:
    fields:
      id: number
      purpose: string
      channel_type: string
      channel_value: string
      status: string
      expires_at: Date
      created_at: Date

  VerificationStatusSummary:
    fields:
      id: number
      account_id: number
      type: string
      status: string
      updated_at: Date

  OnboardingProgressSummary:
    fields:
      id: number
      user_id: number
      step_code: string
      state: string
      updated_at: Date

# ──────────────────────────────────────────────────────────────────────────────
# DTOs
# ──────────────────────────────────────────────────────────────────────────────

dtos:
  DeviceTokenRegisterDto:
    description: "Register a new device push token for a user"
    fields:
      user_id:
        type: number
        required: true
        description: "User to register the device for"
      platform:
        type: string
        required: true
        max_len: 16
        description: "Push platform: fcm | apns | web"
      token:
        type: string
        required: true
        max_len: 512
        description: "Raw device token issued by the platform"

  RegistrationTokenIssueDto:
    description: "Issue a new email/phone verification token or OTP"
    fields:
      purpose:
        type: string
        required: false
        max_len: 32
        default: "registration"
        description: "Intent: registration | phone_verify | email_verify | password_reset"
      channel_type:
        type: string
        required: true
        max_len: 16
        description: "email | sms | whatsapp"
      channel_value:
        type: string
        required: true
        max_len: 255
        description: "Email address or phone number"
      invite_code:
        type: string
        required: false
        max_len: 64
        description: "Optional referral or invite code"
      token:
        type: string
        required: false
        max_len: 128
        description: "Magic-link token (if applicable; otherwise generated server-side)"
      otp_hash:
        type: string
        required: false
        max_len: 255
        description: "Pre-hashed OTP (if caller hashes; otherwise generated server-side)"
      expires_at:
        type: string
        required: true
        description: "ISO 8601 expiry datetime"
      meta_json:
        type: object
        required: false
        description: "Arbitrary metadata (IP, user-agent, locale)"

  RegistrationTokenVerifyDto:
    description: "Verify a registration token or OTP submitted by the user"
    fields:
      token:
        type: string
        required: false
        max_len: 128
        description: "Magic-link token (required if OTP not provided)"
      otp_plain:
        type: string
        required: false
        max_len: 16
        description: "Plain OTP value to compare against otp_hash (required if token not provided)"

  VerificationStatusUpsertDto:
    description: "Upsert verification state for a given account and verification type"
    fields:
      account_id:
        type: number
        required: true
        description: "Account being verified"
      type:
        type: string
        required: true
        max_len: 32
        description: "Dimension: email | phone | kyc | id_document"
      status:
        type: string
        required: true
        max_len: 32
        description: "Result: unverified | pending | verified | failed | expired"
      meta_json:
        type: object
        required: false
        description: "Provider response, reference IDs, audit notes"

  OnboardingProgressUpsertDto:
    description: "Upsert the state of a single onboarding step for a user"
    fields:
      user_id:
        type: number
        required: true
        description: "User whose onboarding is tracked"
      step_code:
        type: string
        required: true
        max_len: 64
        description: "Onboarding step key: profile_complete | kyc_verified | guideline_accepted | device_registered"
      state:
        type: string
        required: true
        max_len: 16
        description: "Step state: pending | completed | skipped | failed"
      meta_json:
        type: object
        required: false
        description: "Step-specific metadata"

# ──────────────────────────────────────────────────────────────────────────────
# EVENTS
# ──────────────────────────────────────────────────────────────────────────────

events:
  - name: DEVICE_TOKEN_REGISTERED
    version: 1
    aggregate_type: DEVICE_TOKEN
    description: "A device push token was registered or re-activated for a user"

  - name: DEVICE_TOKEN_REVOKED
    version: 1
    aggregate_type: DEVICE_TOKEN
    description: "A device push token was revoked and will no longer receive notifications"

  - name: REGISTRATION_TOKEN_ISSUED
    version: 1
    aggregate_type: REGISTRATION_TOKEN
    description: "A verification token or OTP was issued for a channel"

  - name: REGISTRATION_TOKEN_VERIFIED
    version: 1
    aggregate_type: REGISTRATION_TOKEN
    description: "A user successfully verified their token or OTP"

  - name: REGISTRATION_TOKEN_CONSUMED
    version: 1
    aggregate_type: REGISTRATION_TOKEN
    description: "A verified token was consumed to complete a flow (e.g. registration, password reset)"

  - name: REGISTRATION_TOKEN_EXPIRED
    version: 1
    aggregate_type: REGISTRATION_TOKEN
    description: "A registration token was force-expired by an admin before natural TTL"

  - name: VERIFICATION_STATUS_UPDATED
    version: 1
    aggregate_type: VERIFICATION_STATUS
    description: "A verification dimension (email, phone, kyc) changed status for an account"

  - name: ONBOARDING_STEP_UPDATED
    version: 1
    aggregate_type: ONBOARDING_PROGRESS
    description: "An onboarding step state was updated for a user"

# ──────────────────────────────────────────────────────────────────────────────
# COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

commands:

  # ── DEVICE TOKEN ────────────────────────────────────────────────────────────

  RegisterDevice:
    description: >
      Register a device push token for a user. Upserts on UNIQUE(platform, token).
      If the token already exists for this user, it is re-activated and last_seen_at updated.
      If it exists for a different user, guard rejects.
    path: "/api/v1/user-identity/device-tokens"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      dto: DeviceTokenRegisterDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        description: "Look up existing device_token by platform + token"
        table: device_token
        filter: "platform = dto.platform AND token = dto.token"
        assign: existing
      - kind: guard
        description: "If token exists and belongs to a different user, reject"
        expression: "existing == null OR existing.user_id == dto.user_id"
        error: "DEVICE_TOKEN_OWNED_BY_ANOTHER_USER"
      - kind: upsert
        description: "Insert or re-activate device token"
        table: device_token
        unique_by: ["platform", "token"]
        data:
          user_id: "dto.user_id"
          platform: "dto.platform"
          token: "dto.token"
          status: "active"
          last_seen_at: "now()"
        assign: result
      - kind: outbox_emit
        event: DEVICE_TOKEN_REGISTERED
        aggregate_type: DEVICE_TOKEN
        aggregate_id: "result.id"
        payload:
          user_id: "result.user_id"
          platform: "result.platform"
          status: "result.status"
    response:
      http_status: 201
      body: DeviceTokenSummary

  RevokeDevice:
    description: >
      Revoke a device push token. Sets status = 'revoked'. Token will no longer
      receive push notifications. Actor must own the token or have admin permission.
    path: "/api/v1/user-identity/device-tokens/:deviceTokenId/revoke"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      path_params:
        - deviceTokenId: number
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        description: "Load device token by ID"
        table: device_token
        filter: "id = deviceTokenId"
        assign: deviceToken
      - kind: guard
        description: "Token must exist"
        expression: "deviceToken != null"
        error: "DEVICE_TOKEN_NOT_FOUND"
      - kind: guard
        description: "Token must not already be revoked"
        expression: "deviceToken.status != 'revoked'"
        error: "DEVICE_TOKEN_ALREADY_REVOKED"
      - kind: update
        description: "Set status to revoked"
        table: device_token
        filter: "id = deviceTokenId"
        data:
          status: "revoked"
      - kind: outbox_emit
        event: DEVICE_TOKEN_REVOKED
        aggregate_type: DEVICE_TOKEN
        aggregate_id: "deviceTokenId"
        payload:
          user_id: "deviceToken.user_id"
          platform: "deviceToken.platform"
    response:
      http_status: 200
      body: DeviceTokenSummary

  # ── REGISTRATION TOKEN ──────────────────────────────────────────────────────

  IssueRegistrationToken:
    description: >
      Issue a new verification token or OTP for a channel (email/phone).
      Creates a new registration_token row with status=pending and a TTL.
      No UNIQUE constraint on registration_token — multiple pending tokens per channel
      are intentionally allowed (resend flow); expiry and consume logic decide which is valid.
      idempotent: false because the Idempotency-Key header is used for correlation/tracing only,
      NOT for DB-level deduplication. Callers may receive a new token ID on each call.
    path: "/api/v1/user-identity/registration-tokens"
    method: POST
    idempotent: false
    permissions:
      - "user-identity:admin"
    input:
      dto: RegistrationTokenIssueDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: insert
        description: "Create registration token row"
        table: registration_token
        data:
          purpose: "dto.purpose"
          channel_type: "dto.channel_type"
          channel_value: "dto.channel_value"
          invite_code: "dto.invite_code"
          token: "dto.token"
          otp_hash: "dto.otp_hash"
          status: "pending"
          meta_json: "dto.meta_json"
          expires_at: "dto.expires_at"
        assign: result
      - kind: outbox_emit
        event: REGISTRATION_TOKEN_ISSUED
        aggregate_type: REGISTRATION_TOKEN
        aggregate_id: "result.id"
        payload:
          purpose: "result.purpose"
          channel_type: "result.channel_type"
          channel_value: "result.channel_value"
          expires_at: "result.expires_at"
    response:
      http_status: 201
      body: RegistrationTokenSummary

  VerifyRegistrationToken:
    description: >
      Verify a registration token. Accepts either a magic-link token or a plain OTP
      (compared against otp_hash). Sets status = 'verified'.
    path: "/api/v1/user-identity/registration-tokens/:registrationTokenId/verify"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      dto: RegistrationTokenVerifyDto
      path_params:
        - registrationTokenId: number
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        description: "Load registration token by ID"
        table: registration_token
        filter: "id = registrationTokenId"
        assign: regToken
      - kind: guard
        description: "Token must exist"
        expression: "regToken != null"
        error: "REGISTRATION_TOKEN_NOT_FOUND"
      - kind: guard
        description: "Token must be in pending status"
        expression: "regToken.status == 'pending'"
        error: "REGISTRATION_TOKEN_NOT_PENDING"
      - kind: guard
        description: "Token must not be expired"
        expression: "regToken.expires_at > now()"
        error: "REGISTRATION_TOKEN_EXPIRED"
      - kind: call
        description: "Verify token or OTP — magic-link token equality check OR bcrypt OTP hash comparison"
        fn: "verifyTokenOrOtp(dto.token, regToken.token, dto.otp_plain, regToken.otp_hash)"
        assign: tokenValid
      - kind: guard
        description: "Token or OTP must be valid"
        expression: "tokenValid == true"
        error: "REGISTRATION_TOKEN_INVALID"
      - kind: update
        description: "Mark as verified"
        table: registration_token
        filter: "id = registrationTokenId"
        data:
          status: "verified"
      - kind: outbox_emit
        event: REGISTRATION_TOKEN_VERIFIED
        aggregate_type: REGISTRATION_TOKEN
        aggregate_id: "registrationTokenId"
        payload:
          purpose: "regToken.purpose"
          channel_type: "regToken.channel_type"
          channel_value: "regToken.channel_value"
    response:
      http_status: 200
      body: RegistrationTokenSummary

  ConsumeRegistrationToken:
    description: >
      Mark a verified token as consumed. Called after a downstream action
      (e.g. user account created, password changed) to prevent token reuse.
    path: "/api/v1/user-identity/registration-tokens/:registrationTokenId/consume"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      path_params:
        - registrationTokenId: number
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        description: "Load registration token by ID"
        table: registration_token
        filter: "id = registrationTokenId"
        assign: regToken
      - kind: guard
        description: "Token must exist"
        expression: "regToken != null"
        error: "REGISTRATION_TOKEN_NOT_FOUND"
      - kind: guard
        description: "Token must be in verified status"
        expression: "regToken.status == 'verified'"
        error: "REGISTRATION_TOKEN_NOT_VERIFIED"
      - kind: update
        description: "Mark as consumed"
        table: registration_token
        filter: "id = registrationTokenId"
        data:
          status: "consumed"
      - kind: outbox_emit
        event: REGISTRATION_TOKEN_CONSUMED
        aggregate_type: REGISTRATION_TOKEN
        aggregate_id: "registrationTokenId"
        payload:
          purpose: "regToken.purpose"
          channel_type: "regToken.channel_type"
          channel_value: "regToken.channel_value"
    response:
      http_status: 200
      body: RegistrationTokenSummary

  ExpireRegistrationToken:
    description: >
      Admin command to force-expire a pending or verified registration token.
      Used for security invalidation flows.
    path: "/api/v1/user-identity/registration-tokens/:registrationTokenId/expire"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      path_params:
        - registrationTokenId: number
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        description: "Load registration token by ID"
        table: registration_token
        filter: "id = registrationTokenId"
        assign: regToken
      - kind: guard
        description: "Token must exist"
        expression: "regToken != null"
        error: "REGISTRATION_TOKEN_NOT_FOUND"
      - kind: guard
        description: "Token must not already be consumed or expired"
        expression: "regToken.status == 'pending' OR regToken.status == 'verified'"
        error: "REGISTRATION_TOKEN_ALREADY_TERMINAL"
      - kind: update
        description: "Force-expire the token"
        table: registration_token
        filter: "id = registrationTokenId"
        data:
          status: "expired"
      - kind: outbox_emit
        event: REGISTRATION_TOKEN_EXPIRED
        aggregate_type: REGISTRATION_TOKEN
        aggregate_id: "registrationTokenId"
        payload:
          purpose: "regToken.purpose"
          channel_type: "regToken.channel_type"
          channel_value: "regToken.channel_value"
    response:
      http_status: 200
      body: RegistrationTokenSummary

  # ── VERIFICATION STATUS ──────────────────────────────────────────────────────

  UpsertVerificationStatus:
    description: >
      Upsert the verification status for a given account and verification type.
      Uses UNIQUE(account_id, type) — creates the row if new, updates if existing.
      Called by internal services and by the Foundation KYC_VERIFIED event consumer.
    path: "/api/v1/user-identity/verification-status"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      dto: VerificationStatusUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        description: "Insert or update verification status"
        table: verification_status
        unique_by: ["account_id", "type"]
        data:
          account_id: "dto.account_id"
          type: "dto.type"
          status: "dto.status"
          meta_json: "dto.meta_json"
        assign: result
      - kind: outbox_emit
        event: VERIFICATION_STATUS_UPDATED
        aggregate_type: VERIFICATION_STATUS
        aggregate_id: "result.id"
        payload:
          account_id: "result.account_id"
          type: "result.type"
          status: "result.status"
    response:
      http_status: 200
      body: VerificationStatusSummary

  # ── ONBOARDING PROGRESS ──────────────────────────────────────────────────────

  UpsertOnboardingProgress:
    description: >
      Upsert a single onboarding step state for a user.
      Uses UNIQUE(user_id, step_code) — creates if new, updates state if existing.
      Called directly by admin and by Foundation GUIDELINE_ACCEPTED event consumer.
    path: "/api/v1/user-identity/onboarding-progress"
    method: POST
    idempotent: true
    permissions:
      - "user-identity:admin"
    input:
      dto: OnboardingProgressUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        description: "Insert or update onboarding step state"
        table: onboarding_progress
        unique_by: ["user_id", "step_code"]
        data:
          user_id: "dto.user_id"
          step_code: "dto.step_code"
          state: "dto.state"
          meta_json: "dto.meta_json"
        assign: result
      - kind: outbox_emit
        event: ONBOARDING_STEP_UPDATED
        aggregate_type: ONBOARDING_PROGRESS
        aggregate_id: "result.id"
        payload:
          user_id: "result.user_id"
          step_code: "result.step_code"
          state: "result.state"
    response:
      http_status: 200
      body: OnboardingProgressSummary

