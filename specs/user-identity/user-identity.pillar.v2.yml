# ──────────────────────────────────────────────────────────────────────────────
# COVERAGE
# ──────────────────────────────────────────────────────────────────────────────

coverage:
  tables:
    device_token:
      touched_by:
        - "RegisterDevice"
        - "RevokeDevice"

    registration_token:
      touched_by:
        - "IssueRegistrationToken"
        - "VerifyRegistrationToken"
        - "ConsumeRegistrationToken"
        - "ExpireRegistrationToken"

    verification_status:
      touched_by:
        - "UpsertVerificationStatus"

    onboarding_progress:
      touched_by:
        - "UpsertOnboardingProgress"

  events:
    DEVICE_TOKEN_REGISTERED:
      emitted_by:
        - "RegisterDevice"

    DEVICE_TOKEN_REVOKED:
      emitted_by:
        - "RevokeDevice"

    REGISTRATION_TOKEN_ISSUED:
      emitted_by:
        - "IssueRegistrationToken"

    REGISTRATION_TOKEN_VERIFIED:
      emitted_by:
        - "VerifyRegistrationToken"

    REGISTRATION_TOKEN_CONSUMED:
      emitted_by:
        - "ConsumeRegistrationToken"

    REGISTRATION_TOKEN_EXPIRED:
      emitted_by:
        - "ExpireRegistrationToken"

    VERIFICATION_STATUS_UPDATED:
      emitted_by:
        - "UpsertVerificationStatus"

    ONBOARDING_STEP_UPDATED:
      emitted_by:
        - "UpsertOnboardingProgress"

  aggregate_transitions:
    DEVICE_TOKEN:
      RegisterDevice: "∅ → active | inactive → active"
      RevokeDevice: "active → revoked"

    REGISTRATION_TOKEN:
      IssueRegistrationToken: "∅ → pending"
      VerifyRegistrationToken: "pending → verified"
      ConsumeRegistrationToken: "verified → consumed"
      ExpireRegistrationToken: "pending | verified → expired (emits REGISTRATION_TOKEN_EXPIRED)"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: >
    user-identity consumes events from the Foundation pillar to auto-update
    verification_status (on KYC_VERIFIED) and onboarding_progress (on GUIDELINE_ACCEPTED).
    It also emits events that can be consumed by the Notification pillar to trigger
    messages (e.g. OTP delivery, welcome flow).

  outbox_pattern:
    how_it_works:
      - "Producer pillar (Foundation) writes event to outbox_event table within same transaction"
      - "Outbox poller picks up unprocessed events and delivers to consumer"
      - "Consumer (user-identity) processes event and upserts local state"
      - "outbox_event_consumer row tracks per-consumer processing state"
    benefits:
      - "Guaranteed delivery — event survives transaction commit"
      - "At-least-once semantics with idempotent upsert handlers"
      - "No direct cross-plugin DB coupling"

  foundation:
    description: "user-identity consumes Foundation events to update verification and onboarding state"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "KYC_VERIFIED"
        consumer_name: "KycVerifiedConsumer"
        location: "src/plugins/user-identity/consumers/kyc-verified.consumer.ts"
        responsibility: >
          On KYC_VERIFIED from Foundation, upsert verification_status
          for the relevant account_id with type='kyc' and status='verified'.

        expected_behavior:
          - "Read kyc record (subject_type, subject_id) from event payload"
          - "Resolve account_id from subject (if subject_type = 'account', use subject_id directly)"
          - "Call UpsertVerificationStatus(account_id, type='kyc', status='verified')"
          - "Emit VERIFICATION_STATUS_UPDATED event"

        event_payload_example:
          event_type: "KYC_VERIFIED"
          aggregate_type: "KYC"
          aggregate_id: 42
          payload:
            subject_type: "account"
            subject_id: 7
            provider: "ekyc_provider"

        idempotency_strategy:
          - "verification_status has UNIQUE(account_id, type) — upsert is idempotent"
          - "outbox_event_consumer tracks per-consumer event processing to prevent replay"

        error_handling:
          - "If account_id cannot be resolved, log and dead-letter the event"
          - "Transient DB errors: retry via outbox poller backoff"

      - event: "GUIDELINE_ACCEPTED"
        consumer_name: "GuidelineAcceptedConsumer"
        location: "src/plugins/user-identity/consumers/guideline-accepted.consumer.ts"
        responsibility: >
          On GUIDELINE_ACCEPTED from Foundation, upsert onboarding_progress
          for the user with step_code='guideline_accepted' and state='completed'.

        expected_behavior:
          - "Read user_id from event payload"
          - "Call UpsertOnboardingProgress(user_id, step_code='guideline_accepted', state='completed')"
          - "Emit ONBOARDING_STEP_UPDATED event"

        event_payload_example:
          event_type: "GUIDELINE_ACCEPTED"
          aggregate_type: "GUIDELINE_ACCEPTANCE"
          aggregate_id: 18
          payload:
            user_id: 3
            version_id: 5
            acceptance_status: "accepted"

        idempotency_strategy:
          - "onboarding_progress has UNIQUE(user_id, step_code) — upsert is idempotent"
          - "outbox_event_consumer prevents duplicate event processing"

        error_handling:
          - "If user_id is missing from payload, log and skip"
          - "Transient DB errors: retry via outbox poller backoff"

  architecture_diagram: |
    Foundation Pillar                       user-identity Pillar
    ─────────────────────                   ──────────────────────────────────
    KYC.verify()                            KycVerifiedConsumer
      → outbox: KYC_VERIFIED    ──────────▶  → UpsertVerificationStatus(kyc)
                                              → VERIFICATION_STATUS_UPDATED

    Guideline.accept()                      GuidelineAcceptedConsumer
      → outbox: GUIDELINE_ACCEPTED ────────▶  → UpsertOnboardingProgress(guideline_accepted)
                                               → ONBOARDING_STEP_UPDATED

  implementation_checklist:
    foundation:
      - "[✓] KYC_VERIFIED event emitted by Foundation.verifyKYC command"
      - "[✓] GUIDELINE_ACCEPTED event emitted by Foundation.acceptGuideline command"

    user-identity:
      - "[ ] KycVerifiedConsumer implemented"
      - "[ ] GuidelineAcceptedConsumer implemented"
      - "[ ] outbox_event_consumer rows created per consumer on processing"
      - "[ ] Integration test: KYC_VERIFIED → verification_status.status = verified"
      - "[ ] Integration test: GUIDELINE_ACCEPTED → onboarding_progress.state = completed"

  testing_strategy:
    end_to_end_test: |
      1. Call Foundation POST /kyc/:id/verify
      2. Assert outbox_event row created with event_name = KYC_VERIFIED
      3. Trigger KycVerifiedConsumer manually (or via poller)
      4. Assert verification_status row exists with type='kyc', status='verified'
      5. Assert VERIFICATION_STATUS_UPDATED event in outbox

    idempotency_test: |
      1. Call UpsertVerificationStatus twice with same account_id + type
      2. Assert only one row exists in verification_status
      3. Assert status reflects the latest call

    error_test: |
      1. Publish KYC_VERIFIED event with missing subject_id
      2. Assert consumer logs error and does NOT crash
      3. Assert outbox_event_consumer row marked as failed/dead-lettered

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: "UserIdentity pillar consumes cross-pillar events from Foundation to keep verification status and onboarding progress in sync"

  outbox_pattern:
    how_it_works:
      - "Foundation plugin emits events (KYC_VERIFIED, GUIDELINE_ACCEPTED) to outbox table"
      - "Outbox processor polls and publishes events to the EventBus"
      - "UserIdentity consumers register on module init and process events asynchronously"
      - "Each consumer delegates to a dedicated handler containing all business logic"
    benefits:
      - "Guaranteed at-least-once delivery"
      - "Decoupled pillar communication — Foundation does not import UserIdentity"
      - "Idempotent upserts prevent duplicate rows on retry"

  consumers:
    - event: "KYC_VERIFIED"
      source_pillar: "foundation"
      consumer_name: "KycVerifiedConsumer"
      consumer_location: "src/plugins/user-identity/consumers/kyc-verified.consumer.ts"
      handler_name: "KycVerifiedHandler"
      handler_location: "src/plugins/user-identity/handlers/kyc-verified.handler.ts"
      status: "IMPLEMENTED"
      purpose: "Upsert verification_status row with type='kyc', status='verified' when KYC is completed"
      payload_fields:
        - kyc_id: "ID of the KYC record in Foundation"
        - subject_type: "'person' or 'account'"
        - subject_id: "Treated as account_id regardless of subject_type"
        - provider: "KYC provider name (stored in meta_json)"
      idempotency_strategy:
        - "VerificationStatusRepository.upsert uses ON DUPLICATE KEY UPDATE on (account_id, type)"
        - "Repeated events result in an in-place update, not duplicate rows"
      target_table: "verification_status"
      target_fields:
        account_id: "event.subject_id"
        type: "'kyc'"
        status: "'verified'"
        meta_json: "{ provider, kyc_id }"

    - event: "GUIDELINE_ACCEPTED"
      source_pillar: "foundation"
      consumer_name: "GuidelineAcceptedConsumer"
      consumer_location: "src/plugins/user-identity/consumers/guideline-accepted.consumer.ts"
      handler_name: "GuidelineAcceptedHandler"
      handler_location: "src/plugins/user-identity/handlers/guideline-accepted.handler.ts"
      status: "IMPLEMENTED"
      purpose: "Upsert onboarding_progress row with step_code='guideline_accepted', state='completed'"
      skip_condition: "event.user_id is null — log and return without processing"
      payload_fields:
        - acceptance_id: "ID of the acceptance record"
        - version_id: "ID of the guideline version accepted"
        - account_id: "Account ID (optional)"
        - person_id: "Person ID (optional)"
        - user_id: "User ID who accepted (required — skip if null)"
        - acceptance_status: "Status of the acceptance"
        - channel: "Acceptance channel"
        - source: "Source system"
      idempotency_strategy:
        - "OnboardingProgressRepository.upsert uses orUpdate on (user_id, step_code) conflict"
        - "Repeated events update state and meta_json in place"
      target_table: "onboarding_progress"
      target_fields:
        user_id: "Number(event.user_id)"
        step_code: "'guideline_accepted'"
        state: "'completed'"
        meta_json: "{ version_id, acceptance_id }"

