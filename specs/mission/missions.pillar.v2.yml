  - name: "MissionRewardGrant.GetByAssignment"
    description: "Get reward grant by assignment"
    path: "/v1/missions/assignments/{assignment_id}/reward-grant"
    method: "GET"
    idempotent: false
    permissions: []
    input: null
    steps:
      - kind: "read"
        table: "mission_reward_grant"
        where:
          assignment_id: "path.assignment_id"
        into: "reward_grant"

    response:
      status: 200
      body: "reward_grant"

  - name: "MissionEvent.ListByAssignment"
    description: "List events by assignment"
    path: "/v1/missions/assignments/{assignment_id}/events"
    method: "GET"
    idempotent: false
    permissions: []
    input: null
    steps:
      - kind: "read"
        table: "mission_event"
        where:
          assignment_id: "path.assignment_id"
