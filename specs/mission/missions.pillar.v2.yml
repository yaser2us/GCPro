coverage:
  tables:
    mission_definition:
      touched_by:
        - "MissionDefinition.Create"
        - "MissionDefinition.Get"
        - "MissionDefinition.List"
        - "MissionDefinition.Pause"
        - "MissionDefinition.Publish"
        - "MissionDefinition.Retire"
        - "MissionSubmission.Approve"
    mission_assignment:
      touched_by:
        - "MissionAssignment.Assign"
        - "MissionAssignment.Get"
        - "MissionAssignment.ListByUser"
        - "MissionProgress.Record"
        - "MissionSubmission.Submit"
        - "MissionSubmission.Approve"
        - "MissionSubmission.Reject"
    mission_event:
      touched_by:
        - "MissionAssignment.Assign"
        - "MissionProgress.Record"
        - "MissionSubmission.Submit"
        - "MissionSubmission.Approve"
        - "MissionSubmission.Reject"
        - "MissionEvent.ListByAssignment"
    mission_progress:
      touched_by:
        - "MissionProgress.Record"
    mission_submission:
      touched_by:
        - "MissionSubmission.Submit"
        - "MissionSubmission.Get"
        - "MissionSubmission.Approve"
        - "MissionSubmission.Reject"
    mission_submission_file:
      touched_by:
        - "MissionSubmissionFile.ListBySubmission"
    mission_reward_grant:
      touched_by:
        - "MissionSubmission.Approve"
        - "MissionRewardGrant.GetByAssignment"

  events:
    MISSION_DEFINITION_CREATED:
      emitted_by:
        - "MissionDefinition.Create"
    MISSION_DEFINITION_PUBLISHED:
      emitted_by:
        - "MissionDefinition.Publish"
    MISSION_DEFINITION_PAUSED:
      emitted_by:
        - "MissionDefinition.Pause"
    MISSION_DEFINITION_RETIRED:
      emitted_by:
        - "MissionDefinition.Retire"
    MISSION_ASSIGNED:
      emitted_by:
        - "MissionAssignment.Assign"
    MISSION_PROGRESS_RECORDED:
      emitted_by:
        - "MissionProgress.Record"
    MISSION_SUBMITTED:
      emitted_by:
        - "MissionSubmission.Submit"
    MISSION_SUBMISSION_APPROVED:
      emitted_by:
        - "MissionSubmission.Approve"
    MISSION_SUBMISSION_REJECTED:
      emitted_by:
        - "MissionSubmission.Reject"
    MISSION_COMPLETED:
      emitted_by:
        - "MissionSubmission.Approve"
    MISSION_REWARD_GRANTED:
      emitted_by:
        - "MissionSubmission.Approve"

  aggregate_transitions:
    MISSION_DEFINITION:
      active:
        - "MissionDefinition.Pause"
        - "MissionDefinition.Retire"
      paused:
        - "MissionDefinition.Publish"
        - "MissionDefinition.Retire"
    MISSION_ASSIGNMENT:
      assigned:
        - "MissionProgress.Record"
        - "MissionSubmission.Submit"
      in_progress:
        - "MissionProgress.Record"
        - "MissionSubmission.Submit"
      submitted:
        - "MissionSubmission.Approve"
        - "MissionSubmission.Reject"
    MISSION_SUBMISSION:
      pending:
        - "MissionSubmission.Approve"
        - "MissionSubmission.Reject"

