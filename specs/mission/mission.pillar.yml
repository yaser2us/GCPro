# gcpro.missions.v1.yml
version: "1.0"
spec_id: "gcpro.missions.v1"
domain: "missions"
owner:
  plugin: "missions"
  owns_tables:
    # ✅ latest R5 naming (no mission_enrollment)
    - "mission_definition"
    - "mission_assignment"
    - "mission_progress"
    - "mission_submission"
    - "mission_submission_file"
    - "mission_reward_grant"
    - "mission_event"
  cross_plugin_writes_allowed: false

dependencies:
  corekit:
    transaction: "COREKIT.Transaction.run"
    outbox: "COREKIT.Outbox.emit"
    audit: "COREKIT.Audit.record"
  core_tables_readonly:
    - "user" # missions references user_id via assignment/submission reviewer, etc.

conventions:
  workflow_steps: ["guard", "validate", "write", "emit", "commit"]
  status_mutation_policy: "Status fields may only be mutated via command workflows."
  idempotency:
    header: "Idempotency-Key"
    scope_default: "actor_user_id + command_name + aggregate_id"
    fingerprint_default: "hash(request_body + path_params)"
    behavior:
      on_replay_completed: "return_same_response"
      on_replay_inflight: "409_conflict"
  outbox:
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"

aggregates:
  - name: "mission_definition"
    type: "MISSION_DEFINITION"
    pk: "id"
    table: "mission_definition"
    status_values: ["draft", "published", "paused", "retired"]

  - name: "mission_assignment"
    type: "MISSION_ASSIGNMENT"
    pk: "id"
    table: "mission_assignment"
    status_values: ["assigned", "in_progress", "submitted", "completed", "cancelled"]

  - name: "mission_submission"
    type: "MISSION_SUBMISSION"
    pk: "id"
    table: "mission_submission"
    status_values: ["pending", "approved", "rejected", "invalidated"]

  - name: "mission_reward_grant"
    type: "MISSION_REWARD_GRANT"
    pk: "id"
    table: "mission_reward_grant"
    status_values: ["created", "requested", "granted", "failed", "revoked"]

dtos:
  MissionDefinitionCreateRequest:
    fields:
      - { name: "code", type: "string", required: true, max_len: 64 }
      - { name: "title", type: "string", required: true, max_len: 200 }
      - { name: "description", type: "string", required: false, max_len: 5000 }
      - { name: "cadence", type: "string", required: true, example: "one_time" }
      - { name: "starts_at", type: "datetime", required: false }
      - { name: "ends_at", type: "datetime", required: false }
      - { name: "max_total", type: "int32", required: false }
      - { name: "max_per_user", type: "int32", required: false }
      - { name: "criteria_json", type: "json", required: false }
      - { name: "reward_json", type: "json", required: false }

  MissionDefinitionPublishRequest:
    fields: []

  MissionDefinitionPauseRequest:
    fields:
      - { name: "reason", type: "string", required: true, max_len: 300 }

  MissionAssignRequest:
    fields:
      - { name: "user_id", type: "int64", required: true }
      - { name: "assignment_type", type: "string", required: false, example: "self_enroll" }

  MissionSubmitRequest:
    fields:
      - { name: "text_content", type: "string", required: false, max_len: 8000 }
      - { name: "meta_json", type: "json", required: false }
      - { name: "file_ref_ids", type: "int64[]", required: false }

  MissionApproveSubmissionRequest:
    fields:
      - { name: "feedback", type: "string", required: false, max_len: 2000 }

  MissionRejectSubmissionRequest:
    fields:
      - { name: "rejection_reason", type: "string", required: true, max_len: 500 }

events:
  - { name: "MISSION_DEFINITION_CREATED", version: 1, aggregate_type: "MISSION_DEFINITION" }
  - { name: "MISSION_DEFINITION_PUBLISHED", version: 1, aggregate_type: "MISSION_DEFINITION" }
  - { name: "MISSION_DEFINITION_PAUSED", version: 1, aggregate_type: "MISSION_DEFINITION" }
  - { name: "MISSION_DEFINITION_RETIRED", version: 1, aggregate_type: "MISSION_DEFINITION" }

  - { name: "MISSION_ASSIGNED", version: 1, aggregate_type: "MISSION_ASSIGNMENT" }
  - { name: "MISSION_SUBMITTED", version: 1, aggregate_type: "MISSION_SUBMISSION" }
  - { name: "MISSION_SUBMISSION_APPROVED", version: 1, aggregate_type: "MISSION_SUBMISSION" }
  - { name: "MISSION_SUBMISSION_REJECTED", version: 1, aggregate_type: "MISSION_SUBMISSION" }
  - { name: "MISSION_COMPLETED", version: 1, aggregate_type: "MISSION_ASSIGNMENT" }

  - name: "MISSION_REWARD_REQUESTED"
    version: 1
    aggregate_type: "MISSION_REWARD_GRANT"
    notes:
      - "Integration event for wallet/ledger plugin. Missions must not post ledger entries directly."

commands:
  - name: "MissionDefinition.Create"
    http: { method: "POST", path: "/v1/missions/definitions" }
    idempotency:
      scope: "actor_user_id + command_name + request.code"
      key_from: "header:Idempotency-Key"
      fingerprint: "hash(request_body)"
    guard:
      - expr: "len(request.code) > 0"
        error: { code: "INVALID_CODE" }
      - expr: "request.ends_at == null || request.starts_at == null || request.ends_at > request.starts_at"
        error: { code: "INVALID_TIME_RANGE" }
    write:
      transaction: "COREKIT.Transaction.run"
      steps:
        - insert:
            table: "mission_definition"
            assign:
              # id is AUTO_INCREMENT in DDL; generator should read back inserted id
              code: "request.code"
              title: "request.title"
              description: "request.description"
              cadence: "request.cadence"
              starts_at: "request.starts_at"
              ends_at: "request.ends_at"
              max_total: "request.max_total"
              max_per_user: "request.max_per_user"
              criteria_json: "request.criteria_json"
              reward_json: "request.reward_json"
              status: "draft"
              created_at: "now()"
        - derive:
            assign:
              mission_definition_id: "last_insert_id()"
    emit:
      - outbox:
          event: "MISSION_DEFINITION_CREATED"
          aggregate_type: "MISSION_DEFINITION"
          aggregate_id: "mission_definition_id"
          payload:
            id: "mission_definition_id"
            code: "request.code"
            title: "request.title"
            cadence: "request.cadence"
    response:
      status: 201
      body: { id: "mission_definition_id", status: "draft" }

  - name: "MissionDefinition.Publish"
    http: { method: "POST", path: "/v1/missions/definitions/{id}/publish" }
    idempotency:
      scope: "actor_user_id + command_name + path.id"
      key_from: "header:Idempotency-Key"
      fingerprint: "hash(path_params)"
    load:
      - defn:
          table: "mission_definition"
          where: { id: "path.id" }
    guard:
      - expr: "defn.status in ['draft','paused']"
        error: { code: "MISSION_DEFINITION_NOT_PUBLISHABLE" }
    write:
      transaction: "COREKIT.Transaction.run"
      steps:
        - update:
            table: "mission_definition"
            where: { id: "path.id" }
            set:
              status: "published"
              published_at: "now()"
    emit:
      - outbox:
          event: "MISSION_DEFINITION_PUBLISHED"
          aggregate_type: "MISSION_DEFINITION"
          aggregate_id: "path.id"
          payload: { id: "path.id" }
    response:
      status: 200
      body: { id: "path.id", status: "published" }

  - name: "Mission.Assign"
    http: { method: "POST", path: "/v1/missions/definitions/{definition_id}/assign" }
    idempotency:
      scope: "actor_user_id + command_name + path.definition_id + request.user_id"
      key_from: "header:Idempotency-Key"
      fingerprint: "hash(path_params + request_body)"
    load:
      - defn:
          table: "mission_definition"
          where: { id: "path.definition_id" }
      - existing:
          table: "mission_assignment"
          where:
            mission_id: "path.definition_id"
            user_id: "request.user_id"
          optional: true
    guard:
      - expr: "defn.status == 'published'"
        error: { code: "MISSION_NOT_OPEN" }
      - expr: "existing == null"
        error: { code: "ALREADY_ASSIGNED" }
    write:
      transaction: "COREKIT.Transaction.run"
      steps:
        - derive:
            assign:
              assignment_dedupe_key: "coalesce(header('Idempotency-Key'), concat('mission_assign:', path.definition_id, ':', request.user_id))"
        - insert:
            table: "mission_assignment"
            assign:
              mission_id: "path.definition_id"
              user_id: "request.user_id"
              status: "assigned"
              idempotency_key: "assignment_dedupe_key"
              assigned_at: "now()"
              created_at: "now()"
        - derive:
            assign:
              assignment_id: "last_insert_id()"
        - insert:
            table: "mission_event"
            assign:
              assignment_id: "assignment_id"
              event_type: "assigned"
              payload_json:
                assignment_type: "request.assignment_type"
              occurred_at: "now()"
              created_at: "now()"
    emit:
      - outbox:
          event: "MISSION_ASSIGNED"
          aggregate_type: "MISSION_ASSIGNMENT"
          aggregate_id: "assignment_id"
          payload:
            assignment_id: "assignment_id"
            mission_definition_id: "path.definition_id"
            user_id: "request.user_id"
    response:
      status: 201
      body: { assignment_id: "assignment_id", status: "assigned" }

  - name: "Mission.Submit"
    http: { method: "POST", path: "/v1/missions/assignments/{assignment_id}/submit" }
    idempotency:
      scope: "actor_user_id + command_name + path.assignment_id"
      key_from: "header:Idempotency-Key"
      fingerprint: "hash(path_params + request_body)"
    load:
      - asg:
          table: "mission_assignment"
          where: { id: "path.assignment_id" }
      - existing_submission:
          table: "mission_submission"
          where: { assignment_id: "path.assignment_id" }
          optional: true
    guard:
      - expr: "asg.user_id == actor.user_id"
        error: { code: "NOT_OWNER" }
      - expr: "asg.status in ['assigned','in_progress','submitted']"
        error: { code: "ASSIGNMENT_NOT_SUBMITTABLE" }
      - expr: "existing_submission == null"
        error: { code: "ALREADY_SUBMITTED" }
    write:
      transaction: "COREKIT.Transaction.run"
      steps:
        - derive:
            assign:
              submission_dedupe_key: "coalesce(header('Idempotency-Key'), concat('mission_submit:', path.assignment_id))"
        - insert:
            table: "mission_submission"
            assign:
              assignment_id: "path.assignment_id"
              text_content: "request.text_content"
              meta_json: "request.meta_json"
              status: "pending"
              idempotency_key: "submission_dedupe_key"
              submitted_at: "now()"
              created_at: "now()"
        - derive:
            assign:
              submission_id: "last_insert_id()"
        - foreach:
            over: "request.file_ref_ids"
            as: "file_ref_id"
            steps:
              - insert:
                  table: "mission_submission_file"
                  assign:
                    submission_id: "submission_id"
                    file_ref_id: "file_ref_id"
                    created_at: "now()"
        - update:
            table: "mission_assignment"
            where: { id: "path.assignment_id" }
            set:
              status: "submitted"
              updated_at: "now()"
        - insert:
            table: "mission_event"
            assign:
              assignment_id: "path.assignment_id"
              event_type: "submitted"
              payload_json:
                submission_id: "submission_id"
              occurred_at: "now()"
              created_at: "now()"
    emit:
      - outbox:
          event: "MISSION_SUBMITTED"
          aggregate_type: "MISSION_SUBMISSION"
          aggregate_id: "submission_id"
          payload:
            submission_id: "submission_id"
            assignment_id: "path.assignment_id"
            user_id: "actor.user_id"
    response:
      status: 201
      body: { submission_id: "submission_id", status: "pending" }

  - name: "Mission.ApproveSubmission"
    http: { method: "POST", path: "/v1/missions/submissions/{submission_id}/approve" }
    idempotency:
      scope: "actor_user_id + command_name + path.submission_id"
      key_from: "header:Idempotency-Key"
      fingerprint: "hash(path_params + request_body)"
    load:
      - sub:
          table: "mission_submission"
          where: { id: "path.submission_id" }
      - asg:
          table: "mission_assignment"
          where: { id: "sub.assignment_id" }
      - defn:
          table: "mission_definition"
          where: { id: "asg.mission_id" }
      - existing_grant:
          table: "mission_reward_grant"
          where: { assignment_id: "asg.id" }
          optional: true
    guard:
      - expr: "sub.status == 'pending'"
        error: { code: "SUBMISSION_NOT_APPROVABLE" }
    write:
      transaction: "COREKIT.Transaction.run"
      steps:
        - update:
            table: "mission_submission"
            where: { id: "path.submission_id" }
            set:
              status: "approved"
              reviewed_by_user_id: "actor.user_id"
              feedback: "request.feedback"
              reviewed_at: "now()"
        - update:
            table: "mission_assignment"
            where: { id: "asg.id" }
            set:
              status: "completed"
              completed_at: "now()"
              updated_at: "now()"
        - derive:
            assign:
              reward_dedupe_key: "concat('mission_reward:', asg.id)"
        - if:
            expr: "existing_grant == null"
            steps:
              - insert:
                  table: "mission_reward_grant"
                  assign:
                    assignment_id: "asg.id"
                    reward_type: "json_get(defn.reward_json,'reward_type')"
                    amount: "json_get(defn.reward_json,'amount')"
                    currency: "coalesce(json_get(defn.reward_json,'currency'),'MYR')"
                    status: "requested"
                    idempotency_key: "reward_dedupe_key"
                    created_at: "now()"
              - derive:
                  assign:
                    reward_grant_id: "last_insert_id()"
        - insert:
            table: "mission_event"
            assign:
              assignment_id: "asg.id"
              event_type: "approved"
              payload_json:
                submission_id: "path.submission_id"
                reward_grant_id: "coalesce(reward_grant_id, existing_grant.id)"
              occurred_at: "now()"
              created_at: "now()"
    emit:
      - outbox:
          event: "MISSION_SUBMISSION_APPROVED"
          aggregate_type: "MISSION_SUBMISSION"
          aggregate_id: "path.submission_id"
          payload:
            submission_id: "path.submission_id"
            assignment_id: "asg.id"
            reviewed_by_user_id: "actor.user_id"
      - outbox:
          event: "MISSION_COMPLETED"
          aggregate_type: "MISSION_ASSIGNMENT"
          aggregate_id: "asg.id"
          payload:
            assignment_id: "asg.id"
            mission_definition_id: "asg.mission_id"
            user_id: "asg.user_id"
      - outbox:
          event: "MISSION_REWARD_REQUESTED"
          aggregate_type: "MISSION_REWARD_GRANT"
          aggregate_id: "coalesce(reward_grant_id, existing_grant.id)"
          dedupe_key: "reward_dedupe_key"
          payload:
            reward_grant_id: "coalesce(reward_grant_id, existing_grant.id)"
            assignment_id: "asg.id"
            mission_definition_id: "asg.mission_id"
            user_id: "asg.user_id"
            reward_json: "defn.reward_json"
            idempotency_key: "reward_dedupe_key"
    response:
      status: 200
      body:
        submission_id: "path.submission_id"
        submission_status: "approved"
        assignment_id: "asg.id"
        assignment_status: "completed"
        reward_grant_id: "coalesce(reward_grant_id, existing_grant.id)"
        reward_status: "requested"

codegen:
  language: "typescript"
  framework: "nestjs"
  example_generated_outputs:
    dtos:
      - "src/plugins/missions/dto/mission-definition-create.request.generated.ts"
      - "src/plugins/missions/dto/mission-assign.request.generated.ts"
      - "src/plugins/missions/dto/mission-submit.request.generated.ts"
      - "src/plugins/missions/dto/mission-approve-submission.request.generated.ts"
    controllers:
      - "src/plugins/missions/controllers/missions.commands.controller.generated.ts"
    services:
      - "src/plugins/missions/services/missions.workflow.service.generated.ts"
    tests:
      - "test/missions/mission-definition.create.e2e.generated.spec.ts"
      - "test/missions/mission.submit.e2e.generated.spec.ts"
      - "test/missions/mission.approve-submission.e2e.generated.spec.ts"
    openapi:
      - "openapi/missions.v1.generated.yaml"