    date: "2026-03-23"
    author: "Claude Code"
    description: "Phase 6 - Referral Conversion & Reward Engine"
    changes:
      - "Phase 6: PolicyActivatedHandler — on POLICY_ACTIVATED, creates reward grants for referrer and referee"
      - "Phase 6: PolicyActivatedConsumer — subscribes to POLICY_ACTIVATED in referral plugin"
      - "Phase 6: ReferralRewardHandler (wallet plugin) — on REFERRAL_REWARD_REQUESTED, creates wallet_deposit_intent for COIN"
      - "Phase 6: ReferralRewardConsumer (wallet plugin) — subscribes to REFERRAL_REWARD_REQUESTED"
      - "Phase 6: POST /v1/referral/rewards/request — admin endpoint to trigger rewards for a conversion"
      - "Phase 6: requestRewards method added to ReferralWorkflowService"
    breaking_changes: []
    migrations_required: []

  - version: "1.0"
    date: "2026-03-17"
    author: "Claude Code"
    description: "Initial referral pillar specification"
    changes:
      - "Added complete schema for all 8 referral tables"
      - "Defined aggregates for program, invite, conversion, and reward workflows"
      - "Created commands for program lifecycle, code generation, invite creation, conversion tracking, and reward requests"
      - "Established event-driven integration patterns for reward fulfillment"
      - "Implemented multi-level referral chain tracking support"
    breaking_changes: []
    migrations_required:
      - "Create all referral tables as per DDL"
      - "Set up indexes and foreign key constraints"

