# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: "Claims pillar integrates with Policy, Wallet, and Notification pillars via synchronous reads, command calls, and event-driven patterns"

  outbox_pattern:
    how_it_works:
      - "Commands write to domain tables and emit events to outbox table atomically within same transaction"
      - "Outbox processor polls for new events and publishes to event bus"
      - "Consumers in other pillars listen for events and process asynchronously"
      - "Each event includes correlation_id, causation_id for tracing"
    benefits:
      - "Guaranteed event delivery (at-least-once semantics)"
      - "Transactional consistency between domain state and events"
      - "Decoupled pillar communication"
      - "Audit trail of all cross-pillar interactions"

  policy:
    description: "Claims reads policy data for validation and calls Policy commands for benefit management"
    pattern: "synchronous_read_and_command_call"

    synchronous_reads:
      - table: "policy"
        purpose: "Validate policy is active before claim submission or GL issuance"
      - table: "policy_benefit_entitlement"
        purpose: "Check benefit limits and validate claim amounts"
      - table: "policy_benefit_usage"
        purpose: "Check current usage levels"

    command_calls:
      - command: "Policy.BenefitUsage.Reserve"
        when: "GuaranteeLetter.Issue"
        purpose: "Reserve benefit amount for GL period"
        sync: true
      - command: "Policy.BenefitUsage.Confirm"
        when: "Claim.Settle"
        purpose: "Confirm benefit usage and update policy_benefit_usage"
        sync: true
      - command: "Policy.BenefitUsage.Release"
        when: "GuaranteeLetter.Cancel"
        purpose: "Release reserved benefit amount"
        sync: true

  wallet:
    description: "Wallet consumes claim settlement events to create payout transactions"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "CLAIM_SETTLED"
        consumer_name: "ClaimSettledConsumer"
        location: "src/plugins/wallet/consumers/claim-settled.consumer.ts"
        responsibility: "Create wallet transaction for claim payout"

        expected_behavior:
          - "Read claim details including approved_amount and period_key"
          - "Create ledger transaction for payout"
          - "Update wallet balance"
          - "Emit WALLET_TRANSACTION_CREATED event"

        event_payload_example:
          event_type: "CLAIM_SETTLED"
          aggregate_type: "CLAIM_CASE"
          aggregate_id: 123
          payload:
            claim_id: 123
            claim_number: "CL-2026-00001"
            approved_amount: 5000.00
            period_key: "2026-03"

        idempotency_strategy:
          - "Check for existing wallet transaction with same claim_id"
          - "Use claim_id as idempotency key"

        error_handling:
          - "Log error and mark event for retry"
          - "Alert ops team if retry limit exceeded"

  notification:
    description: "Notification consumes all claim events to send alerts to users"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "CLAIM_SUBMITTED"
        consumer_name: "ClaimNotificationConsumer"
        location: "src/plugins/notification/consumers/claim-notification.consumer.ts"
        responsibility: "Send submission confirmation to claimant"

        expected_behavior:
          - "Fetch claimant person and account details"
          - "Send email/SMS confirmation with claim number"
          - "Create notification record"

        idempotency_strategy:
