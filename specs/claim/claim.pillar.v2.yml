      - "closed"

# ──────────────────────────────────────────────────────────────────────────────
# TYPES
# ──────────────────────────────────────────────────────────────────────────────

types:
  Actor:
    description: "Represents an actor in the system"
    fields:
      - name: "actorType"
        type: "string"
        description: "Type of actor (user, system)"
      - name: "actorId"
        type: "bigint"
        nullable: true
        description: "Actor identifier"

  ClaimSummary:
    description: "Summary information for a claim"
    fields:
      - name: "claimId"
        type: "bigint"
      - name: "claimNumber"
        type: "string"
      - name: "status"
        type: "string"
      - name: "claimType"
        type: "string"
      - name: "requestedAmount"
        type: "decimal"
      - name: "approvedAmount"
        type: "decimal"
        nullable: true
      - name: "submittedAt"
        type: "datetime"
        nullable: true

  MedicalCaseSummary:
    description: "Summary information for a medical case"
    fields:
      - name: "medicalCaseId"
        type: "bigint"
      - name: "caseNumber"
        type: "string"
      - name: "status"
        type: "string"
      - name: "providerName"
        type: "string"
      - name: "admittedAt"
        type: "datetime"
        nullable: true
      - name: "dischargedAt"
        type: "datetime"
        nullable: true

  UnderwritingOutcomeSummary:
    description: "Summary of underwriting decision"
    fields:
      - name: "outcomeId"
        type: "bigint"
      - name: "caseId"
        type: "bigint"
      - name: "versionNo"
        type: "int"
      - name: "decision"
        type: "string"
      - name: "riskLevel"
        type: "string"
        nullable: true
      - name: "decidedAt"
        type: "datetime"

# ──────────────────────────────────────────────────────────────────────────────
# DTOS
# ──────────────────────────────────────────────────────────────────────────────

dtos:
  ClaimSubmitDto:
    description: "DTO for claim submission"
    fields:
      - name: "accountId"
        type: "string"
        required: true
      - name: "claimantPersonId"
        type: "string"
        required: true
      - name: "insurantPersonId"
        type: "string"
        required: true
      - name: "claimType"
        type: "string"
        required: true
        max_len: 50
      - name: "hospitalName"
        type: "string"
        required: true
        max_len: 255
      - name: "admissionDate"
        type: "date"
        required: true
      - name: "dischargeDate"
        type: "date"
        required: false
      - name: "diagnosis"
        type: "string"
        required: true
      - name: "treatmentType"
        type: "string"
        required: true
        max_len: 120
      - name: "requestedAmount"
        type: "decimal"
        required: true
      - name: "documents"
        type: "array"
        required: false
        item_type: "ClaimDocumentDto"

  ClaimDocumentDto:
    description: "DTO for claim document"
    fields:
      - name: "fileUploadId"
        type: "string"
        required: true
      - name: "documentType"
        type: "string"
        required: true
        max_len: 80

  ClaimAssignReviewerDto:
    description: "DTO for assigning reviewer"
    fields:
      - name: "reviewerId"
        type: "string"
        required: true
      - name: "reviewerRole"
        type: "string"
        required: true
        max_len: 30

  ClaimApproveDto:
    description: "DTO for claim approval"
    fields:
      - name: "approvedAmount"
        type: "decimal"
        required: true
      - name: "decisionNote"
        type: "string"
        required: false

  ClaimRejectDto:
    description: "DTO for claim rejection"
    fields:
      - name: "rejectionReason"
        type: "string"
        required: true
      - name: "decisionNote"
        type: "string"
        required: false

  ClaimSettleDto:
    description: "DTO for claim settlement"
    fields:
      - name: "settlementAmount"
        type: "decimal"
        required: true
      - name: "periodKey"
        type: "string"
        required: true
        max_len: 7

  GuaranteeLetterIssueDto:
    description: "DTO for issuing guarantee letter"
    fields:
      - name: "medicalCaseId"
        type: "string"
        required: true
      - name: "approvedLimitAmount"
        type: "decimal"
        required: true
      - name: "currency"
        type: "string"
        required: false
        default: "MYR"
        max_len: 8
      - name: "validFrom"
        type: "datetime"
        required: true
      - name: "validUntil"
        type: "datetime"
        required: true
      - name: "coverageSnapshot"
        type: "json"
        required: false

  MedicalCaseCreateDto:
    description: "DTO for creating medical case"
    fields:
      - name: "accountId"
        type: "string"
        required: true
      - name: "personId"
        type: "string"
        required: true
      - name: "policyId"
        type: "string"
        required: true
      - name: "providerId"
        type: "string"
        required: true
      - name: "admissionType"
        type: "string"
        required: false
        default: "emergency"
        max_len: 16
      - name: "diagnosisCode"
        type: "string"
        required: false
        max_len: 64
      - name: "diagnosisText"
        type: "string"
        required: false
        max_len: 255
      - name: "admittedAt"
        type: "datetime"
        required: false

  MedicalCaseUpdateDto:
    description: "DTO for medical case update"
    fields:
      - name: "status"
        type: "string"
        required: true
        max_len: 32
      - name: "dischargedAt"
        type: "datetime"
        required: false

  UnderwritingDecisionDto:
    description: "DTO for underwriting decision"
    fields:
      - name: "decision"
        type: "string"
        required: true
        max_len: 32
      - name: "riskLevel"
        type: "string"
        required: false
        max_len: 16
      - name: "overallLoadingFactor"
        type: "decimal"
        required: false
      - name: "decisionReasonJson"
        type: "json"
        required: false
      - name: "decisionNotes"
        type: "string"
        required: false
      - name: "terms"
        type: "array"
        required: false
        item_type: "UnderwritingTermDto"

  UnderwritingTermDto:
    description: "DTO for underwriting term"
    fields:
      - name: "termType"
        type: "string"
        required: true
        max_len: 16
      - name: "code"
        type: "string"
        required: false
        max_len: 64
      - name: "name"
        type: "string"
        required: false
        max_len: 255
      - name: "valueFactor"
        type: "decimal"
        required: false
      - name: "valueAmount"
        type: "decimal"
        required: false
      - name: "valueDays"
        type: "int"
        required: false
      - name: "valueText"
        type: "string"
        required: false
        max_len: 512

  FraudSignalDto:
    description: "DTO for fraud signal"
    fields:
      - name: "signalType"
        type: "string"
        required: true
        max_len: 60
      - name: "signalScore"
        type: "int"
        required: true
      - name: "signalPayload"
        type: "json"
        required: false

  UnderwritingEvidenceDto:
    description: "DTO for adding underwriting evidence"
    fields:
      - name: "evidenceType"
        type: "string"
        required: true
        max_len: 32
        default: "survey"
      - name: "surveyResponseId"
        type: "string"
        required: false
      - name: "note"
        type: "string"
        required: false
        max_len: 512
      - name: "metaJson"
        type: "json"
        required: false

# ──────────────────────────────────────────────────────────────────────────────
# EVENTS
# ──────────────────────────────────────────────────────────────────────────────

events:
  CLAIM_SUBMITTED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Claim has been submitted for review"

  CLAIM_REVIEWER_ASSIGNED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Reviewer has been assigned to claim"

  CLAIM_DOCUMENT_ADDED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Document has been added to claim"

  CLAIM_FRAUD_SIGNAL_RECORDED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Fraud signal has been recorded for claim"

  CLAIM_APPROVED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Claim has been approved for settlement"

  CLAIM_REJECTED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Claim has been rejected"

  CLAIM_SETTLED:
    version: "v1"
    aggregate_type: "CLAIM_CASE"
    description: "Claim has been settled and payout initiated"

  GUARANTEE_LETTER_ISSUED:
    version: "v1"
    aggregate_type: "GUARANTEE_LETTER"
    description: "Guarantee letter has been issued for cashless hospitalization"

  GUARANTEE_LETTER_CANCELLED:
    version: "v1"
    aggregate_type: "GUARANTEE_LETTER"
    description: "Guarantee letter has been cancelled"

  MEDICAL_CASE_CREATED:
    version: "v1"
    aggregate_type: "MEDICAL_CASE"
    description: "Medical case has been created"

  MEDICAL_CASE_UPDATED:
    version: "v1"
    aggregate_type: "MEDICAL_CASE"
    description: "Medical case has been updated"

  UNDERWRITING_DECISION_RECORDED:
    version: "v1"
    aggregate_type: "MEDICAL_UNDERWRITING_CASE"
    description: "Medical underwriting decision has been recorded"

  UNDERWRITING_EVIDENCE_ADDED:
    version: "v1"
    aggregate_type: "MEDICAL_UNDERWRITING_CASE"
    description: "Evidence has been added to underwriting case"

# ──────────────────────────────────────────────────────────────────────────────
# COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

commands:
  Claim.Submit:
    name: "Claim.Submit"
    description: "Submit new insurance claim"
    path: "/api/v1/claim/submit"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimSubmitDto"
    steps:
      - kind: "guard"
        description: "Validate account exists and is active"
      - kind: "guard"
        description: "Validate claimant person exists"
      - kind: "guard"
        description: "Validate insurant person exists"
      - kind: "guard"
        description: "Validate policy is active"
      - kind: "guard"
        description: "Check no duplicate claim for same insurant, admission date, hospital"
      - kind: "insert"
        table: "claim_case_number_sequence"
        description: "Generate claim number using MySQL ON DUPLICATE KEY UPDATE"
      - kind: "insert"
        table: "claim_case"
        fields: ["claim_number", "claim_year", "claim_seq", "account_id", "claimant_person_id", "insurant_person_id", "claim_type", "status", "hospital_name", "admission_date", "discharge_date", "diagnosis", "treatment_type", "requested_amount", "submitted_at"]
      - kind: "insert"
        table: "claim_document"
        description: "Insert documents if provided"
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "to_status", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_SUBMITTED"
    response:
      - "claimId"
      - "claimNumber"

  Claim.AssignReviewer:
    name: "Claim.AssignReviewer"
    description: "Assign reviewer to claim"
    path: "/api/v1/claim/:claimId/assign-reviewer"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimAssignReviewerDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists and is in submitted or under_review status"
      - kind: "guard"
        description: "Validate reviewer exists and is active"
      - kind: "update"
        table: "claim_case"
        fields: ["status"]
      - kind: "insert"
        table: "claim_review"
        fields: ["claim_id", "reviewer_id", "reviewer_role", "decision"]
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "from_status", "to_status", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_REVIEWER_ASSIGNED"
    response:
      - "claimId"
      - "reviewerId"

  Claim.AddDocument:
    name: "Claim.AddDocument"
    description: "Add supporting document to claim"
    path: "/api/v1/claim/:claimId/documents/add"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimDocumentDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists and is not cancelled"
      - kind: "guard"
        description: "Validate file_upload exists"
      - kind: "insert"
        table: "claim_document"
        fields: ["claim_id", "file_upload_id", "document_type", "uploaded_by"]
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_DOCUMENT_ADDED"
    response:
      - "claimId"
      - "documentId"

  Claim.RecordFraudSignal:
    name: "Claim.RecordFraudSignal"
    description: "Record fraud detection signal"
    path: "/api/v1/claim/:claimId/fraud-signal/record"
    method: "POST"
    idempotent: true
    permissions: []
    input: "FraudSignalDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists"
      - kind: "insert"
        table: "claim_fraud_signal"
        fields: ["claim_id", "signal_type", "signal_score", "signal_payload"]
      - kind: "when"
        condition: "signal_score >= 75"
        then:
          - kind: "outbox_emit"
            event: "CLAIM_FRAUD_SIGNAL_RECORDED"
    response:
      - "claimId"
      - "signalId"

  Claim.Approve:
    name: "Claim.Approve"
    description: "Approve claim for settlement"
    path: "/api/v1/claim/:claimId/approve"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimApproveDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists and is under_review"
      - kind: "guard"
        description: "Validate approved_amount <= requested_amount"
      - kind: "guard"
        description: "Validate within benefit limits"
      - kind: "update"
        table: "claim_case"
        fields: ["status", "approved_amount", "decided_at"]
      - kind: "update"
        table: "claim_review"
        fields: ["decision", "decision_note", "decided_at"]
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "from_status", "to_status", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_APPROVED"
    response:
      - "claimId"
      - "approvedAmount"

  Claim.Reject:
    name: "Claim.Reject"
    description: "Reject claim"
    path: "/api/v1/claim/:claimId/reject"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimRejectDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists and is under_review"
      - kind: "update"
        table: "claim_case"
        fields: ["status", "rejection_reason", "decided_at"]
      - kind: "update"
        table: "claim_review"
        fields: ["decision", "decision_note", "decided_at"]
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "from_status", "to_status", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_REJECTED"
    response:
      - "claimId"

  Claim.Settle:
    name: "Claim.Settle"
    description: "Process claim settlement"
    path: "/api/v1/claim/:claimId/settle"
    method: "POST"
    idempotent: true
    permissions: []
    input: "ClaimSettleDto"
    steps:
      - kind: "guard"
        description: "Validate claim exists and is approved"
      - kind: "guard"
        description: "Validate settlement_amount matches approved_amount"
      - kind: "update"
        table: "claim_case"
        fields: ["status"]
      - kind: "insert"
        table: "claim_settlement_flag"
        fields: ["claim_id", "period_key", "eligible", "reason_code", "set_by_actor_type", "set_by_actor_id", "set_at"]
      - kind: "insert"
        table: "claim_event"
        fields: ["claim_id", "event_type", "from_status", "to_status", "actor_type", "actor_id"]
      - kind: "outbox_emit"
        event: "CLAIM_SETTLED"
    response:
      - "claimId"

  GuaranteeLetter.Issue:
    name: "GuaranteeLetter.Issue"
    description: "Issue guarantee letter for cashless hospitalization"
    path: "/api/v1/guarantee-letter/issue"
    method: "POST"
    idempotent: true
    permissions: []
    input: "GuaranteeLetterIssueDto"
    steps:
      - kind: "guard"
        description: "Validate medical_case exists and is in reported or admitted status"
      - kind: "guard"
        description: "Validate policy is active"
      - kind: "guard"
        description: "Validate within policy entitlements"
      - kind: "insert"
        table: "guarantee_letter"
        fields: ["medical_case_id", "gl_number", "approved_limit_amount", "currency", "status", "valid_from", "valid_until", "coverage_snapshot", "meta_json", "issued_at"]
      - kind: "outbox_emit"
        event: "GUARANTEE_LETTER_ISSUED"
    response:
      - "glId"
      - "glNumber"

  GuaranteeLetter.Cancel:
    name: "GuaranteeLetter.Cancel"
    description: "Cancel guarantee letter"
    path: "/api/v1/guarantee-letter/:glId/cancel"
    method: "POST"
    idempotent: true
    permissions: []
    input: null
    steps:
      - kind: "guard"
        description: "Validate GL exists and is in issued or active status"
      - kind: "update"
        table: "guarantee_letter"
        fields: ["status", "cancelled_at"]
      - kind: "outbox_emit"
        event: "GUARANTEE_LETTER_CANCELLED"
    response:
      - "glId"

  MedicalCase.Create:
    name: "MedicalCase.Create"
    description: "Create medical case"
    path: "/api/v1/medical-case/create"
    method: "POST"
    idempotent: true
    permissions: []
    input: "MedicalCaseCreateDto"
    steps:
      - kind: "guard"
        description: "Validate account, person, policy, and provider exist"
      - kind: "insert"
        table: "medical_case"
        fields: ["case_number", "account_id", "person_id", "policy_id", "provider_id", "admission_type", "diagnosis_code", "diagnosis_text", "admitted_at", "status", "eligibility_snapshot", "meta_json"]
      - kind: "insert"
        table: "medical_case_event"
        fields: ["medical_case_id", "event_type", "actor_type", "actor_id", "payload_json", "occurred_at"]
      - kind: "outbox_emit"
        event: "MEDICAL_CASE_CREATED"
    response:
      - "medicalCaseId"
      - "caseNumber"

  MedicalCase.Update:
    name: "MedicalCase.Update"
    description: "Update medical case status"
    path: "/api/v1/medical-case/:medicalCaseId/update"
    method: "POST"
    idempotent: true
    permissions: []
    input: "MedicalCaseUpdateDto"
    steps:
      - kind: "guard"
        description: "Validate medical_case exists"
      - kind: "update"
        table: "medical_case"
        fields: ["status", "discharged_at"]
      - kind: "insert"
        table: "medical_case_event"
        fields: ["medical_case_id", "event_type", "actor_type", "actor_id", "payload_json", "occurred_at"]
      - kind: "outbox_emit"
        event: "MEDICAL_CASE_UPDATED"
    response:
      - "medicalCaseId"

  Underwriting.RecordDecision:
    name: "Underwriting.RecordDecision"
    description: "Record medical underwriting decision"
    path: "/api/v1/underwriting/:caseId/record-decision"
    method: "POST"
    idempotent: true
    permissions: []
    input: "UnderwritingDecisionDto"
    steps:
      - kind: "guard"
        description: "Validate case exists and is in open or pending status"
      - kind: "read"
        description: "Get next version number for this case"
      - kind: "insert"
        table: "medical_underwriting_outcome"
        fields: ["case_id", "version_no", "decision", "risk_level", "overall_loading_factor", "decision_reason_json", "decision_notes", "effective_from", "effective_to", "decided_by_user_id", "decided_at"]
      - kind: "insert"
        table: "medical_underwriting_term"
        description: "Insert terms if provided"
        fields: ["outcome_id", "term_type", "code", "name", "value_factor", "value_amount", "value_days", "value_text", "meta_json"]
      - kind: "upsert"
        table: "medical_underwriting_current_outcome"
        fields: ["subject_ref_id", "context_ref_id", "case_id", "outcome_id"]
        unique_by: ["subject_ref_id", "context_ref_id"]
      - kind: "update"
        table: "medical_underwriting_case"
        fields: ["status", "closed_at"]
      - kind: "outbox_emit"
        event: "UNDERWRITING_DECISION_RECORDED"
    response:
      - "caseId"
      - "outcomeId"
      - "versionNo"

  Underwriting.AddEvidence:
    name: "Underwriting.AddEvidence"
    description: "Add evidence to underwriting case"
    path: "/api/v1/underwriting/:caseId/add-evidence"
    method: "POST"
    idempotent: true
    permissions: []
    input: "UnderwritingEvidenceDto"
    steps:
      - kind: "guard"
        description: "Validate case exists"
      - kind: "insert"
        table: "medical_underwriting_evidence"
        fields: ["case_id", "evidence_type", "survey_response_id", "note", "meta_json"]
      - kind: "outbox_emit"
        event: "UNDERWRITING_EVIDENCE_ADDED"
    response:
      - "caseId"
      - "evidenceId"

# ──────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ──────────────────────────────────────────────────────────────────────────────

changelog:
  - version: "2.0.0"
    date: "2026-03-21"
    author: "Claude Sonnet 4.5"
    description: "Complete Claims Pillar specification aligned with FULL-DDL.md"
    changes:
      - "Corrected guarantee_letter schema: removed policy_id, provider_id, issued_by; added approved_limit_amount, currency, coverage_snapshot, meta_json, cancelled_at"
      - "Corrected medical_underwriting_current_outcome: added id as PK, added subject_ref_id and context_ref_id, renamed current_outcome_id to outcome_id"
      - "Corrected medical_underwriting_term: replaced description and value_json with separate value fields (code, name, value_factor, value_amount, value_days, value_text, meta_json)"
      - "Corrected medical_underwriting_evidence: replaced file_upload_id with note field"
      - "Added all foreign key constraints from DDL"
      - "Added all indexes from DDL"
