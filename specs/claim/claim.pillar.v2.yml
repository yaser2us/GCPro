version: "2.0.0"
spec_id: "claim.pillar.v2"
domain: "claim"
plugin: "claim"

# ──────────────────────────────────────────────────────────────────────────────
# OWNERSHIP
# ──────────────────────────────────────────────────────────────────────────────

ownership:
  owner_plugin: "claim"
  owns_tables:
    - "claim_case"
    - "claim_case_number_sequence"
    - "claim_document"
    - "claim_event"
    - "claim_fraud_signal"
    - "claim_link"
    - "claim_review"
    - "claim_settlement_flag"
    - "guarantee_letter"
    - "medical_case"
    - "medical_case_event"
    - "medical_provider"
    - "medical_underwriting_case"
    - "medical_underwriting_outcome"
    - "medical_underwriting_term"
    - "medical_underwriting_current_outcome"
    - "medical_underwriting_evidence"
  cross_plugin_writes: false
  cross_plugin_integration:
    allowed_via:
      - "command_api"
      - "outbox_events"

# ──────────────────────────────────────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────────────────────────────────────

dependencies:
  corekit:
    transaction_wrapper: "withTxn"
    outbox_service: "OutboxService.emit"
    guard_helper: "guard"
    domain_error: "DomainError"

  core_tables_readonly:
    - table_name: "policy"
      usage: "medical_case.policy_id and claim validation against policy_benefit_entitlement"
      access: "readonly_fk"
    - table_name: "policy_benefit_entitlement"
      usage: "Validate claim amounts against policy entitlements"
      access: "readonly"
    - table_name: "policy_benefit_usage"
      usage: "Reserve and confirm benefit usage"
      access: "readonly"
    - table_name: "person"
      usage: "claim_case.claimant_person_id, claim_case.insurant_person_id, medical_case.person_id reference person.id"
      access: "readonly_fk"
    - table_name: "account"
      usage: "claim_case.account_id and medical_case.account_id reference account.id"
      access: "readonly_fk"
    - table_name: "file_upload"
      usage: "claim_document.file_upload_id references file_upload.id"
      access: "readonly_fk"
    - table_name: "user"
      usage: "claim_review.reviewer_id, medical_underwriting_case.assigned_to_user_id reference user.id"
      access: "readonly_fk"
    - table_name: "resource_ref"
      usage: "medical_underwriting_case references resource_ref for subject and context"
      access: "readonly_fk"
    - table_name: "survey_response"
      usage: "medical_underwriting_evidence.survey_response_id references survey_response.id"
      access: "readonly_fk"

# ──────────────────────────────────────────────────────────────────────────────
# CONVENTIONS
# ──────────────────────────────────────────────────────────────────────────────

conventions:
  workflow_discipline:
    - "guard"
    - "write"
    - "emit"
    - "commit"

  status_mutation_policy: "Status fields may only be mutated through commands."

  outbox:
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"

  idempotency:
    required_header: "Idempotency-Key"
    default_scope: "actor_user_id + command_name"
    db_strategy:
      - "UNIQUE(idempotency_key) where applicable"
      - "MySQL ON DUPLICATE KEY UPDATE id = LAST_INSERT_ID(id)"
      - "claim_case: UNIQUE(claim_number) prevents duplicate claims"
      - "claim_case: UNIQUE(claim_year, claim_seq) ensures sequential claim numbering"
      - "claim_case: INDEX(insurant_person_id, admission_date, hospital_name) detects duplicate submissions"
      - "guarantee_letter: UNIQUE(gl_number) prevents duplicate GL numbers"
      - "guarantee_letter: UNIQUE(medical_case_id) ensures one GL per medical case"
      - "medical_case: UNIQUE(case_number) prevents duplicate medical case numbers"
      - "medical_underwriting_case: UNIQUE(case_no) prevents duplicate case numbers"
      - "medical_underwriting_outcome: UNIQUE(case_id, version_no) ensures versioned outcomes"
      - "medical_underwriting_current_outcome: UNIQUE(subject_ref_id, context_ref_id) ensures single current outcome per subject-context"

# ──────────────────────────────────────────────────────────────────────────────
# SCHEMA
# ──────────────────────────────────────────────────────────────────────────────

schema:
  tables:
    claim_case:
      description: "Main claim aggregate for insurance claim submission and processing"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_number:
          type: "varchar"
          length: 20
          nullable: false
          description: "Unique claim number (CL-YYYY-NNNNN)"
        claim_year:
          type: "int"
          nullable: false
          description: "Year component of claim number"
        claim_seq:
          type: "int"
          nullable: false
          description: "Sequence component of claim number"
        account_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to account"
        claimant_person_id:
          type: "bigint"
          nullable: false
          description: "Person submitting the claim"
        insurant_person_id:
          type: "bigint"
          nullable: false
          description: "Person covered by insurance (patient)"
        claim_type:
          type: "varchar"
          length: 50
          nullable: false
          description: "Type of claim (outpatient, inpatient, emergency)"
        status:
          type: "varchar"
          length: 50
          nullable: false
          description: "Claim lifecycle status"
        hospital_name:
          type: "varchar"
          length: 255
          nullable: false
          description: "Name of medical facility"
        admission_date:
          type: "date"
          nullable: false
          description: "Date of admission/treatment"
        discharge_date:
          type: "date"
          nullable: true
          description: "Date of discharge (null for outpatient)"
        diagnosis:
          type: "text"
          nullable: false
          description: "Medical diagnosis"
        treatment_type:
          type: "varchar"
          length: 120
          nullable: false
          description: "Type of treatment received"
        requested_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Amount requested by claimant"
        approved_amount:
          type: "decimal"
          precision: [12, 2]
          nullable: true
          description: "Amount approved (null until approved)"
        submitted_at:
          type: "datetime"
          nullable: true
          description: "Timestamp of claim submission"
        decided_at:
          type: "datetime"
          nullable: true
          description: "Timestamp of approval/rejection decision"
        rejection_reason:
          type: "text"
          nullable: true
          description: "Reason for rejection (if rejected)"
        version:
          type: "int"
          nullable: false
          default: "0"
          description: "Optimistic locking version"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_claim_number"
            columns: ["claim_number"]
          - name: "uk_claim_year_seq"
            columns: ["claim_year", "claim_seq"]
        indexes:
          - name: "idx_claim_owner"
            columns: ["account_id"]
          - name: "idx_claim_insurant"
            columns: ["insurant_person_id"]
          - name: "idx_claim_status"
            columns: ["status"]
          - name: "idx_claim_type"
            columns: ["claim_type"]
          - name: "idx_claim_submitted_at"
            columns: ["submitted_at"]
          - name: "idx_claim_admission_date"
            columns: ["admission_date"]
          - name: "idx_claim_duplicate"
            columns: ["insurant_person_id", "admission_date", "hospital_name(50)"]

    claim_case_number_sequence:
      description: "Sequence generator for claim numbers"
      columns:
        claim_year:
          type: "int"
          nullable: false
          description: "Year for sequence"
        next_seq:
          type: "int"
          nullable: false
          description: "Next sequence number"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last update timestamp"
      constraints:
        primary_key:
          - "claim_year"

    claim_document:
      description: "Supporting documents attached to claims"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to claim_case"
        file_upload_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to file_upload"
        document_type:
          type: "varchar"
          length: 80
          nullable: false
          description: "Type of document (medical_bill, receipt, report)"
        uploaded_by:
          type: "bigint"
          nullable: true
          description: "User ID who uploaded document"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Upload timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_claim_doc_unique"
            columns: ["claim_id", "file_upload_id"]
        indexes:
          - name: "idx_claim_doc_claim"
            columns: ["claim_id"]
          - name: "idx_claim_doc_type"
            columns: ["document_type"]
        foreign_keys:
          - name: "fk_claim_document_claim"
            columns: ["claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    claim_event:
      description: "Immutable audit trail of claim activities"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to claim_case"
        event_type:
          type: "varchar"
          length: 80
          nullable: false
          description: "Type of event"
        from_status:
          type: "varchar"
          length: 50
          nullable: true
          description: "Previous status (for transitions)"
        to_status:
          type: "varchar"
          length: 50
          nullable: true
          description: "New status (for transitions)"
        actor_type:
          type: "varchar"
          length: 20
          nullable: false
          description: "Type of actor (user, system)"
        actor_id:
          type: "bigint"
          nullable: true
          description: "Actor identifier"
        is_internal_note:
          type: "tinyint"
          length: 1
          nullable: false
          default: "0"
          description: "Internal note flag (0=no, 1=yes)"
        note:
          type: "text"
          nullable: true
          description: "Event notes"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Event timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_claim_event_claim"
            columns: ["claim_id", "created_at"]
          - name: "idx_claim_event_type"
            columns: ["event_type"]
        foreign_keys:
          - name: "fk_claim_event_claim"
            columns: ["claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    claim_fraud_signal:
      description: "Fraud detection signals and risk indicators"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to claim_case"
        signal_type:
          type: "varchar"
          length: 60
          nullable: false
          description: "Type of fraud signal"
        signal_score:
          type: "int"
          nullable: false
          description: "Risk score (0-100)"
        signal_payload:
          type: "json"
          nullable: true
          description: "Signal details and evidence"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Signal detection timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_claim_fraud_claim"
            columns: ["claim_id", "created_at"]
          - name: "idx_claim_fraud_type"
            columns: ["signal_type"]
          - name: "idx_claim_fraud_score"
            columns: ["signal_score"]
        foreign_keys:
          - name: "fk_claim_fraud_claim"
            columns: ["claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    claim_link:
      description: "Relationships between claims (duplicates, related)"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        from_claim_id:
          type: "bigint"
          nullable: false
          description: "Source claim"
        to_claim_id:
          type: "bigint"
          nullable: false
          description: "Target claim"
        link_type:
          type: "varchar"
          length: 30
          nullable: false
          description: "Type of relationship"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Link creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_claim_link_unique"
            columns: ["from_claim_id", "to_claim_id", "link_type"]
        indexes:
          - name: "idx_claim_link_from"
            columns: ["from_claim_id"]
          - name: "idx_claim_link_to"
            columns: ["to_claim_id"]
        foreign_keys:
          - name: "fk_claim_link_from"
            columns: ["from_claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"
          - name: "fk_claim_link_to"
            columns: ["to_claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    claim_review:
      description: "Reviewer decisions and assessments"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to claim_case"
        reviewer_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to user (reviewer)"
        reviewer_role:
          type: "varchar"
          length: 30
          nullable: false
          description: "Role of reviewer"
        decision:
          type: "varchar"
          length: 40
          nullable: false
          description: "Review decision"
        decision_note:
          type: "text"
          nullable: true
          description: "Decision notes"
        decided_at:
          type: "datetime"
          nullable: true
          description: "Decision timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Review creation timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_claim_review_claim"
            columns: ["claim_id", "created_at"]
          - name: "idx_claim_review_reviewer"
            columns: ["reviewer_id"]
        foreign_keys:
          - name: "fk_claim_review_claim"
            columns: ["claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    claim_settlement_flag:
      description: "Settlement eligibility per crowdfunding period"
      columns:
        id:
          type: "bigint"
          nullable: false
          auto_increment: true
          description: "Primary key"
        claim_id:
          type: "bigint"
          nullable: false
          description: "Foreign key to claim_case"
        period_key:
          type: "char"
          length: 7
          nullable: false
          description: "Crowdfunding period key (YYYY-MM)"
        eligible:
          type: "tinyint"
          length: 1
          nullable: false
          description: "Eligibility flag (0=no, 1=yes)"
        reason_code:
          type: "varchar"
          length: 60
          nullable: false
          default: "OK"
          description: "Eligibility reason code"
        note:
          type: "text"
          nullable: true
          description: "Additional notes"
        set_by_actor_type:
          type: "varchar"
          length: 20
          nullable: false
          description: "Actor type who set flag"
        set_by_actor_id:
          type: "bigint"
          nullable: true
          description: "Actor ID who set flag"
        set_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Flag set timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_claim_period"
            columns: ["claim_id", "period_key"]
        indexes:
          - name: "idx_period_eligible"
            columns: ["period_key", "eligible"]
          - name: "idx_claim_settlement"
            columns: ["claim_id"]
        foreign_keys:
          - name: "fk_claim_settlement_claim"
            columns: ["claim_id"]
            references_table: "claim_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "RESTRICT"

    guarantee_letter:
      description: "Guarantee letters for cashless hospitalization"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        medical_case_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_case"
        gl_number:
          type: "varchar"
          length: 64
          nullable: false
          description: "Unique GL number"
        approved_limit_amount:
          type: "decimal"
          precision: [18, 2]
          nullable: false
          description: "Approved coverage limit"
        currency:
          type: "varchar"
          length: 8
          nullable: false
          default: "MYR"
          description: "Currency code"
        status:
          type: "varchar"
          length: 32
          nullable: false
          default: "issued"
          description: "GL status"
        valid_from:
          type: "datetime"
          nullable: false
          description: "GL validity start"
        valid_until:
          type: "datetime"
          nullable: false
          description: "GL validity end"
        coverage_snapshot:
          type: "json"
          nullable: true
          description: "Snapshot of coverage details"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        issued_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "GL issuance timestamp"
        cancelled_at:
          type: "datetime"
          nullable: true
          description: "GL cancellation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_gl_number"
            columns: ["gl_number"]
          - name: "uk_gl_case"
            columns: ["medical_case_id"]
        indexes:
          - name: "idx_gl_status"
            columns: ["status"]
          - name: "idx_gl_valid"
            columns: ["valid_from", "valid_until"]
        foreign_keys:
          - name: "fk_gl_case"
            columns: ["medical_case_id"]
            references_table: "medical_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"

    medical_case:
      description: "Hospital admission cases for tracking"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        case_number:
          type: "varchar"
          length: 64
          nullable: false
          description: "Unique medical case number"
        account_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to account"
        person_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to person (patient)"
        policy_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to policy"
        provider_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_provider"
        admission_type:
          type: "varchar"
          length: 16
          nullable: false
          default: "emergency"
          description: "Type of admission"
        diagnosis_code:
          type: "varchar"
          length: 64
          nullable: true
          description: "ICD diagnosis code"
        diagnosis_text:
          type: "varchar"
          length: 255
          nullable: true
          description: "Diagnosis description"
        admitted_at:
          type: "datetime"
          nullable: true
          description: "Admission timestamp"
        discharged_at:
          type: "datetime"
          nullable: true
          description: "Discharge timestamp"
        status:
          type: "varchar"
          length: 32
          nullable: false
          default: "reported"
          description: "Medical case status"
        eligibility_snapshot:
          type: "json"
          nullable: true
          description: "Policy eligibility snapshot"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_medical_case_number"
            columns: ["case_number"]
        indexes:
          - name: "idx_case_policy"
            columns: ["policy_id", "status"]
          - name: "idx_case_provider"
            columns: ["provider_id", "status"]
          - name: "idx_case_person"
            columns: ["person_id"]
        foreign_keys:
          - name: "fk_case_provider"
            columns: ["provider_id"]
            references_table: "medical_provider"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"

    medical_case_event:
      description: "Medical case event log"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        medical_case_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_case"
        event_type:
          type: "varchar"
          length: 64
          nullable: false
          description: "Type of event"
        actor_type:
          type: "varchar"
          length: 16
          nullable: false
          default: "system"
          description: "Actor type"
        actor_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "Actor ID"
        payload_json:
          type: "json"
          nullable: true
          description: "Event payload"
        occurred_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Event occurrence timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_mce_case_time"
            columns: ["medical_case_id", "occurred_at"]
        foreign_keys:
          - name: "fk_mce_case"
            columns: ["medical_case_id"]
            references_table: "medical_case"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"

    medical_provider:
      description: "Panel hospitals and clinics"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        provider_code:
          type: "varchar"
          length: 64
          nullable: false
          description: "Unique provider code"
        name:
          type: "varchar"
          length: 255
          nullable: false
          description: "Provider name"
        type:
          type: "varchar"
          length: 16
          nullable: false
          default: "hospital"
          description: "Provider type"
        panel_status:
          type: "varchar"
          length: 16
          nullable: false
          default: "active"
          description: "Panel membership status"
        contact_phone:
          type: "varchar"
          length: 64
          nullable: true
          description: "Contact phone"
        contact_email:
          type: "varchar"
          length: 255
          nullable: true
          description: "Contact email"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_provider_code"
            columns: ["provider_code"]
        indexes:
          - name: "idx_provider_status"
            columns: ["panel_status"]

    medical_underwriting_case:
      description: "Medical underwriting cases for pre-existing conditions assessment"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        subject_ref_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to resource_ref (subject)"
        context_ref_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "Foreign key to resource_ref (context)"
        case_no:
          type: "varchar"
          length: 64
          nullable: false
          description: "Unique case number"
        status:
          type: "varchar"
          length: 16
          nullable: false
          default: "open"
          description: "Case status"
        channel:
          type: "varchar"
          length: 16
          nullable: true
          description: "Submission channel"
        priority:
          type: "varchar"
          length: 16
          nullable: false
          default: "normal"
          description: "Case priority"
        created_by_user_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "User who created case"
        assigned_to_user_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "User assigned to case"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Record update timestamp"
        closed_at:
          type: "datetime"
          nullable: true
          description: "Case closure timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_muw_case_no"
            columns: ["case_no"]
        indexes:
          - name: "idx_muw_subject_time"
            columns: ["subject_ref_id", "created_at"]
          - name: "idx_muw_context_time"
            columns: ["context_ref_id", "created_at"]
          - name: "idx_muw_status_time"
            columns: ["status", "updated_at"]
        foreign_keys:
          - name: "fk_muw_case_subject_ref"
            columns: ["subject_ref_id"]
            references_table: "resource_ref"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"
          - name: "fk_muw_case_context_ref"
            columns: ["context_ref_id"]
            references_table: "resource_ref"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"

    medical_underwriting_outcome:
      description: "Versioned underwriting decisions"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        case_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_underwriting_case"
        version_no:
          type: "int"
          unsigned: true
          nullable: false
          default: "1"
          description: "Outcome version number"
        decision:
          type: "varchar"
          length: 32
          nullable: false
          description: "Decision (accept, reject, accept_with_terms, postpone)"
        risk_level:
          type: "varchar"
          length: 16
          nullable: true
          description: "Risk level"
        overall_loading_factor:
          type: "decimal"
          precision: [8, 4]
          nullable: true
          description: "Overall loading factor"
        decision_reason_json:
          type: "json"
          nullable: true
          description: "Decision reasoning"
        decision_notes:
          type: "text"
          nullable: true
          description: "Decision notes"
        effective_from:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Effective start date"
        effective_to:
          type: "datetime"
          nullable: true
          description: "Effective end date"
        decided_by_user_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "User who made decision"
        decided_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Decision timestamp"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_muw_outcome_case_version"
            columns: ["case_id", "version_no"]
        indexes:
          - name: "idx_muw_outcome_case_time"
            columns: ["case_id", "decided_at"]
          - name: "idx_muw_outcome_decision_time"
            columns: ["decision", "decided_at"]
          - name: "idx_muw_outcome_effective"
            columns: ["effective_from", "effective_to"]
        foreign_keys:
          - name: "fk_muw_outcome_case"
            columns: ["case_id"]
            references_table: "medical_underwriting_case"
            references_columns: ["id"]
            on_delete: "CASCADE"
            on_update: "CASCADE"

    medical_underwriting_term:
      description: "Terms, exclusions, loadings attached to underwriting outcomes"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        outcome_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_underwriting_outcome"
        term_type:
          type: "varchar"
          length: 16
          nullable: false
          description: "Type of term (exclusion, loading, waiting_period, condition)"
        code:
          type: "varchar"
          length: 64
          nullable: true
          description: "Term code"
        name:
          type: "varchar"
          length: 255
          nullable: true
          description: "Term name"
        value_factor:
          type: "decimal"
          precision: [8, 4]
          nullable: true
          description: "Factor value (e.g., loading multiplier)"
        value_amount:
          type: "decimal"
          precision: [18, 2]
          nullable: true
          description: "Amount value"
        value_days:
          type: "int"
          unsigned: true
          nullable: true
          description: "Days value (e.g., waiting period)"
        value_text:
          type: "varchar"
          length: 512
          nullable: true
          description: "Text value"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_muw_term_outcome"
            columns: ["outcome_id"]
          - name: "idx_muw_term_type"
            columns: ["term_type"]
          - name: "idx_muw_term_code"
            columns: ["code"]
        foreign_keys:
          - name: "fk_muw_term_outcome"
            columns: ["outcome_id"]
            references_table: "medical_underwriting_outcome"
            references_columns: ["id"]
            on_delete: "CASCADE"
            on_update: "CASCADE"

    medical_underwriting_current_outcome:
      description: "Current active outcome pointer per subject-context combination"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        subject_ref_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to resource_ref (subject)"
        context_ref_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "Foreign key to resource_ref (context)"
        case_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_underwriting_case"
        outcome_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_underwriting_outcome"
        updated_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          on_update: "CURRENT_TIMESTAMP"
          description: "Last update timestamp"
      constraints:
        primary_key:
          - "id"
        unique_keys:
          - name: "uk_muw_current_subject_context"
            columns: ["subject_ref_id", "context_ref_id"]
        indexes:
          - name: "idx_muw_current_subject"
            columns: ["subject_ref_id"]
          - name: "fk_muw_current_context_ref"
            columns: ["context_ref_id"]
          - name: "fk_muw_current_case"
            columns: ["case_id"]
          - name: "fk_muw_current_outcome"
            columns: ["outcome_id"]
        foreign_keys:
          - name: "fk_muw_current_subject_ref"
            columns: ["subject_ref_id"]
            references_table: "resource_ref"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"
          - name: "fk_muw_current_context_ref"
            columns: ["context_ref_id"]
            references_table: "resource_ref"
            references_columns: ["id"]
            on_delete: "RESTRICT"
            on_update: "CASCADE"
          - name: "fk_muw_current_case"
            columns: ["case_id"]
            references_table: "medical_underwriting_case"
            references_columns: ["id"]
            on_delete: "CASCADE"
            on_update: "CASCADE"
          - name: "fk_muw_current_outcome"
            columns: ["outcome_id"]
            references_table: "medical_underwriting_outcome"
            references_columns: ["id"]
            on_delete: "CASCADE"
            on_update: "CASCADE"

    medical_underwriting_evidence:
      description: "Evidence documents and surveys for underwriting cases"
      columns:
        id:
          type: "bigint"
          unsigned: true
          nullable: false
          auto_increment: true
          description: "Primary key"
        case_id:
          type: "bigint"
          unsigned: true
          nullable: false
          description: "Foreign key to medical_underwriting_case"
        evidence_type:
          type: "varchar"
          length: 32
          nullable: false
          default: "survey"
          description: "Type of evidence (survey, medical_report, lab_test)"
        survey_response_id:
          type: "bigint"
          unsigned: true
          nullable: true
          description: "Foreign key to survey_response"
        note:
          type: "varchar"
          length: 512
          nullable: true
          description: "Evidence note"
        meta_json:
          type: "json"
          nullable: true
          description: "Additional metadata"
        created_at:
          type: "datetime"
          nullable: false
          default: "CURRENT_TIMESTAMP"
          description: "Record creation timestamp"
      constraints:
        primary_key:
          - "id"
        indexes:
          - name: "idx_muwe_case_time"
            columns: ["case_id", "created_at"]
          - name: "idx_muwe_survey"
            columns: ["survey_response_id"]
        foreign_keys:
          - name: "fk_muwe_case"
            columns: ["case_id"]
            references_table: "medical_underwriting_case"
            references_columns: ["id"]
            on_delete: "CASCADE"
            on_update: "CASCADE"
          - name: "fk_muwe_survey_response"
            columns: ["survey_response_id"]
            references_table: "survey_response"
            references_columns: ["id"]
            on_delete: "SET NULL"
            on_update: "CASCADE"

# ──────────────────────────────────────────────────────────────────────────────
# RESOURCES
# ──────────────────────────────────────────────────────────────────────────────

resources:
  claim_case:
    kind: "aggregate"
    table: "claim_case"
    primary_key: "id"
    statuses:
      - "draft"
      - "submitted"
      - "under_review"
      - "pending_info"
      - "approved"
      - "rejected"
      - "settled"
      - "cancelled"
    api_surface:
      - "POST /api/v1/claim/submit"
      - "POST /api/v1/claim/:claimId/assign-reviewer"
      - "POST /api/v1/claim/:claimId/documents/add"
      - "POST /api/v1/claim/:claimId/approve"
      - "POST /api/v1/claim/:claimId/reject"
      - "POST /api/v1/claim/:claimId/settle"
      - "GET /api/v1/claim/:claimId"
      - "GET /api/v1/claim"

  claim_case_number_sequence:
    kind: "resource"
    table: "claim_case_number_sequence"
    primary_key: "claim_year"
    api_surface: []

  claim_document:
    kind: "resource"
    table: "claim_document"
    primary_key: "id"
    api_surface:
      - "POST /api/v1/claim/:claimId/documents/add"
      - "GET /api/v1/claim/:claimId/documents"

  claim_event:
    kind: "resource"
    table: "claim_event"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/claim/:claimId/events"

  claim_fraud_signal:
    kind: "resource"
    table: "claim_fraud_signal"
    primary_key: "id"
    api_surface:
      - "POST /api/v1/claim/:claimId/fraud-signal/record"
      - "GET /api/v1/claim/:claimId/fraud-signals"

  claim_link:
    kind: "resource"
    table: "claim_link"
    primary_key: "id"
    api_surface:
      - "POST /api/v1/claim/:claimId/link"
      - "GET /api/v1/claim/:claimId/links"

  claim_review:
    kind: "resource"
    table: "claim_review"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/claim/:claimId/reviews"

  claim_settlement_flag:
    kind: "resource"
    table: "claim_settlement_flag"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/claim/:claimId/settlement-flags"

  guarantee_letter:
    kind: "aggregate"
    table: "guarantee_letter"
    primary_key: "id"
    statuses:
      - "issued"
      - "active"
      - "used"
      - "expired"
      - "cancelled"
    api_surface:
      - "POST /api/v1/guarantee-letter/issue"
      - "POST /api/v1/guarantee-letter/:glId/cancel"
      - "GET /api/v1/guarantee-letter/:glId"
      - "GET /api/v1/guarantee-letter"

  medical_case:
    kind: "aggregate"
    table: "medical_case"
    primary_key: "id"
    statuses:
      - "reported"
      - "admitted"
      - "in_treatment"
      - "discharged"
      - "closed"
    api_surface:
      - "POST /api/v1/medical-case/create"
      - "POST /api/v1/medical-case/:medicalCaseId/update"
      - "GET /api/v1/medical-case/:medicalCaseId"
      - "GET /api/v1/medical-case"

  medical_case_event:
    kind: "resource"
    table: "medical_case_event"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/medical-case/:medicalCaseId/events"

  medical_provider:
    kind: "resource"
    table: "medical_provider"
    primary_key: "id"
    api_surface:
      - "POST /api/v1/medical-provider/create"
      - "PUT /api/v1/medical-provider/:providerId"
      - "GET /api/v1/medical-provider/:providerId"
      - "GET /api/v1/medical-provider"

  medical_underwriting_case:
    kind: "aggregate"
    table: "medical_underwriting_case"
    primary_key: "id"
    statuses:
      - "open"
      - "pending"
      - "decided"
      - "closed"
    api_surface:
      - "POST /api/v1/underwriting/create"
      - "POST /api/v1/underwriting/:caseId/record-decision"
      - "POST /api/v1/underwriting/:caseId/add-evidence"
      - "GET /api/v1/underwriting/:caseId"
      - "GET /api/v1/underwriting"

  medical_underwriting_outcome:
    kind: "resource"
    table: "medical_underwriting_outcome"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/underwriting/:caseId/outcomes"

  medical_underwriting_term:
    kind: "resource"
    table: "medical_underwriting_term"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/underwriting/:caseId/terms"

  medical_underwriting_current_outcome:
    kind: "resource"
    table: "medical_underwriting_current_outcome"
    primary_key: "id"
    api_surface:
      - "GET /api/v1/underwriting/current-outcome/:subjectRefId"

  medical_underwriting_evidence:
    kind: "resource"
    table: "medical_underwriting_evidence"
    primary_key: "id"
    api_surface:
      - "POST /api/v1/underwriting/:caseId/add-evidence"
      - "GET /api/v1/underwriting/:caseId/evidence"

