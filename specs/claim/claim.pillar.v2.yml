  testing_strategy:
    end_to_end_test: |
      1. Submit claim via Claim.Submit
      2. Verify CLAIM_SUBMITTED event emitted
      3. Verify notification sent to claimant
      4. Approve claim via Claim.Approve
      5. Verify CLAIM_APPROVED event emitted
      6. Settle claim via Claim.Settle
      7. Verify CLAIM_SETTLED event emitted
      8. Verify wallet transaction created in wallet pillar
      9. Verify settlement notification sent

    idempotency_test: |
      1. Submit same claim twice with same idempotency key
      2. Verify only one claim_case record created
      3. Verify second call returns same claim_id
      4. Process same CLAIM_SETTLED event twice
      5. Verify wallet creates only one transaction

    error_test: |
      1. Submit claim with invalid policy_id
      2. Verify DomainError thrown with clear message
      3. Approve claim with amount > requested
      4. Verify DomainError thrown
      5. Simulate wallet consumer failure
      6. Verify event marked for retry
      7. Verify alert sent after retry limit exceeded
