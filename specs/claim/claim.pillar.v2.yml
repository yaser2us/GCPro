  architecture_diagram: |
    ┌─────────────────────────────────────────────────────────────────┐
    │                        CLAIM PILLAR                             │
    ├─────────────────────────────────────────────────────────────────┤
    │                                                                 │
    │  Commands:                    Events:                           │
    │  • Claim.Submit              • CLAIM_SUBMITTED                  │
    │  • Claim.Approve             • CLAIM_APPROVED                   │
    │  • Claim.Settle              • CLAIM_SETTLED                    │
    │  • GuaranteeLetter.Issue     • GUARANTEE_LETTER_ISSUED          │
    │  • Underwriting.RecordDecision • UNDERWRITING_DECISION_RECORDED │
    │                                                                 │
    └──────────┬──────────────────────┬───────────────────────────────┘
               │                      │
               │ sync reads           │ events via outbox
               │ + command calls      │
               ↓                      ↓
    ┌──────────────────┐   ┌─────────────────┐   ┌─────────────────┐
    │  POLICY PILLAR   │   │  WALLET PILLAR  │   │ NOTIFICATION    │
    ├──────────────────┤   ├─────────────────┤   ├─────────────────┤
    │ • BenefitUsage   │   │ Consumes:       │   │ Consumes:       │
    │   .Reserve       │   │ CLAIM_SETTLED   │   │ All claim events│
    │ • BenefitUsage   │   │                 │   │                 │
    │   .Confirm       │   │ Creates:        │   │ Sends:          │
    │ • BenefitUsage   │   │ Wallet txn      │   │ Email/SMS       │
