# -------------------------------------------------------
# COMMANDS
# -------------------------------------------------------

commands:

  - name: AgeBand.Upsert
    description: "Create or update an age band by code. Used by admins to seed/update premium rate tables."
    path: "/api/v1/foundation/age-bands"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: AgeBandUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        table: age_band
        unique_by: [code]
        set:
          code: dto.code
          min_age: dto.min_age
          max_age: dto.max_age
          age_factor: dto.age_factor ?? "1.000"
    response:
      fields: [id, code, min_age, max_age, age_factor, created_at]

  - name: SmokProfile.Upsert
    description: "Create or update a smoker profile by code. Used for underwriting loading factors."
    path: "/api/v1/foundation/smoker-profiles"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: SmokProfileUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        table: smoker_profile
        unique_by: [code]
        set:
          code: dto.code
          smoker_factor: dto.smoker_factor ?? "1.000"
          loading_pct: dto.loading_pct ?? "0.000"
    response:
      fields: [id, code, smoker_factor, loading_pct, created_at]

  - name: GeoState.Upsert
    description: "Create or update a geographic state record. Used for address validation and region rules."
    path: "/api/v1/foundation/geo-states"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: GeoStateUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        table: geo_state
        unique_by: [country_code, state_code]
        set:
          country_code: dto.country_code
          state_code: dto.state_code
          name: dto.name
          status: dto.status ?? "active"
    response:
      fields: [id, country_code, state_code, name, status, created_at]

  - name: Address.AddToOwner
    description: "Add an address to any owner entity (person, account, user). If is_default=true, all other addresses for the same owner are set to is_default=false."
    path: "/api/v1/foundation/addresses"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: AddressAddDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: when
        condition: "dto.is_default == true"
        then:
          - kind: update
            table: address
            filter: { owner_type: dto.owner_type, owner_id: dto.owner_id, is_default: 1 }
            set:
              is_default: 0
      - kind: insert
        table: address
        set:
          owner_type: dto.owner_type
          owner_id: dto.owner_id
          type: dto.type
          line1: dto.line1
          line2: dto.line2
          city: dto.city
          state_code: dto.state_code
          postcode: dto.postcode
          country: dto.country
          is_default: dto.is_default ?? 0
    response:
      fields: [id, owner_type, owner_id, type, line1, city, state_code, postcode, country, is_default, created_at]

  - name: Address.SetDefault
    description: "Set an address as the default for its owner. Clears is_default on all other addresses for the same owner."
    path: "/api/v1/foundation/addresses/:addressId/set-default"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: address
        filter: { id: params.addressId }
        bind: address
      - kind: guard
        condition: "address not found"
        error: "ADDRESS_NOT_FOUND"
      - kind: update
        table: address
        filter: { owner_type: address.owner_type, owner_id: address.owner_id, is_default: 1 }
        set:
          is_default: 0
      - kind: update
        table: address
        filter: { id: params.addressId }
        set:
          is_default: 1
    response:
      fields: [id, owner_type, owner_id, is_default, updated_at]

  - name: BenefitCatalog.Create
    description: "Create a new versioned benefit catalog."
    path: "/api/v1/foundation/benefit-catalogs"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: BenefitCatalogCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: guard
        condition: "benefit_catalog with (code, version) already exists"
        error: "BENEFIT_CATALOG_ALREADY_EXISTS"
      - kind: insert
        table: benefit_catalog
        set:
          code: dto.code
          name: dto.name
          status: "active"
          version: dto.version ?? "v1"
          effective_from: dto.effective_from
          effective_to: dto.effective_to
          meta_json: dto.meta_json
      - kind: outbox_emit
        event: BENEFIT_CATALOG_CREATED
        aggregate_type: BENEFIT_CATALOG
        aggregate_id: inserted.id
    response:
      fields: [id, code, name, status, version, effective_from, effective_to, created_at]

  - name: BenefitCatalog.Archive
    description: "Archive a benefit catalog. Prevents new references to it."
    path: "/api/v1/foundation/benefit-catalogs/:catalogId/archive"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: benefit_catalog
        filter: { id: params.catalogId }
        bind: catalog
      - kind: guard
        condition: "catalog not found"
        error: "BENEFIT_CATALOG_NOT_FOUND"
      - kind: guard
        condition: "catalog.status == 'archived'"
        error: "BENEFIT_CATALOG_ALREADY_ARCHIVED"
      - kind: update
        table: benefit_catalog
        filter: { id: params.catalogId }
        set:
          status: "archived"
      - kind: outbox_emit
        event: BENEFIT_CATALOG_ARCHIVED
        aggregate_type: BENEFIT_CATALOG
        aggregate_id: params.catalogId
    response:
      fields: [id, status]

  - name: BenefitCatalogItem.Create
    description: "Add a benefit item to a catalog."
    path: "/api/v1/foundation/benefit-catalogs/:catalogId/items"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: BenefitCatalogItemCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: benefit_catalog
        filter: { id: params.catalogId }
        bind: catalog
      - kind: guard
        condition: "catalog not found"
        error: "BENEFIT_CATALOG_NOT_FOUND"
      - kind: guard
        condition: "catalog.status == 'archived'"
        error: "BENEFIT_CATALOG_ARCHIVED"
      - kind: guard
        condition: "benefit_catalog_item with (catalogId, item_code) already exists"
        error: "BENEFIT_ITEM_ALREADY_EXISTS"
      - kind: insert
        table: benefit_catalog_item
        set:
          catalog_id: params.catalogId
          item_code: dto.item_code
          name: dto.name
          category: dto.category ?? "other"
          limit_type: dto.limit_type ?? "per_year"
          limit_amount: dto.limit_amount ?? "0.00"
          limit_count: dto.limit_count ?? 0
          eligibility_rule_version: dto.eligibility_rule_version
          eligibility_rule_json: dto.eligibility_rule_json
          calculation_mode: dto.calculation_mode ?? "reimburse"
          percent_value: dto.percent_value
          fixed_amount: dto.fixed_amount
          status: "active"
    response:
      fields: [id, catalog_id, item_code, name, category, limit_type, limit_amount, status, created_at]

  - name: BenefitLevel.Create
    description: "Add a coverage level to a benefit catalog."
    path: "/api/v1/foundation/benefit-catalogs/:catalogId/levels"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: BenefitLevelCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: benefit_catalog
        filter: { id: params.catalogId }
        bind: catalog
      - kind: guard
        condition: "catalog not found"
        error: "BENEFIT_CATALOG_NOT_FOUND"
      - kind: guard
        condition: "benefit_level with (catalogId, level_code) already exists"
        error: "BENEFIT_LEVEL_ALREADY_EXISTS"
      - kind: insert
        table: benefit_level
        set:
          catalog_id: params.catalogId
          level_code: dto.level_code
          level_name: dto.level_name
          sort_order: dto.sort_order ?? 0
          meta_json: dto.meta_json
    response:
      fields: [id, catalog_id, level_code, level_name, sort_order, created_at]

  - name: DiscountProgram.Create
    description: "Create a new discount program."
    path: "/api/v1/foundation/discount-programs"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: DiscountProgramCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: guard
        condition: "discount_program with code already exists"
        error: "DISCOUNT_PROGRAM_ALREADY_EXISTS"
      - kind: insert
        table: discount_program
        set:
          code: dto.code
          discount_type: dto.discount_type
          value: dto.value
          eligibility_rule_version: dto.eligibility_rule_version
          rule_json: dto.rule_json
          starts_at: dto.starts_at
          ends_at: dto.ends_at
          status: "active"
      - kind: outbox_emit
        event: DISCOUNT_PROGRAM_CREATED
        aggregate_type: DISCOUNT_PROGRAM
        aggregate_id: inserted.id
    response:
      fields: [id, code, discount_type, value, status, starts_at, ends_at, created_at]

  - name: DiscountProgram.Deactivate
    description: "Deactivate a discount program."
    path: "/api/v1/foundation/discount-programs/:programId/deactivate"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: discount_program
        filter: { id: params.programId }
        bind: program
      - kind: guard
        condition: "program not found"
        error: "DISCOUNT_PROGRAM_NOT_FOUND"
      - kind: guard
        condition: "program.status == 'inactive'"
        error: "DISCOUNT_PROGRAM_ALREADY_INACTIVE"
      - kind: update
        table: discount_program
        filter: { id: params.programId }
        set:
          status: "inactive"
      - kind: outbox_emit
        event: DISCOUNT_PROGRAM_DEACTIVATED
        aggregate_type: DISCOUNT_PROGRAM
        aggregate_id: params.programId
    response:
      fields: [id, status]

  - name: GuidelineDocument.Create
    description: "Create a new guideline document (e.g. T&C, Privacy Policy)."
    path: "/api/v1/foundation/guideline-documents"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: GuidelineDocumentCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: guard
        condition: "guideline_document with code already exists"
        error: "GUIDELINE_DOCUMENT_ALREADY_EXISTS"
      - kind: insert
        table: guideline_document
        set:
          code: dto.code
          name: dto.name
          status: "active"
          scope_type: dto.scope_type ?? "global"
          scope_ref_type: dto.scope_ref_type
          scope_ref_id: dto.scope_ref_id
          meta_json: dto.meta_json
    response:
      fields: [id, code, name, status, scope_type, created_at]

  - name: GuidelineVersion.Create
    description: "Create a new version (draft) for a guideline document."
    path: "/api/v1/foundation/guideline-documents/:documentId/versions"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: GuidelineVersionCreateDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: guideline_document
        filter: { id: params.documentId }
        bind: document
      - kind: guard
        condition: "document not found"
        error: "GUIDELINE_DOCUMENT_NOT_FOUND"
      - kind: guard
        condition: "guideline_version with (document_id, version_code, locale) already exists"
        error: "GUIDELINE_VERSION_ALREADY_EXISTS"
      - kind: insert
        table: guideline_version
        set:
          document_id: params.documentId
          version_code: dto.version_code
          locale: dto.locale ?? "en"
          status: "draft"
          content_type: dto.content_type ?? "html"
          content_text: dto.content_text
          content_url: dto.content_url
          file_ref_type: dto.file_ref_type
          file_ref_id: dto.file_ref_id
          effective_from: dto.effective_from
          effective_to: dto.effective_to
          meta_json: dto.meta_json
    response:
      fields: [id, document_id, version_code, locale, status, content_type, effective_from, created_at]

  - name: GuidelineVersion.Publish
    description: "Publish a guideline version. Makes it effective and visible to users."
    path: "/api/v1/foundation/guideline-versions/:versionId/publish"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: guideline_version
        filter: { id: params.versionId }
        bind: version
      - kind: guard
        condition: "version not found"
        error: "GUIDELINE_VERSION_NOT_FOUND"
      - kind: guard
        condition: "version.status != 'draft'"
        error: "GUIDELINE_VERSION_NOT_DRAFT"
      - kind: update
        table: guideline_version
        filter: { id: params.versionId }
        set:
          status: "published"
      - kind: outbox_emit
        event: GUIDELINE_VERSION_PUBLISHED
        aggregate_type: GUIDELINE_VERSION
        aggregate_id: params.versionId
    response:
      fields: [id, document_id, version_code, status, effective_from]

  - name: GuidelineVersion.Archive
    description: "Archive a published guideline version."
    path: "/api/v1/foundation/guideline-versions/:versionId/archive"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: guideline_version
        filter: { id: params.versionId }
        bind: version
      - kind: guard
        condition: "version not found"
        error: "GUIDELINE_VERSION_NOT_FOUND"
      - kind: guard
        condition: "version.status == 'archived'"
        error: "GUIDELINE_VERSION_ALREADY_ARCHIVED"
      - kind: update
        table: guideline_version
        filter: { id: params.versionId }
        set:
          status: "archived"
      - kind: outbox_emit
        event: GUIDELINE_VERSION_ARCHIVED
        aggregate_type: GUIDELINE_VERSION
        aggregate_id: params.versionId
    response:
      fields: [id, document_id, version_code, status]

  - name: Guideline.Accept
    description: "Record that a user/account/person has accepted a guideline version. Idempotent via idempotency_key and unique (version_id, account_id, person_id, user_id)."
    path: "/api/v1/foundation/guideline-versions/:versionId/accept"
    method: POST
    idempotent: true
    permissions: []
    input:
      dto: GuidelineAcceptDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: guideline_version
        filter: { id: dto.version_id }
        bind: version
      - kind: guard
        condition: "version not found"
        error: "GUIDELINE_VERSION_NOT_FOUND"
      - kind: guard
        condition: "version.status != 'published'"
        error: "GUIDELINE_VERSION_NOT_PUBLISHED"
      - kind: upsert
        table: guideline_acceptance
        unique_by: [idempotency_key]
        set:
          version_id: dto.version_id
          account_id: dto.account_id
          person_id: dto.person_id
          user_id: dto.user_id
          acceptance_status: dto.acceptance_status ?? "accepted"
          channel: dto.channel ?? "app"
          source: dto.source ?? "other"
          request_id: context.request_id
          idempotency_key: headers.idempotency_key
          ip: context.ip
          user_agent: context.user_agent
          meta_json: dto.meta_json
      - kind: outbox_emit
        event: GUIDELINE_ACCEPTED
        aggregate_type: GUIDELINE_VERSION
        aggregate_id: dto.version_id
    response:
      fields: [id, version_id, acceptance_status, channel, accepted_at]

  - name: KYC.Upsert
    description: "Create or update a KYC record for a subject. Creates if none exists, updates status if it does."
    path: "/api/v1/foundation/kyc"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: KYCUpsertDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: insert
        table: kyc
        set:
          subject_type: dto.subject_type
          subject_id: dto.subject_id
          provider: dto.provider
          status: dto.status
          meta_json: dto.meta_json
    response:
      fields: [id, subject_type, subject_id, provider, status, verified_at, created_at]

  - name: KYC.Verify
    description: "Mark a KYC record as verified. Sets verified_at timestamp."
    path: "/api/v1/foundation/kyc/:kycId/verify"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: kyc
        filter: { id: params.kycId }
        bind: kyc
      - kind: guard
        condition: "kyc not found"
        error: "KYC_NOT_FOUND"
      - kind: guard
        condition: "kyc.status == 'verified'"
        error: "KYC_ALREADY_VERIFIED"
      - kind: update
        table: kyc
        filter: { id: params.kycId }
        set:
          status: "verified"
          verified_at: NOW()
      - kind: outbox_emit
        event: KYC_VERIFIED
        aggregate_type: KYC
        aggregate_id: params.kycId
    response:
      fields: [id, subject_type, subject_id, status, verified_at]

  - name: KYC.Reject
    description: "Mark a KYC record as rejected."
    path: "/api/v1/foundation/kyc/:kycId/reject"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      headers:
        - "Idempotency-Key"
    steps:
      - kind: read
        table: kyc
        filter: { id: params.kycId }
        bind: kyc
      - kind: guard
        condition: "kyc not found"
        error: "KYC_NOT_FOUND"
      - kind: guard
        condition: "kyc.status == 'rejected'"
        error: "KYC_ALREADY_REJECTED"
      - kind: update
        table: kyc
        filter: { id: params.kycId }
        set:
          status: "rejected"
      - kind: outbox_emit
        event: KYC_REJECTED
        aggregate_type: KYC
        aggregate_id: params.kycId
    response:
      fields: [id, subject_type, subject_id, status]

  - name: KYC.CheckIC
    id: "M3"
    description: "Pre-check if an IC/NRIC is already registered in the system. Read-only. Used in the registration wizard to prevent duplicate registrations."
    path: "/api/v1/foundation/kyc/check-ic"
    method: POST
    idempotent: true
    permissions: ["any_authenticated"]
    input:
      ic_no:
        type: "string"
        required: true
        description: "IC / NRIC number to check"
      id_type:
        type: "string"
        required: false
        default: "NRIC"
        description: "Identity document type (NRIC, PASSPORT, etc.)"
    steps:
      - kind: "raw_sql_read"
        description: "Cross-query person_identity JOIN person WHERE id_no = ic_no AND id_type = id_type"
        tables: ["person_identity", "person"]
    response:
      eligible:
        type: boolean
        description: "true = IC is clear; false = already registered with a blocking status"
      ic_status:
        type: string
        enum: [clear, duplicate, closed_or_terminated]
      person_id:
        type: bigint
        nullable: true
      person_status:
        type: string
        nullable: true
      message:
        type: string
    errors:
      - code: "IC_NO_REQUIRED"
        condition: "ic_no not provided in request body"

  - name: AuditLog.Record
    description: "Append an audit log entry. Typically called internally by commands or middleware, not directly by end users."
    path: "/api/v1/foundation/audit-logs"
    method: POST
    idempotent: false
    permissions: ["foundation:admin"]
    input:
      headers: []
    steps:
      - kind: insert
        table: audit_log
        set:
          actor_type: context.actor_type
          actor_id: context.actor_id
          action: context.action
          resource_type: context.resource_type
          resource_id: context.resource_id
          request_id: context.request_id
          ip: context.ip
          user_agent: context.user_agent
          result: context.result ?? "success"
          before_json: context.before_json
          after_json: context.after_json
          meta_json: context.meta_json
          occurred_at: NOW()
    response:
      fields: [id, action, resource_type, resource_id, result, occurred_at]

  - name: ResourceRef.Register
    description: "Register a resource in the UUID registry. Assigns or stores a UUID for the resource."
    path: "/api/v1/foundation/resource-refs"
    method: POST
    idempotent: true
    permissions: ["foundation:admin"]
    input:
      dto: ResourceRefRegisterDto
      headers:
        - "Idempotency-Key"
    steps:
      - kind: upsert
        table: resource_ref
        unique_by: [resource_type, resource_id]
        set:
          resource_type: dto.resource_type
          resource_id: dto.resource_id
          resource_uuid: dto.resource_uuid ?? UUID()
          status: "active"
    response:
      fields: [id, resource_type, resource_id, resource_uuid, status, created_at]

