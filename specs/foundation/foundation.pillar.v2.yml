version: "2.2.0"
spec_id: "foundation.pillar.v2"
domain: "foundation"
plugin: "foundation"

# -------------------------------------------------------
# OWNERSHIP
# -------------------------------------------------------

ownership:
  owner_plugin: "foundation"
  owns_tables:
    - address
    - age_band
    - audit_log
    - benefit_catalog
    - benefit_catalog_item
    - benefit_level
    - discount_program
    - geo_state
    - guideline_acceptance
    - guideline_document
    - guideline_version
    - kyc
    - outbox_event_consumer
    - resource_ref
    - smoker_profile
  cross_plugin_writes: false
  cross_plugin_integration:
    allowed_via:
      - command_api
      - outbox_events

# -------------------------------------------------------
# DEPENDENCIES
# -------------------------------------------------------

dependencies:
  corekit:
    transaction_wrapper: "withTxn"
    outbox_service: "OutboxService.emit"
    guard_helper: "guard"
    domain_error: "DomainError"

  core_tables_readonly:
    - table: outbox_event
      reason: "outbox_event_consumer has FK to outbox_event.id — managed by OutboxService infrastructure"

# -------------------------------------------------------
# CONVENTIONS
# -------------------------------------------------------

conventions:
  workflow_discipline:
    - "guard"
    - "write"
    - "emit"
    - "commit"
  status_mutation_policy: "Status fields may only be mutated through commands."
  outbox:
    required_envelope_fields:
      - "event_name"
      - "event_version"
      - "aggregate_type"
      - "aggregate_id"
      - "actor_user_id"
      - "occurred_at"
      - "correlation_id"
      - "causation_id"
  idempotency:
    required_header: "Idempotency-Key"
    default_scope: "actor_user_id + command_name"
    db_strategy:
      - "UNIQUE(idempotency_key) where applicable"
      - "MySQL ON DUPLICATE KEY UPDATE id = LAST_INSERT_ID(id)"
      - "UNIQUE(code) on age_band, smoker_profile, geo_state, discount_program, guideline_document"
      - "UNIQUE(catalog_id, item_code) on benefit_catalog_item"
      - "UNIQUE(catalog_id, level_code) on benefit_level"
      - "UNIQUE(document_id, version_code, locale) on guideline_version"
      - "UNIQUE(idempotency_key) on guideline_acceptance"
      - "UNIQUE(version_id, account_id, person_id, user_id) on guideline_acceptance prevents double acceptance"
      - "UNIQUE(resource_type, resource_id) and UNIQUE(resource_uuid) on resource_ref"
      - "UNIQUE(consumer_name, event_id) on outbox_event_consumer"
  reference_data_policy: "Reference tables (age_band, smoker_profile, geo_state) are admin-managed seed data. Upsert by unique code."
  audit_policy: "audit_log is append-only. No updates or deletes permitted."
  polymorphic_ownership: "address and kyc use (owner_type, owner_id) / (subject_type, subject_id) to attach to any entity."

# -------------------------------------------------------
# SCHEMA
# -------------------------------------------------------

schema:
  tables:

    address:
      description: "Polymorphic address record. Attached to any owner via owner_type + owner_id."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        owner_type:
          type: varchar
          length: 16
          nullable: false
          description: "Type of entity that owns this address (e.g. person, account)"
        owner_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "ID of the owning entity"
        type:
          type: varchar
          length: 32
          nullable: true
          default: null
          description: "Address type (e.g. home, work, billing)"
        line1:
          type: varchar
          length: 255
          nullable: true
          default: null
          description: "Street address line 1"
        line2:
          type: varchar
          length: 255
          nullable: true
          default: null
          description: "Street address line 2"
        city:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "City name"
        state_code:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "State code (references geo_state.state_code)"
        postcode:
          type: varchar
          length: 32
          nullable: true
          default: null
          description: "Postal / ZIP code"
        country:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "Country name or ISO code"
        is_default:
          type: tinyint
          nullable: false
          default: 0
          description: "1 if this is the default address for the owner"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys: []
        foreign_keys: []
        indexes:
          - name: idx_address_owner
            columns: [owner_type, owner_id]
          - name: idx_address_default
            columns: [owner_type, owner_id, is_default]

    age_band:
      description: "Age band reference table. Used for age-factor based premium calculations."
      columns:
        id:
          type: bigint
          auto_increment: true
          nullable: false
          description: "Primary key"
        code:
          type: varchar
          length: 32
          nullable: false
          description: "Unique code for this age band (e.g. 25-30)"
        min_age:
          type: int
          nullable: false
          description: "Minimum age (inclusive)"
        max_age:
          type: int
          nullable: false
          description: "Maximum age (inclusive)"
        age_factor:
          type: decimal
          precision: [8, 3]
          nullable: false
          default: "1.000"
          description: "Multiplier applied to base premium for this age band"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_age_band_code
            columns: [code]
        foreign_keys: []
        indexes:
          - name: idx_age_band_range
            columns: [min_age, max_age]

    audit_log:
      description: "Append-only system audit trail. Records all significant actor actions on resources."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        actor_type:
          type: varchar
          length: 32
          nullable: false
          description: "Type of actor (user, system, admin)"
        actor_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "ID of the actor"
        action:
          type: varchar
          length: 64
          nullable: false
          description: "Action performed (e.g. command name)"
        resource_type:
          type: varchar
          length: 64
          nullable: false
          description: "Type of resource affected"
        resource_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "ID of the affected resource"
        request_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "Originating HTTP request ID"
        ip:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "Client IP address"
        user_agent:
          type: varchar
          length: 512
          nullable: true
          default: null
          description: "Client user agent string"
        result:
          type: varchar
          length: 16
          nullable: false
          default: "success"
          description: "Outcome of the action (success, failure, denied)"
        before_json:
          type: json
          nullable: true
          default: null
          description: "Snapshot of resource state before action"
        after_json:
          type: json
          nullable: true
          default: null
          description: "Snapshot of resource state after action"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional context metadata"
        occurred_at:
          type: datetime
          nullable: false
          description: "When the action occurred"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys: []
        foreign_keys: []
        indexes:
          - name: idx_audit_time
            columns: [occurred_at]
          - name: idx_audit_actor
            columns: [actor_type, actor_id]
          - name: idx_audit_resource
            columns: [resource_type, resource_id]
          - name: idx_audit_request
            columns: [request_id]
          - name: idx_audit_action_result
            columns: [action, result]

    benefit_catalog:
      description: "Versioned benefit catalog header. Groups benefit items and levels for a given product version."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        code:
          type: varchar
          length: 64
          nullable: false
          description: "Catalog code"
        name:
          type: varchar
          length: 160
          nullable: false
          description: "Human-readable catalog name"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "active"
          values: [active, archived]
          description: "Catalog lifecycle status"
        version:
          type: varchar
          length: 40
          nullable: false
          default: "v1"
          description: "Catalog version identifier"
        effective_from:
          type: datetime
          nullable: true
          default: null
          description: "When this catalog becomes effective"
        effective_to:
          type: datetime
          nullable: true
          default: null
          description: "When this catalog expires"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_benefit_catalog_code_ver
            columns: [code, version]
        foreign_keys: []
        indexes:
          - name: idx_benefit_catalog_status
            columns: [status]
          - name: idx_benefit_catalog_effective
            columns: [effective_from, effective_to]

    benefit_catalog_item:
      description: "Individual benefit item within a catalog. Defines limits, calculation mode, and eligibility rules."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        catalog_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "FK to benefit_catalog.id"
        item_code:
          type: varchar
          length: 64
          nullable: false
          description: "Unique item code within the catalog"
        name:
          type: varchar
          length: 160
          nullable: false
          description: "Benefit item name"
        category:
          type: varchar
          length: 32
          nullable: false
          default: "other"
          description: "Benefit category (e.g. hospitalization, outpatient)"
        limit_type:
          type: varchar
          length: 20
          nullable: false
          default: "per_year"
          description: "How the limit resets (per_year, per_visit, lifetime)"
        limit_amount:
          type: decimal
          precision: [18, 2]
          nullable: false
          default: "0.00"
          description: "Maximum benefit amount per limit period"
        limit_count:
          type: int
          unsigned: true
          nullable: false
          default: 0
          description: "Maximum number of uses per limit period (0 = unlimited)"
        eligibility_rule_version:
          type: varchar
          length: 40
          nullable: true
          default: null
          description: "Rule engine version for eligibility"
        eligibility_rule_json:
          type: json
          nullable: true
          default: null
          description: "Eligibility rule definition"
        calculation_mode:
          type: varchar
          length: 20
          nullable: false
          default: "reimburse"
          description: "How benefit is calculated (reimburse, percent, fixed)"
        percent_value:
          type: decimal
          precision: [8, 3]
          nullable: true
          default: null
          description: "Percentage value if calculation_mode = percent"
        fixed_amount:
          type: decimal
          precision: [18, 2]
          nullable: true
          default: null
          description: "Fixed amount if calculation_mode = fixed"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "active"
          values: [active, inactive]
          description: "Item status"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_benefit_item_code
            columns: [catalog_id, item_code]
        foreign_keys:
          - name: fk_benefit_item_catalog
            columns: [catalog_id]
            references: { table: benefit_catalog, column: id }
            on_delete: RESTRICT
            on_update: CASCADE
        indexes:
          - name: idx_benefit_item_status
            columns: [status]
          - name: idx_benefit_item_category
            columns: [category]

    benefit_level:
      description: "Coverage level within a benefit catalog. Allows tiered coverage (e.g. Basic, Standard, Premium)."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        catalog_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "FK to benefit_catalog.id"
        level_code:
          type: varchar
          length: 32
          nullable: false
          description: "Unique level code within the catalog (e.g. BASIC, STANDARD)"
        level_name:
          type: varchar
          length: 128
          nullable: false
          description: "Human-readable level name"
        sort_order:
          type: int
          nullable: false
          default: 0
          description: "Display sort order"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_benefit_level
            columns: [catalog_id, level_code]
        foreign_keys:
          - name: fk_benefit_level_catalog
            columns: [catalog_id]
            references: { table: benefit_catalog, column: id }
            on_delete: RESTRICT
            on_update: CASCADE
        indexes:
          - name: idx_benefit_level_sort
            columns: [catalog_id, sort_order]

    discount_program:
      description: "Discount program definition. Stores discount type, value, eligibility rules, and active window."
      columns:
        id:
          type: bigint
          auto_increment: true
          nullable: false
          description: "Primary key"
        code:
          type: varchar
          length: 64
          nullable: false
          description: "Unique discount code"
        discount_type:
          type: varchar
          length: 20
          nullable: false
          description: "Discount type (percent, fixed, waiver)"
        value:
          type: decimal
          precision: [12, 2]
          nullable: false
          default: "0.00"
          description: "Discount value (percentage or fixed amount)"
        eligibility_rule_version:
          type: varchar
          length: 40
          nullable: true
          default: null
          description: "Rule engine version for eligibility check"
        rule_json:
          type: json
          nullable: true
          default: null
          description: "Eligibility rule definition"
        starts_at:
          type: datetime
          nullable: true
          default: null
          description: "When discount becomes active"
        ends_at:
          type: datetime
          nullable: true
          default: null
          description: "When discount expires"
        status:
          type: varchar
          length: 20
          nullable: false
          default: "active"
          values: [active, inactive, expired]
          description: "Discount program status"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_discount_code
            columns: [code]
        foreign_keys: []
        indexes:
          - name: idx_discount_status
            columns: [status]
          - name: idx_discount_window
            columns: [starts_at, ends_at]

    geo_state:
      description: "Geographic state / region reference data. Used for address validation and policy region rules."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        country_code:
          type: varchar
          length: 8
          nullable: false
          default: "MY"
          description: "ISO country code (e.g. MY, SG)"
        state_code:
          type: varchar
          length: 32
          nullable: false
          description: "State/region code (e.g. SGR, KUL)"
        name:
          type: varchar
          length: 128
          nullable: false
          description: "State/region full name"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "active"
          values: [active, inactive]
          description: "Whether this state is active"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_geo_state_cc_sc
            columns: [country_code, state_code]
        foreign_keys: []
        indexes:
          - name: idx_geo_state_status
            columns: [status]
          - name: idx_geo_state_name
            columns: [name]

    guideline_document:
      description: "A legal or policy document (e.g. Privacy Policy, Terms & Conditions). Versioned separately."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        code:
          type: varchar
          length: 64
          nullable: false
          description: "Unique document code (e.g. PRIVACY_POLICY, TNC_APP)"
        name:
          type: varchar
          length: 160
          nullable: false
          description: "Human-readable document name"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "active"
          values: [active, inactive]
          description: "Document status"
        scope_type:
          type: varchar
          length: 16
          nullable: false
          default: "global"
          description: "Scope of this document (global, product, region)"
        scope_ref_type:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "Type of the scoped entity if scope_type != global"
        scope_ref_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "ID of the scoped entity"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_guideline_doc_code
            columns: [code]
        foreign_keys: []
        indexes:
          - name: idx_guideline_doc_status
            columns: [status]
          - name: idx_guideline_doc_scope
            columns: [scope_type, scope_ref_type, scope_ref_id]

    guideline_version:
      description: "A published version of a guideline document. Contains the actual content (HTML, URL, or file ref)."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        document_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "FK to guideline_document.id"
        version_code:
          type: varchar
          length: 32
          nullable: false
          description: "Version code (e.g. v1.0, 2026-01)"
        locale:
          type: varchar
          length: 10
          nullable: false
          default: "en"
          description: "Language locale (e.g. en, ms)"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "draft"
          values: [draft, published, archived]
          description: "Version lifecycle status"
        effective_from:
          type: datetime
          nullable: true
          default: null
          description: "When this version becomes effective"
        effective_to:
          type: datetime
          nullable: true
          default: null
          description: "When this version expires"
        checksum_sha256:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "SHA-256 checksum of content for integrity verification"
        content_type:
          type: varchar
          length: 16
          nullable: false
          default: "html"
          description: "Content format (html, markdown, pdf)"
        content_text:
          type: mediumtext
          nullable: true
          default: null
          description: "Inline content text"
        content_url:
          type: varchar
          length: 512
          nullable: true
          default: null
          description: "URL to external hosted content"
        file_ref_type:
          type: varchar
          length: 32
          nullable: true
          default: "file_upload"
          description: "Type of file reference"
        file_ref_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "ID of the referenced file"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_guideline_ver
            columns: [document_id, version_code, locale]
        foreign_keys:
          - name: fk_guideline_version_doc
            columns: [document_id]
            references: { table: guideline_document, column: id }
            on_delete: RESTRICT
            on_update: CASCADE
        indexes:
          - name: idx_guideline_ver_status
            columns: [status, effective_from, effective_to]
          - name: idx_guideline_ver_document
            columns: [document_id]

    guideline_acceptance:
      description: "Records that a user/account/person has accepted a specific guideline version. Idempotent."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        version_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "FK to guideline_version.id"
        account_id:
          type: bigint
          unsigned: true
          nullable: true
          default: null
          description: "Account that accepted (at least one of account_id/person_id/user_id must be set)"
        person_id:
          type: bigint
          unsigned: true
          nullable: true
          default: null
          description: "Person that accepted"
        user_id:
          type: bigint
          unsigned: true
          nullable: true
          default: null
          description: "User that accepted"
        acceptance_status:
          type: varchar
          length: 16
          nullable: false
          default: "accepted"
          values: [accepted, rejected]
          description: "Whether accepted or rejected"
        channel:
          type: varchar
          length: 16
          nullable: false
          default: "app"
          description: "Channel through which acceptance was given (app, web, sms)"
        source:
          type: varchar
          length: 32
          nullable: false
          default: "other"
          description: "Source context (registration, onboarding, checkout)"
        request_id:
          type: varchar
          length: 128
          nullable: true
          default: null
          description: "Originating request ID"
        idempotency_key:
          type: varchar
          length: 128
          nullable: false
          description: "Client-provided idempotency key"
        ip:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "Client IP address at time of acceptance"
        user_agent:
          type: varchar
          length: 512
          nullable: true
          default: null
          description: "Client user agent at time of acceptance"
        accepted_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "When acceptance was recorded"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_guideline_accept_idem
            columns: [idempotency_key]
          - name: uk_guideline_accept_once
            columns: [version_id, account_id, person_id, user_id]
        foreign_keys:
          - name: fk_guideline_accept_version
            columns: [version_id]
            references: { table: guideline_version, column: id }
            on_delete: RESTRICT
            on_update: CASCADE
        indexes:
          - name: idx_guideline_accept_version
            columns: [version_id, accepted_at]
          - name: idx_guideline_accept_account
            columns: [account_id, accepted_at]
          - name: idx_guideline_accept_person
            columns: [person_id, accepted_at]
          - name: idx_guideline_accept_user
            columns: [user_id, accepted_at]
          - name: idx_guideline_accept_status
            columns: [acceptance_status]

    kyc:
      description: "KYC (Know Your Customer) verification record. Polymorphic via subject_type + subject_id."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        subject_type:
          type: varchar
          length: 16
          nullable: false
          description: "Type of subject being verified (person, account, user)"
        subject_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "ID of the subject"
        provider:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "KYC provider name (e.g. myinfo, manual)"
        status:
          type: varchar
          length: 32
          nullable: false
          description: "Verification status (pending, verified, rejected, expired)"
        verified_at:
          type: datetime
          nullable: true
          default: null
          description: "When verification was completed"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Provider response and additional data"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys: []
        foreign_keys: []
        indexes:
          - name: idx_kyc_subject
            columns: [subject_type, subject_id]
          - name: idx_kyc_status
            columns: [status, verified_at]

    outbox_event_consumer:
      description: "Tracks per-consumer processing state for outbox events. Enables reliable at-least-once delivery with idempotency."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        consumer_name:
          type: varchar
          length: 128
          nullable: false
          description: "Unique name of the consumer (e.g. CommissionAccrualConsumer)"
        event_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "FK to outbox_event.id"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "processed"
          values: [pending, processing, processed, failed, dead_letter]
          description: "Processing status for this consumer"
        attempts:
          type: int
          unsigned: true
          nullable: false
          default: 0
          description: "Number of processing attempts"
        available_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "When this event becomes available for pickup (supports delayed retry)"
        locked_at:
          type: datetime
          nullable: true
          default: null
          description: "When a worker locked this record for processing"
        lock_owner:
          type: varchar
          length: 64
          nullable: true
          default: null
          description: "Identity of the worker holding the lock"
        last_error:
          type: text
          nullable: true
          default: null
          description: "Last error message from a failed attempt"
        processed_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "When last processed successfully"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional processing metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_consumer_event
            columns: [consumer_name, event_id]
        foreign_keys:
          - name: fk_consume_event
            columns: [event_id]
            references: { table: outbox_event, column: id }
            on_delete: CASCADE
            on_update: CASCADE
        indexes:
          - name: idx_consume_event
            columns: [event_id]
          - name: idx_consume_consumer_time
            columns: [consumer_name, processed_at]
          - name: idx_oec_pick
            columns: [consumer_name, status, available_at]
          - name: idx_oec_lock
            columns: [consumer_name, locked_at]

    resource_ref:
      description: "UUID registry for internal resources. Maps resource_type + resource_id to a stable UUID for external-facing references."
      columns:
        id:
          type: bigint
          unsigned: true
          auto_increment: true
          nullable: false
          description: "Primary key"
        resource_type:
          type: varchar
          length: 64
          nullable: false
          description: "Type of the resource (e.g. payment_intent, policy)"
        resource_id:
          type: bigint
          unsigned: true
          nullable: false
          description: "Internal numeric ID of the resource"
        resource_uuid:
          type: char
          length: 36
          nullable: true
          default: null
          description: "Externally-facing UUID for this resource"
        status:
          type: varchar
          length: 16
          nullable: false
          default: "active"
          values: [active, inactive]
          description: "Reference status"
        meta_json:
          type: json
          nullable: true
          default: null
          description: "Additional metadata"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
        updated_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          on_update: CURRENT_TIMESTAMP
          description: "Last update timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_resource_type_id
            columns: [resource_type, resource_id]
          - name: uk_resource_uuid
            columns: [resource_uuid]
        foreign_keys: []
        indexes:
          - name: idx_resource_type_status
            columns: [resource_type, status]

    smoker_profile:
      description: "Smoker risk profile reference table. Provides loading factors for premium calculations."
      columns:
        id:
          type: bigint
          auto_increment: true
          nullable: false
          description: "Primary key"
        code:
          type: varchar
          length: 32
          nullable: false
          description: "Unique profile code (e.g. NON_SMOKER, SMOKER, EX_SMOKER)"
        smoker_factor:
          type: decimal
          precision: [8, 3]
          nullable: false
          default: "1.000"
          description: "Base multiplier for smoker status"
        loading_pct:
          type: decimal
          precision: [8, 3]
          nullable: false
          default: "0.000"
          description: "Additional loading percentage applied to premium"
        created_at:
          type: datetime
          nullable: false
          default: CURRENT_TIMESTAMP
          description: "Record creation timestamp"
      constraints:
        primary_key: [id]
        unique_keys:
          - name: uk_smoker_profile_code
            columns: [code]
        foreign_keys: []
        indexes: []

