# -------------------------------------------------------
# INTEGRATION
# -------------------------------------------------------

integration:
  description: "Foundation emits KYC and guideline events consumed by user/identity and onboarding workflows. outbox_event_consumer is managed by the OutboxService infrastructure shared across all pillars."

  outbox_pattern:
    how_it_works:
      - "Foundation commands emit events via OutboxService.emit() within the same transaction"
      - "OutboxService writes to outbox_event table atomically with the command write"
      - "outbox_event_consumer tracks per-consumer delivery state for at-least-once processing"
      - "Consumers query outbox_event_consumer by (consumer_name, status, available_at) to pick up pending events"
    benefits:
      - "Guaranteed delivery even if downstream consumer is temporarily unavailable"
      - "Per-consumer idempotency via UNIQUE(consumer_name, event_id)"
      - "Dead-letter support via status=dead_letter after max attempts"

  user:
    description: "User/identity plugin can consume KYC_VERIFIED to update user verification_status"
    pattern: "event_driven_via_outbox"
    consumers:
      - event: "KYC_VERIFIED"
        consumer_name: "KYCVerifiedConsumer"
        location: "src/plugins/user/consumers/kyc-verified.consumer.ts"
        responsibility: "Update user/person verification_status to verified when KYC passes"
        expected_behavior:
          - "Read KYC record to get subject_type and subject_id"
          - "Update verification_status record for the subject"
          - "Emit USER_VERIFIED event if applicable"
        event_payload_example:
          event_type: "KYC_VERIFIED"
          aggregate_type: "KYC"
          aggregate_id: 42
          payload:
            subject_type: "person"
            subject_id: 101
            provider: "myinfo"
            verified_at: "2026-03-22T10:00:00Z"
