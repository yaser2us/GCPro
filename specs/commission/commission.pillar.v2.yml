# ──────────────────────────────────────────────────────────────────────────────
# CROSS-PILLAR INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  description: |
    Commission pillar uses event-driven architecture (Transactional Outbox pattern)
    to communicate with other pillars. Events are stored in the same transaction as
    business operations, then published asynchronously.

  outbox_pattern:
    how_it_works:
      - "Commission operations write to outbox_event table in same transaction"
      - "OutboxPublisher polls outbox_event table for unpublished events"
      - "Events are published to EventBus for consumers"
      - "Consumers process events and update outbox_event_consumer status"
      - "Idempotency enforced by unique constraints on consumer + event"

    benefits:
      - "Atomicity: Events guaranteed to be published if operation succeeds"
      - "Reliability: Events stored durably, can be retried on failure"
      - "Decoupling: Commission pillar doesn't know about wallet implementation"
      - "Idempotency: Consumers can safely retry without duplicates"

  wallet_pillar:
    description: "Wallet pillar consumes commission events to credit participant wallets"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "ACCRUAL_RECORDED"
        consumer_name: "CommissionAccrualConsumer"
        location: "src/plugins/wallet/consumers/commission-accrual.consumer.ts"
        responsibility: "Credit participant wallet when commission accrues"

        expected_behavior:
          - "Listen to ACCRUAL_RECORDED event from EventBus"
          - "Lookup commission_participant to get wallet_id"
          - "Create ledger_txn with type='credit', ref_type='commission_accrual', ref_id=accrual_id"
          - "Update wallet_balance.available_amount += accrual.amount"
          - "Use accrual.id as idempotency key to prevent duplicate credits"
          - "Record consumer status in outbox_event_consumer table"

        event_payload_example:
          event_type: "ACCRUAL_RECORDED"
          aggregate_type: "PROGRAM"
          aggregate_id: 1  # program_id
          payload:
            accrual_id: 42
            program_id: 1
            participant_id: 100
            amount: 25.50
            currency: "COIN"
            accrued_at: "2026-03-19T10:00:00.000Z"
            meta_json:
              referral_conversion_id: 500
              level: 1

        wallet_transaction_created:
          ledger_txn:
            wallet_id: 200
            txn_type: "credit"
            amount: 25.50
            currency: "COIN"
            ref_type: "commission_accrual"
            ref_id: 42
            description: "Commission earned - Level 1 referral"

          wallet_balance_update:
            available_amount: "previous_balance + 25.50"

        idempotency_strategy:
          - "Use accrual_id + consumer_name as unique key in outbox_event_consumer"
          - "ON DUPLICATE KEY UPDATE status='success' prevents double-processing"
          - "If wallet credit fails, mark consumer status='failed' for retry"

        error_handling:
          - "If participant has no wallet_id, log error and mark consumer 'failed'"
          - "If ledger transaction fails, mark consumer 'failed' for retry"
          - "If wallet balance update fails, rollback transaction, mark 'failed'"
          - "Failed events will be retried by OutboxPublisher on next poll"

      - event: "ACCRUAL_VOIDED"
        consumer_name: "CommissionAccrualConsumer"
        location: "src/plugins/wallet/consumers/commission-accrual.consumer.ts"
        responsibility: "Reverse wallet credit when accrual is voided"

        expected_behavior:
          - "Listen to ACCRUAL_VOIDED event from EventBus"
          - "Lookup original ledger_txn where ref_type='commission_accrual' AND ref_id=accrual_id"
          - "Create reversal ledger_txn with type='debit', amount=original_amount"
          - "Update wallet_balance.available_amount -= accrual.amount"
          - "Check wallet has sufficient balance before reversal"

        event_payload_example:
          event_type: "ACCRUAL_VOIDED"
          aggregate_type: "PROGRAM"
          aggregate_id: 1
          payload:
            accrual_id: 42
            program_id: 1
            participant_id: 100
            original_amount: 25.50
            void_reason: "Conversion refunded"
            voided_at: "2026-03-20T15:00:00.000Z"

        wallet_transaction_created:
          ledger_txn:
            wallet_id: 200
            txn_type: "debit"
            amount: 25.50
            currency: "COIN"
            ref_type: "commission_accrual_void"
            ref_id: 42
            description: "Commission reversed - Conversion refunded"

        error_handling:
          - "If original transaction not found, log warning and mark 'success' (idempotent)"
          - "If wallet has insufficient balance, mark 'failed' for manual review"
          - "DO NOT allow negative balance - requires manual intervention"

      - event: "PAYOUT_BATCH_COMPLETED"
        consumer_name: "CommissionPayoutConsumer"
        location: "src/plugins/wallet/consumers/commission-payout.consumer.ts"
        responsibility: "Debit participant wallet when payout is settled"

        expected_behavior:
          - "Listen to PAYOUT_BATCH_COMPLETED event"
          - "For each payout_item in the batch, create debit transaction"
          - "Update wallet_balance.available_amount -= payout_item.amount"
          - "Mark accruals as 'paid' by updating commission_payout_item_accrual"

        event_payload_example:
          event_type: "PAYOUT_BATCH_COMPLETED"
          aggregate_type: "PAYOUT_BATCH"
          aggregate_id: 10
          payload:
            batch_id: 10
            program_id: 1
            settlement_period_start: "2026-03-01"
            settlement_period_end: "2026-03-31"
            total_amount: 500.00
            item_count: 15
            completed_at: "2026-04-01T10:00:00.000Z"

        wallet_operations:
          - "Query commission_payout_item WHERE batch_id = 10"
          - "For each item:"
          - "  Create ledger_txn (type='debit', ref_type='commission_payout', ref_id=item_id)"
          - "  Update wallet_balance.available_amount -= item.amount"
          - "Use batch_id + item_id as idempotency key"

  referral_pillar:
    description: "Commission pillar consumes referral events to trigger accruals"
    pattern: "event_driven_via_outbox"

    consumers:
      - event: "REFERRAL_CONVERSION_CREATED"
        consumer_name: "ReferralConversionCommissionConsumer"
        location: "src/plugins/commission/consumers/referral-conversion.consumer.ts"
        responsibility: "Record commission accrual when referral conversion occurs"

        expected_behavior:
          - "Listen to REFERRAL_CONVERSION_CREATED from referral pillar"
          - "Query referral_chain to get all ancestors (multi-level)"
          - "For each ancestor at depth 1, 2, 3:"
          - "  Get commission_rule for that level"
          - "  Calculate accrual amount = conversion_value * rule.rate"
          - "  Call RecordAccrual command"
          - "This triggers ACCRUAL_RECORDED event (consumed by wallet)"

  architecture_diagram: |

    ┌─────────────────────────────────────────────────────────────────────────┐
    │ CROSS-PILLAR EVENT FLOW                                                 │
    └─────────────────────────────────────────────────────────────────────────┘

    1. REFERRAL → COMMISSION → WALLET

       User B refers User C (via Referral V2 API)
              │
              ├─→ REFERRAL_CONVERSION_CREATED (outbox_event)
              │
              └─→ [Commission] ReferralConversionCommissionConsumer
                     │
                     ├─→ Query referral_chain (User A → User B, depth=1)
                     │
                     ├─→ RecordAccrual(participant=User A, amount=25.50)
                     │
                     └─→ ACCRUAL_RECORDED (outbox_event)
                            │
                            └─→ [Wallet] CommissionAccrualConsumer
                                   │
                                   ├─→ Create ledger_txn (credit)
                                   │
                                   └─→ Update wallet_balance +25.50


    2. COMMISSION PAYOUT → WALLET

       Admin runs ProcessPayoutBatch
              │
              ├─→ Aggregate accruals for settlement period
              │
              ├─→ Create commission_payout_batch
              │
              ├─→ Create commission_payout_item (per participant)
              │
              └─→ PAYOUT_BATCH_COMPLETED (outbox_event)
                     │
                     └─→ [Wallet] CommissionPayoutConsumer
                            │
                            ├─→ Create ledger_txn (debit)
                            │
                            └─→ Update wallet_balance -500.00


    3. COMMISSION VOID → WALLET

       Admin voids fraudulent accrual
              │
              ├─→ VoidAccrual command
              │
              ├─→ Update commission_accrual.status = 'voided'
              │
              └─→ ACCRUAL_VOIDED (outbox_event)
                     │
                     └─→ [Wallet] CommissionAccrualConsumer
                            │
                            ├─→ Create ledger_txn (debit, reversal)
                            │
                            └─→ Update wallet_balance -25.50

  implementation_checklist:
    wallet_pillar:
      - "[ ] Create CommissionAccrualConsumer class"
      - "[ ] Subscribe to ACCRUAL_RECORDED event"
      - "[ ] Implement wallet credit logic with idempotency"
      - "[ ] Subscribe to ACCRUAL_VOIDED event"
      - "[ ] Implement wallet debit logic with balance checks"
      - "[ ] Create CommissionPayoutConsumer class"
      - "[ ] Subscribe to PAYOUT_BATCH_COMPLETED event"
      - "[ ] Implement batch payout debit logic"
      - "[ ] Add error handling for insufficient balance"
      - "[ ] Add logging for audit trail"
      - "[ ] Write integration tests (commission → wallet)"

    commission_pillar:
      - "[✓] Commission events stored in outbox_event"
      - "[✓] ACCRUAL_RECORDED event emitted on RecordAccrual"
      - "[✓] ACCRUAL_VOIDED event emitted on VoidAccrual"
      - "[✓] PAYOUT_BATCH_COMPLETED event emitted on ProcessPayoutBatch"
      - "[✓] Phase 7A: ReferralConversionHandler — subscribes to REFERRAL_CONVERSION_CREATED"
      - "[✓] Phase 7A: Multi-level accrual recording via referral_chain walk"
      - "[✓] Phase 7A: Emits ACCRUAL_RECORDED per ancestor per depth level"
      - "[ ] Write integration tests (referral → commission)"

  testing_strategy:
    end_to_end_test: |
      1. Create commission program with 3-level rules (25%, 10%, 5%)
      2. User A refers User B (creates conversion)
      3. User B refers User C (creates conversion)
      4. User C makes $100 purchase
      5. Verify commission accruals:
         - User B: $25 (level 1 from User C)
         - User A: $10 (level 2 from User C)
      6. Verify wallet credits:
         - User B wallet: +$25
         - User A wallet: +$10
      7. Verify ledger transactions created with ref_type='commission_accrual'
      8. Run payout batch for settlement period
      9. Verify wallet debits:
         - User B wallet: -$25
         - User A wallet: -$10
      10. Verify accruals marked as 'paid'

    idempotency_test: |
      1. Record accrual (accrual_id=42)
      2. Publish ACCRUAL_RECORDED event twice
      3. Verify wallet only credited once
      4. Verify outbox_event_consumer has single success record

    void_test: |
      1. Record accrual (accrual_id=42, amount=$25)
      2. Verify wallet credited +$25
      3. Void accrual (fraudulent conversion)
      4. Verify wallet debited -$25
      5. Verify wallet balance returned to original amount

# ──────────────────────────────────────────────────────────────────────────────
# COMMANDS
# ──────────────────────────────────────────────────────────────────────────────

commands:
  - name: "CreateProgram"
    description: "Create a new commission program"
    path: "/api/commission/programs"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      dto: "CreateProgramDTO"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to create commission program"
      - kind: "upsert"
        table: "commission_program"
        unique_by: ["code"]
        fields:
          code: "input.code"
          name: "input.name"
          status: "'active'"
          currency: "input.currency ?? 'MYR'"
          settlement_cycle: "input.settlement_cycle ?? 'monthly'"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "PROGRAM_CREATED"
        aggregate_id: "inserted_id"
    response:
      program_id: "inserted_id"

  - name: "UpdateProgram"
    description: "Update commission program details"
    path: "/api/commission/programs/:id"
    method: "PUT"
    idempotent: true
    permissions: []
    input:
      id: "string"
      name: "string"
      settlement_cycle: "string"
      meta_json: "object"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to update commission program"
      - kind: "read"
        table: "commission_program"
        where: "id = input.id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists"
        error: "Program not found"
      - kind: "update"
        table: "commission_program"
        where: "id = input.id"
        fields:
          name: "input.name"
          settlement_cycle: "input.settlement_cycle"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "PROGRAM_UPDATED"
        aggregate_id: "input.id"
    response:
      success: true

  - name: "PauseProgram"
    description: "Pause commission program (stops new accruals)"
    path: "/api/commission/programs/:id/pause"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      id: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to pause commission program"
      - kind: "read"
        table: "commission_program"
        where: "id = input.id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists && program.status = 'active'"
        error: "Program not found or not active"
      - kind: "update"
        table: "commission_program"
        where: "id = input.id"
        fields:
          status: "'paused'"
      - kind: "outbox_emit"
        event: "PROGRAM_PAUSED"
        aggregate_id: "input.id"
    response:
      success: true

  - name: "ActivateProgram"
    description: "Activate paused commission program"
    path: "/api/commission/programs/:id/activate"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      id: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to activate commission program"
      - kind: "read"
        table: "commission_program"
        where: "id = input.id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists && program.status = 'paused'"
        error: "Program not found or not paused"
      - kind: "update"
        table: "commission_program"
        where: "id = input.id"
        fields:
          status: "'active'"
      - kind: "outbox_emit"
        event: "PROGRAM_ACTIVATED"
        aggregate_id: "input.id"
    response:
      success: true

  - name: "EnrollParticipant"
    description: "Enroll participant in commission program"
    path: "/api/commission/programs/:program_id/participants"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      dto: "EnrollParticipantDTO"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to enroll participant"
      - kind: "read"
        table: "commission_program"
        where: "id = input.program_id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists && program.status = 'active'"
        error: "Program not found or not active"
      - kind: "upsert"
        table: "commission_participant"
        unique_by: ["program_id", "participant_type", "participant_id"]
        fields:
          program_id: "input.program_id"
          participant_type: "input.participant_type"
          participant_id: "input.participant_id"
          status: "'active'"
          default_payout_method: "input.default_payout_method ?? 'wallet'"
          wallet_id: "input.wallet_id"
          bank_profile_id: "input.bank_profile_id"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "PARTICIPANT_ENROLLED"
        aggregate_id: "input.program_id"
    response:
      participant_id: "inserted_id"

  - name: "UpdateParticipantStatus"
    description: "Update participant status (active, inactive, suspended)"
    path: "/api/commission/participants/:id/status"
    method: "PUT"
    idempotent: true
    permissions: []
    input:
      id: "string"
      status: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to update participant status"
      - kind: "read"
        table: "commission_participant"
        where: "id = input.id"
        alias: "participant"
      - kind: "guard"
        expr: "participant.exists"
        error: "Participant not found"
      - kind: "guard"
        expr: "input.status in ['active', 'inactive', 'suspended']"
        error: "Invalid status value"
      - kind: "update"
        table: "commission_participant"
        where: "id = input.id"
        fields:
          status: "input.status"
      - kind: "outbox_emit"
        event: "PARTICIPANT_STATUS_UPDATED"
        aggregate_id: "participant.program_id"
    response:
      success: true

  - name: "CreateRule"
    description: "Create commission calculation rule"
    path: "/api/commission/programs/:program_id/rules"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      dto: "CreateRuleDTO"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to create commission rule"
      - kind: "read"
        table: "commission_program"
        where: "id = input.program_id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists && program.status = 'active'"
        error: "Program not found or not active"
      - kind: "upsert"
        table: "commission_rule"
        unique_by: ["program_id", "code"]
        fields:
          program_id: "input.program_id"
          code: "input.code"
          name: "input.name"
          status: "'active'"
          rule_type: "input.rule_type"
          rate_pct: "input.rate_pct"
          amount_fixed: "input.amount_fixed"
          priority: "input.priority ?? 100"
          conditions_json: "input.conditions_json"
          meta_json: "input.meta_json"
          effective_from: "input.effective_from ?? NOW()"
          effective_to: "input.effective_to"
      - kind: "outbox_emit"
        event: "RULE_CREATED"
        aggregate_id: "input.program_id"
    response:
      rule_id: "inserted_id"

  - name: "UpdateRule"
    description: "Update commission rule details"
    path: "/api/commission/rules/:id"
    method: "PUT"
    idempotent: true
    permissions: []
    input:
      id: "string"
      name: "string"
      rate_pct: "number"
      amount_fixed: "number"
      priority: "number"
      conditions_json: "object"
      effective_to: "datetime"
      meta_json: "object"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to update commission rule"
      - kind: "read"
        table: "commission_rule"
        where: "id = input.id"
        alias: "rule"
      - kind: "guard"
        expr: "rule.exists"
        error: "Rule not found"
      - kind: "update"
        table: "commission_rule"
        where: "id = input.id"
        fields:
          name: "input.name"
          rate_pct: "input.rate_pct"
          amount_fixed: "input.amount_fixed"
          priority: "input.priority"
          conditions_json: "input.conditions_json"
          effective_to: "input.effective_to"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "RULE_UPDATED"
        aggregate_id: "rule.program_id"
    response:
      success: true

  - name: "RecordAccrual"
    description: "Record commission accrual from source event"
    path: "/api/commission/accruals"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      dto: "RecordAccrualDTO"
      actor: "Actor"
    steps:
      - kind: "read"
        table: "commission_program"
        where: "id = input.program_id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists && program.status = 'active'"
        error: "Program not found or not active"
      - kind: "read"
        table: "commission_participant"
        where: "id = input.participant_id"
        alias: "participant"
      - kind: "guard"
        expr: "participant.exists && participant.status = 'active'"
        error: "Participant not found or not active"
      - kind: "upsert"
        table: "commission_accrual"
        unique_by: ["idempotency_key"]
        fields:
          program_id: "input.program_id"
          participant_id: "input.participant_id"
          rule_id: "input.rule_id"
          accrual_type: "input.accrual_type"
          currency: "input.currency ?? 'MYR'"
          base_amount: "input.base_amount"
          rate_pct: "input.rate_pct"
          amount: "input.amount"
          source_ref_type: "input.source_ref_type"
          source_ref_id: "input.source_ref_id"
          idempotency_key: "input.idempotency_key"
          status: "'accrued'"
          occurred_at: "input.occurred_at ?? NOW()"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "ACCRUAL_RECORDED"
        aggregate_id: "input.program_id"
    response:
      accrual_id: "inserted_id"

  - name: "VoidAccrual"
    description: "Void commission accrual (before payout)"
    path: "/api/commission/accruals/:id/void"
    method: "PUT"
    idempotent: true
    permissions: []
    input:
      id: "string"
      reason: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to void accrual"
      - kind: "read"
        table: "commission_accrual"
        where: "id = input.id"
        alias: "accrual"
      - kind: "guard"
        expr: "accrual.exists && accrual.status = 'accrued'"
        error: "Accrual not found or already processed"
      - kind: "update"
        table: "commission_accrual"
        where: "id = input.id"
        fields:
          status: "'voided'"
          meta_json: "JSON_SET(COALESCE(meta_json, '{}'), '$.void_reason', input.reason)"
      - kind: "outbox_emit"
        event: "ACCRUAL_VOIDED"
        aggregate_id: "accrual.program_id"
    response:
      success: true

  - name: "CreatePayoutBatch"
    description: "Create payout batch for settlement period"
    path: "/api/commission/programs/:program_id/payout-batches"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      dto: "CreatePayoutBatchDTO"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to create payout batch"
      - kind: "read"
        table: "commission_program"
        where: "id = input.program_id"
        alias: "program"
      - kind: "guard"
        expr: "program.exists"
        error: "Program not found"
      - kind: "upsert"
        table: "commission_payout_batch"
        unique_by: ["program_id", "batch_code"]
        fields:
          program_id: "input.program_id"
          batch_code: "input.batch_code"
          status: "'planned'"
          currency: "input.currency ?? 'MYR'"
          period_start: "input.period_start"
          period_end: "input.period_end"
          total_amount: "0.00"
          meta_json: "input.meta_json"
      - kind: "outbox_emit"
        event: "PAYOUT_BATCH_CREATED"
        aggregate_id: "inserted_id"
    response:
      batch_id: "inserted_id"

  - name: "ProcessPayoutBatch"
    description: "Process payout batch (creates items, executes payouts)"
    path: "/api/commission/payout-batches/:id/process"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      id: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to process payout batch"
      - kind: "read"
        table: "commission_payout_batch"
        where: "id = input.id"
        alias: "batch"
      - kind: "guard"
        expr: "batch.exists && batch.status = 'planned'"
        error: "Batch not found or already processed"
      - kind: "update"
        table: "commission_payout_batch"
        where: "id = input.id"
        fields:
          status: "'processing'"
      - kind: "hook"
        name: "createPayoutItems"
        description: "Create payout items for participants with accruals in period"
      - kind: "hook"
        name: "executePayouts"
        description: "Execute payouts for all items (wallet/bank transfers)"
      - kind: "update"
        table: "commission_payout_batch"
        where: "id = input.id"
        fields:
          status: "'completed'"
      - kind: "outbox_emit"
        event: "PAYOUT_BATCH_COMPLETED"
        aggregate_id: "input.id"
    response:
      success: true

  - name: "ProcessPayoutItem"
    description: "Process individual payout item (wallet or bank transfer)"
    path: "/api/commission/payout-items/:id/process"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      id: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager', 'system']"
        error: "Unauthorized to process payout item"
      - kind: "read"
        table: "commission_payout_item"
        where: "id = input.id"
        alias: "item"
      - kind: "guard"
        expr: "item.exists && item.status = 'planned'"
        error: "Payout item not found or already processed"
      - kind: "update"
        table: "commission_payout_item"
        where: "id = input.id"
        fields:
          status: "'processing'"
      - kind: "when"
        condition: "item.payout_method = 'wallet'"
        then:
          - kind: "hook"
            name: "executeWalletPayout"
            description: "Create ledger transaction for wallet payout"
          - kind: "update"
            table: "commission_payout_item"
            where: "id = input.id"
            fields:
              ledger_txn_id: "created_ledger_txn_id"
              status: "'completed'"
        else:
          - kind: "hook"
            name: "executeBankPayout"
            description: "Create withdrawal request for bank payout"
          - kind: "update"
            table: "commission_payout_item"
            where: "id = input.id"
            fields:
              withdrawal_request_id: "created_withdrawal_request_id"
              status: "'completed'"
      - kind: "hook"
        name: "markAccrualsPaid"
        description: "Mark linked accruals as paid"
      - kind: "read"
        table: "commission_payout_batch"
        where: "id = item.batch_id"
        alias: "batch"
      - kind: "outbox_emit"
        event: "PAYOUT_ITEM_COMPLETED"
        aggregate_id: "batch.id"
    response:
      success: true

  - name: "RetryFailedPayoutItem"
    description: "Retry failed payout item"
    path: "/api/commission/payout-items/:id/retry"
    method: "POST"
    idempotent: true
    permissions: []
    input:
      id: "string"
      actor: "Actor"
    steps:
      - kind: "guard"
        expr: "actor.role in ['admin', 'commission_manager']"
        error: "Unauthorized to retry payout item"
      - kind: "read"
        table: "commission_payout_item"
        where: "id = input.id"
        alias: "item"
      - kind: "guard"
        expr: "item.exists && item.status = 'failed'"
        error: "Payout item not found or not failed"
      - kind: "update"
        table: "commission_payout_item"
        where: "id = input.id"
        fields:
          status: "'planned'"
          failure_reason: "NULL"
      - kind: "call"
        command: "ProcessPayoutItem"
        with:
          id: "input.id"
    response:
      success: true

