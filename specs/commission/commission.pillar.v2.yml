      - "Phase 7A: Supports commission_rule.code='level_1', 'level_2', 'level_3' depth-based rules"
      - "Phase 7A: Emits ACCRUAL_RECORDED per accrual created"

  - version: "2.0.0"
    date: "2026-03-09"
    author: "Claude Sonnet 4.5"
    description: "Initial v2 spec generated from DDL following strict bottom-up approach"
