# ──────────────────────────────────────────────────────────────────────────────
# COVERAGE
# ──────────────────────────────────────────────────────────────────────────────

coverage:
  tables:
    commission_program:
      touched_by:
        - "CreateProgram"
        - "UpdateProgram"
        - "PauseProgram"
        - "ActivateProgram"

    commission_participant:
      touched_by:
        - "EnrollParticipant"
        - "UpdateParticipantStatus"

    commission_rule:
      touched_by:
        - "CreateRule"
        - "UpdateRule"

    commission_accrual:
      touched_by:
        - "RecordAccrual"
        - "VoidAccrual"

    commission_payout_batch:
      touched_by:
        - "CreatePayoutBatch"
        - "ProcessPayoutBatch"

    commission_payout_item:
      touched_by:
        - "ProcessPayoutItem"
        - "RetryFailedPayoutItem"

    commission_payout_item_accrual:
      touched_by:
        - "ProcessPayoutBatch"  # created during batch processing

  events:
    PROGRAM_CREATED:
      emitted_by:
        - "CreateProgram"

    PROGRAM_UPDATED:
      emitted_by:
        - "UpdateProgram"

    PROGRAM_PAUSED:
      emitted_by:
        - "PauseProgram"

    PROGRAM_ACTIVATED:
      emitted_by:
        - "ActivateProgram"

    PARTICIPANT_ENROLLED:
      emitted_by:
        - "EnrollParticipant"

    PARTICIPANT_STATUS_UPDATED:
      emitted_by:
        - "UpdateParticipantStatus"

    RULE_CREATED:
      emitted_by:
        - "CreateRule"

    RULE_UPDATED:
      emitted_by:
        - "UpdateRule"

    ACCRUAL_RECORDED:
      emitted_by:
        - "RecordAccrual"

    ACCRUAL_VOIDED:
      emitted_by:
        - "VoidAccrual"

    PAYOUT_BATCH_CREATED:
      emitted_by:
        - "CreatePayoutBatch"

    PAYOUT_BATCH_PROCESSING_STARTED:
      emitted_by: []  # currently not emitted (implicit in ProcessPayoutBatch)

    PAYOUT_BATCH_COMPLETED:
      emitted_by:
        - "ProcessPayoutBatch"

    PAYOUT_BATCH_FAILED:
      emitted_by: []  # currently not emitted (would be in error handler)

    PAYOUT_ITEM_COMPLETED:
      emitted_by:
        - "ProcessPayoutItem"

    PAYOUT_ITEM_FAILED:
      emitted_by: []  # currently not emitted (would be in error handler)
