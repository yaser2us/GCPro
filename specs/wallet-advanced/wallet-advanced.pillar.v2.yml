  # ── WITHDRAWAL REQUEST ────────────────────────────────────────────────────────

  RequestWithdrawal:
    description: "Submit a withdrawal request. No idempotency_key on this table — caller must avoid duplicate submission."
    path: "/api/v1/wallet-advanced/withdrawal-requests"
    method: POST
    idempotent: false
    permissions: ["wallet-advanced:admin"]
    input:
      dto: WithdrawalRequestCreateDto
