    steps:
      - kind: insert
        table: wallet_withdrawal_request
        data:
          wallet_id: "dto.wallet_id"
          account_id: "dto.account_id"
          bank_profile_id: "dto.bank_profile_id"
          amount: "dto.amount"
          currency: "dto.currency ?? 'MYR'"
          status: "requested"
          requested_at: "now()"
          meta_json: "dto.meta_json"
        assign: result
      - kind: outbox_emit
        event: WITHDRAWAL_REQUESTED
        aggregate_type: WITHDRAWAL_REQUEST
        aggregate_id: "result.id"
        payload: { wallet_id: "result.wallet_id", amount: "result.amount", bank_profile_id: "result.bank_profile_id" }
    response: { http_status: 201, body: WithdrawalRequestSummary }

  ApproveWithdrawal:
    description: "Admin approves a withdrawal request."
    path: "/api/v1/wallet-advanced/withdrawal-requests/:withdrawalRequestId/approve"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      path_params: [withdrawalRequestId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_withdrawal_request
        filter: "id = withdrawalRequestId"
        assign: wr
      - kind: guard
        expression: "wr != null"
        error: "WITHDRAWAL_REQUEST_NOT_FOUND"
      - kind: guard
        expression: "wr.status == 'requested'"
        error: "WITHDRAWAL_REQUEST_NOT_PENDING"
      - kind: update
        table: wallet_withdrawal_request
        filter: "id = withdrawalRequestId"
        data: { status: "approved", decided_at: "now()" }
      - kind: outbox_emit
        event: WITHDRAWAL_APPROVED
        aggregate_type: WITHDRAWAL_REQUEST
        aggregate_id: "withdrawalRequestId"
        payload: { wallet_id: "wr.wallet_id", amount: "wr.amount" }
    response: { http_status: 200, body: WithdrawalRequestSummary }

  RejectWithdrawal:
    description: "Admin rejects a withdrawal request with a reason code."
    path: "/api/v1/wallet-advanced/withdrawal-requests/:withdrawalRequestId/reject"
