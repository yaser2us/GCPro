        aggregate_type: WITHDRAWAL_REQUEST
        aggregate_id: "withdrawalRequestId"
        payload: { wallet_id: "wr.wallet_id", amount: "wr.amount", bank_profile_id: "wr.bank_profile_id" }
    response: { http_status: 200, body: WithdrawalRequestSummary }

  FailWithdrawal:
    description: "Mark a withdrawal as failed after exhausting payout attempts."
    path: "/api/v1/wallet-advanced/withdrawal-requests/:withdrawalRequestId/fail"
    method: POST
    idempotent: true
