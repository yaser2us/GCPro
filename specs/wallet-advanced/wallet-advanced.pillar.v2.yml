  # ── WALLET BATCH ──────────────────────────────────────────────────────────────

  CreateBatch:
    description: "Create a wallet batch. Idempotent via UNIQUE(idempotency_key)."
    path: "/api/v1/wallet-advanced/batches"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: WalletBatchCreateDto
      headers: ["Idempotency-Key"]
    steps:
      - kind: insert
        table: wallet_batch
        data:
          batch_type: "dto.batch_type"
          status: "created"
          ref_type: "dto.ref_type"
          ref_id: "dto.ref_id"
          idempotency_key: "dto.idempotency_key ?? idempotencyKey"
          total_items: 0
          success_items: 0
          failed_items: 0
          attempts: 0
          meta_json: "dto.meta_json"
        assign: result
        on_duplicate: "orIgnore + findOne(idempotency_key)"
      - kind: outbox_emit
        event: WALLET_BATCH_CREATED
        aggregate_type: WALLET_BATCH
        aggregate_id: "result.id"
        payload: { batch_type: "result.batch_type" }
    response: { http_status: 201, body: WalletBatchSummary }

  AddBatchItem:
    description: "Add an item to a wallet batch. Idempotent via UNIQUE(idempotency_key)."
    path: "/api/v1/wallet-advanced/batches/:batchId/items"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: WalletBatchItemAddDto
      path_params: [batchId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_batch
        filter: "id = batchId"
        assign: batch
      - kind: guard
        expression: "batch != null"
        error: "WALLET_BATCH_NOT_FOUND"
      - kind: guard
        expression: "batch.status == 'created'"
        error: "WALLET_BATCH_NOT_OPEN"
      - kind: insert
        table: wallet_batch_item
        data:
          batch_id: "batchId"
          wallet_id: "dto.wallet_id"
          account_id: "dto.account_id"
          item_type: "dto.item_type"
          amount: "dto.amount"
          currency: "dto.currency ?? 'MYR'"
          status: "created"
          ref_type: "dto.ref_type"
          ref_id: "dto.ref_id"
          idempotency_key: "dto.idempotency_key ?? idempotencyKey"
          meta_json: "dto.meta_json"
        on_duplicate: "orIgnore + findOne(idempotency_key)"
      - kind: update
        table: wallet_batch
        filter: "id = batchId"
        data: { total_items: "batch.total_items + 1" }
    response: { http_status: 201, body: { id: number, batch_id: number, status: string } }

  ProcessBatch:
    description: "Start processing a batch — transitions to 'processing' and increments attempts."
    path: "/api/v1/wallet-advanced/batches/:batchId/process"
    method: POST
    idempotent: false
    permissions: ["wallet-advanced:admin"]
    input:
      path_params: [batchId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_batch
        filter: "id = batchId"
        assign: batch
      - kind: guard
        expression: "batch != null"
        error: "WALLET_BATCH_NOT_FOUND"
      - kind: guard
        expression: "batch.status == 'created' OR batch.status == 'partial'"
        error: "WALLET_BATCH_NOT_PROCESSABLE"
      - kind: update
        table: wallet_batch
        filter: "id = batchId"
        data: { status: "processing", started_at: "now()", attempts: "batch.attempts + 1" }
      - kind: outbox_emit
        event: WALLET_BATCH_PROCESSING
        aggregate_type: WALLET_BATCH
        aggregate_id: "batchId"
        payload: { batch_type: "batch.batch_type", total_items: "batch.total_items" }
    response: { http_status: 200, body: WalletBatchSummary }

  CompleteBatchItem:
    description: "Mark a batch item as completed and increment batch success counter."
    path: "/api/v1/wallet-advanced/batches/:batchId/items/:batchItemId/complete"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      path_params: [batchId: number, batchItemId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_batch_item
        filter: "id = batchItemId AND batch_id = batchId"
        assign: item
      - kind: guard
        expression: "item != null"
        error: "WALLET_BATCH_ITEM_NOT_FOUND"
      - kind: guard
        expression: "item.status == 'created' OR item.status == 'processing'"
        error: "WALLET_BATCH_ITEM_NOT_PROCESSABLE"
      - kind: update
        table: wallet_batch_item
        filter: "id = batchItemId"
        data: { status: "completed" }
      - kind: update
        table: wallet_batch
        filter: "id = batchId"
        data: { success_items: "batch.success_items + 1" }
    response: { http_status: 200, body: { id: number, status: string } }

  FailBatchItem:
    description: "Mark a batch item as failed with a reason code."
    path: "/api/v1/wallet-advanced/batches/:batchId/items/:batchItemId/fail"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: BatchItemFailDto
      path_params: [batchId: number, batchItemId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_batch_item
        filter: "id = batchItemId AND batch_id = batchId"
        assign: item
      - kind: guard
        expression: "item != null"
        error: "WALLET_BATCH_ITEM_NOT_FOUND"
      - kind: guard
        expression: "item.status == 'created' OR item.status == 'processing'"
        error: "WALLET_BATCH_ITEM_NOT_PROCESSABLE"
      - kind: update
        table: wallet_batch_item
        filter: "id = batchItemId"
        data: { status: "failed", failure_code: "dto.failure_code" }
      - kind: update
        table: wallet_batch
        filter: "id = batchId"
        data: { failed_items: "batch.failed_items + 1" }
    response: { http_status: 200, body: { id: number, status: string } }

  FinalizeBatch:
    description: >
      Finalize a batch after all items processed.
      Status = completed if failed_items == 0, partial if 0 < failed_items < total_items, failed if all failed.
    path: "/api/v1/wallet-advanced/batches/:batchId/finalize"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      path_params: [batchId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_batch
        filter: "id = batchId"
        assign: batch
      - kind: guard
        expression: "batch != null"
        error: "WALLET_BATCH_NOT_FOUND"
      - kind: guard
        expression: "batch.status == 'processing'"
        error: "WALLET_BATCH_NOT_PROCESSING"
      - kind: when
        condition: "batch.failed_items == 0"
        then:
          - kind: update
            table: wallet_batch
            filter: "id = batchId"
            data: { status: "completed", completed_at: "now()" }
      - kind: when
        condition: "batch.failed_items > 0 AND batch.failed_items < batch.total_items"
        then:
          - kind: update
            table: wallet_batch
            filter: "id = batchId"
            data: { status: "partial", completed_at: "now()" }
      - kind: when
        condition: "batch.failed_items == batch.total_items"
        then:
          - kind: update
            table: wallet_batch
            filter: "id = batchId"
            data: { status: "failed", completed_at: "now()" }
      - kind: outbox_emit
        event: WALLET_BATCH_FINALIZED
        aggregate_type: WALLET_BATCH
        aggregate_id: "batchId"
        payload:
          batch_type: "batch.batch_type"
          status: "derived"
          total_items: "batch.total_items"
          success_items: "batch.success_items"
          failed_items: "batch.failed_items"
    response: { http_status: 200, body: WalletBatchSummary }

  # ── RULE SET ──────────────────────────────────────────────────────────────────

  CreateRuleSet:
    description: "Create a versioned spending rule set for a wallet."
    path: "/api/v1/wallet-advanced/rule-sets"
    method: POST
    idempotent: false
    permissions: ["wallet-advanced:admin"]
    input:
      dto: RuleSetCreateDto
      headers: ["Idempotency-Key"]
    steps:
      - kind: insert
        table: wallet_rule_set
        data:
          wallet_id: "dto.wallet_id"
          status: "active"
          version: "dto.version ?? 'v1'"
          effective_from: "dto.effective_from"
          effective_to: "dto.effective_to"
          meta_json: "dto.meta_json"
        assign: result
    response: { http_status: 201, body: { id: number, wallet_id: number, status: string, version: string } }

  AddRule:
    description: "Add a rule to a rule set. Idempotent via UNIQUE(rule_set_id, rule_code)."
    path: "/api/v1/wallet-advanced/rule-sets/:ruleSetId/rules"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: RuleAddDto
      path_params: [ruleSetId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_rule_set
        filter: "id = ruleSetId"
        assign: ruleSet
      - kind: guard
        expression: "ruleSet != null"
        error: "WALLET_RULE_SET_NOT_FOUND"
      - kind: upsert
        table: wallet_rule
        unique_by: ["rule_set_id", "rule_code"]
        data:
          rule_set_id: "ruleSetId"
          rule_code: "dto.rule_code"
          operator: "dto.operator ?? 'eq'"
          value_str: "dto.value_str"
          value_num: "dto.value_num"
          value_json: "dto.value_json"
          status: "active"
        assign: result
    response: { http_status: 201, body: { id: number, rule_set_id: number, rule_code: string, status: string } }

  DeactivateRuleSet:
    description: "Deactivate a wallet rule set."
    path: "/api/v1/wallet-advanced/rule-sets/:ruleSetId/deactivate"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      path_params: [ruleSetId: number]
      headers: ["Idempotency-Key"]
    steps:
      - kind: read
        table: wallet_rule_set
        filter: "id = ruleSetId"
        assign: ruleSet
      - kind: guard
        expression: "ruleSet != null"
        error: "WALLET_RULE_SET_NOT_FOUND"
      - kind: guard
        expression: "ruleSet.status == 'active'"
        error: "WALLET_RULE_SET_NOT_ACTIVE"
      - kind: update
        table: wallet_rule_set
        filter: "id = ruleSetId"
        data: { status: "inactive" }
    response: { http_status: 200, body: { id: number, status: string } }

  # ── THRESHOLD RULES & EVENTS ──────────────────────────────────────────────────

  UpsertThresholdRule:
    description: "Upsert a balance threshold alert rule for a wallet. Idempotent via UNIQUE(wallet_id, threshold_code)."
    path: "/api/v1/wallet-advanced/threshold-rules"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: ThresholdRuleUpsertDto
      headers: ["Idempotency-Key"]
    steps:
      - kind: upsert
        table: wallet_threshold_rule
        unique_by: ["wallet_id", "threshold_code"]
        data:
          wallet_id: "dto.wallet_id"
          threshold_code: "dto.threshold_code"
          threshold_amount: "dto.threshold_amount"
          currency: "dto.currency ?? 'MYR'"
          status: "active"
          meta_json: "dto.meta_json"
        assign: result
    response: { http_status: 200, body: { id: number, wallet_id: number, threshold_code: string, threshold_amount: string, status: string } }

  RecordThresholdBreach:
    description: "Record a wallet balance threshold breach event. Idempotent via UNIQUE(idempotency_key)."
    path: "/api/v1/wallet-advanced/threshold-events"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: ThresholdEventRecordDto
      headers: ["Idempotency-Key"]
    steps:
      - kind: insert
        table: wallet_threshold_event
        data:
          wallet_id: "dto.wallet_id"
          threshold_code: "dto.threshold_code"
          current_balance: "dto.current_balance"
          threshold_amount: "dto.threshold_amount"
          currency: "dto.currency ?? 'MYR'"
          status: "breached"
          idempotency_key: "dto.idempotency_key ?? idempotencyKey"
          payload_json: "dto.payload_json"
          occurred_at: "now()"
        assign: result
        on_duplicate: "orIgnore + findOne(idempotency_key)"
      - kind: outbox_emit
        event: WALLET_THRESHOLD_BREACHED
        aggregate_type: WALLET_THRESHOLD_EVENT
        aggregate_id: "result.id"
        payload:
          wallet_id: "result.wallet_id"
          threshold_code: "result.threshold_code"
          current_balance: "result.current_balance"
          threshold_amount: "result.threshold_amount"
    response: { http_status: 201, body: { id: number, wallet_id: number, threshold_code: string, status: string } }

  # ── POLICY GATE ───────────────────────────────────────────────────────────────

  UpsertPolicyGate:
    description: "Enable or disable a wallet feature gate. Idempotent via UNIQUE(wallet_id, gate_code)."
    path: "/api/v1/wallet-advanced/policy-gates"
    method: POST
    idempotent: true
    permissions: ["wallet-advanced:admin"]
    input:
      dto: PolicyGateUpsertDto
      headers: ["Idempotency-Key"]
    steps:
      - kind: upsert
        table: wallet_policy_gate
        unique_by: ["wallet_id", "gate_code"]
        data:
          wallet_id: "dto.wallet_id"
          gate_code: "dto.gate_code"
          status: "dto.status"
          meta_json: "dto.meta_json"
        assign: result
      - kind: outbox_emit
        event: WALLET_POLICY_GATE_UPDATED
        aggregate_type: WALLET_POLICY_GATE
        aggregate_id: "result.id"
        payload: { wallet_id: "result.wallet_id", gate_code: "result.gate_code", status: "result.status" }
    response: { http_status: 200, body: { id: number, wallet_id: number, gate_code: string, status: string } }

# ──────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ──────────────────────────────────────────────────────────────────────────────

changelog:
  - version: "2.0.0"
    date: "2026-03-23"
    author: "system"
    description: "Initial wallet-advanced pillar spec covering 12 advanced wallet tables"
    changes:
      - "Defined schema for all 12 tables: deposit_intent, spend_intent, withdrawal_request, hold, payout_attempt, batch, batch_item, rule_set, rule, threshold_rule, threshold_event, policy_gate"
      - "Defined 6 aggregates: DEPOSIT_INTENT, SPEND_INTENT, WITHDRAWAL_REQUEST, WALLET_HOLD, WALLET_BATCH, WALLET_RULE_SET"
      - "Defined 25 commands covering full lifecycle of all aggregates"
      - "Defined 22 events"
      - "Idempotency via UNIQUE(idempotency_key) on 6 tables; orIgnore pattern for at-most-once inserts"
    breaking_changes: []
    migrations_required: false

# ──────────────────────────────────────────────────────────────────────────────
# COVERAGE
# ──────────────────────────────────────────────────────────────────────────────

coverage:
  tables:
    wallet_deposit_intent:
      touched_by: [CreateDepositIntent, CompleteDepositIntent, FailDepositIntent, CancelDepositIntent]
    wallet_spend_intent:
      touched_by: [CreateSpendIntent, CompleteSpendIntent, FailSpendIntent, CancelSpendIntent]
    wallet_withdrawal_request:
      touched_by: [RequestWithdrawal, ApproveWithdrawal, RejectWithdrawal, CompleteWithdrawal, FailWithdrawal, RecordPayoutAttempt]
    wallet_hold:
      touched_by: [PlaceHold, ReleaseHold, CaptureHold, ExpireHold]
    wallet_payout_attempt:
      touched_by: [RecordPayoutAttempt]
    wallet_batch:
      touched_by: [CreateBatch, AddBatchItem, ProcessBatch, CompleteBatchItem, FailBatchItem, FinalizeBatch]
    wallet_batch_item:
      touched_by: [AddBatchItem, CompleteBatchItem, FailBatchItem]
    wallet_rule_set:
      touched_by: [CreateRuleSet, DeactivateRuleSet]
    wallet_rule:
      touched_by: [AddRule]
    wallet_threshold_rule:
      touched_by: [UpsertThresholdRule]
    wallet_threshold_event:
      touched_by: [RecordThresholdBreach]
    wallet_policy_gate:
      touched_by: [UpsertPolicyGate]

  events:
    DEPOSIT_INTENT_CREATED: { emitted_by: [CreateDepositIntent] }
    DEPOSIT_INTENT_COMPLETED: { emitted_by: [CompleteDepositIntent] }
    DEPOSIT_INTENT_FAILED: { emitted_by: [FailDepositIntent] }
    DEPOSIT_INTENT_CANCELLED: { emitted_by: [CancelDepositIntent] }
    SPEND_INTENT_CREATED: { emitted_by: [CreateSpendIntent] }
    SPEND_INTENT_COMPLETED: { emitted_by: [CompleteSpendIntent] }
    SPEND_INTENT_FAILED: { emitted_by: [FailSpendIntent] }
    SPEND_INTENT_CANCELLED: { emitted_by: [CancelSpendIntent] }
    WITHDRAWAL_REQUESTED: { emitted_by: [RequestWithdrawal] }
    WITHDRAWAL_APPROVED: { emitted_by: [ApproveWithdrawal] }
    WITHDRAWAL_REJECTED: { emitted_by: [RejectWithdrawal] }
    WITHDRAWAL_COMPLETED: { emitted_by: [CompleteWithdrawal] }
    WITHDRAWAL_FAILED: { emitted_by: [FailWithdrawal] }
    WALLET_HOLD_PLACED: { emitted_by: [PlaceHold] }
    WALLET_HOLD_RELEASED: { emitted_by: [ReleaseHold] }
    WALLET_HOLD_CAPTURED: { emitted_by: [CaptureHold] }
    WALLET_HOLD_EXPIRED: { emitted_by: [ExpireHold] }
    WALLET_BATCH_CREATED: { emitted_by: [CreateBatch] }
    WALLET_BATCH_PROCESSING: { emitted_by: [ProcessBatch] }
    WALLET_BATCH_FINALIZED: { emitted_by: [FinalizeBatch] }
    WALLET_THRESHOLD_BREACHED: { emitted_by: [RecordThresholdBreach] }
    WALLET_POLICY_GATE_UPDATED: { emitted_by: [UpsertPolicyGate] }

  aggregate_transitions:
    DEPOSIT_INTENT:
      CreateDepositIntent: "∅ → created"
      CompleteDepositIntent: "created | pending → completed"
      FailDepositIntent: "created | pending → failed"
      CancelDepositIntent: "created → cancelled"
    SPEND_INTENT:
      CreateSpendIntent: "∅ → created"
      CompleteSpendIntent: "created | pending → completed"
      FailSpendIntent: "created | pending → failed"
      CancelSpendIntent: "created → cancelled"
    WITHDRAWAL_REQUEST:
      RequestWithdrawal: "∅ → requested"
      ApproveWithdrawal: "requested → approved"
      RejectWithdrawal: "requested → rejected"
      CompleteWithdrawal: "approved | processing → completed"
      FailWithdrawal: "approved | processing → failed"
    WALLET_HOLD:
      PlaceHold: "∅ → active"
      ReleaseHold: "active → released"
      CaptureHold: "active → captured"
      ExpireHold: "active → expired"
    WALLET_BATCH:
      CreateBatch: "∅ → created"
      ProcessBatch: "created | partial → processing"
      FinalizeBatch: "processing → completed | partial | failed"
    WALLET_RULE_SET:
      CreateRuleSet: "∅ → active"
      DeactivateRuleSet: "active → inactive"

# ──────────────────────────────────────────────────────────────────────────────
# INTEGRATION
# ──────────────────────────────────────────────────────────────────────────────

integration:
  consumes:
    - event: "POLICY_ACTIVATED"
      source_plugin: "policy"
      aggregate_type: "POLICY"
      consumer: "src/plugins/wallet/consumers/policy-activated.consumer.ts"
      handler: "src/plugins/wallet/handlers/policy-activated.handler.ts"
      condition: "always"
      action: "Create WalletSpendIntent for policy premium deduction"
      idempotency: "UNIQUE(idempotency_key) = 'policy_premium_spend_{policy_id}'"
